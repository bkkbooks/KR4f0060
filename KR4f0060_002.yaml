body:
  text: 江都汪中撰玎文正說文玎玉聲也從玉丁聲齊太公子諡曰玎公按史記吕伋稱丁公丁公之子得稱乙公乙公之子慈母稱癸公其言實出世本丁乙癸竝從十干不得如說文作玎也周初諸矦未有稱諡者周文公見於國語經傳但稱周公召康公見於左氏春秋毛詩序經傳但稱召公齊之太公亦非諡也故伯禽稱魯公蔡叔之子胡稱蔡仲蔡仲之子荒稱蔡伯振鐸稱曹叔曹叔之子脾稱大伯大伯之子平稱仲君封稱康叔康叔之子稱康伯宋始封之君稱微子微仲微仲之子稽稱宋公宋公之子申亦稱丁公虞稱唐叔唐叔之子夑稱㬜矦當時易名之典惟施于王者諸矦之得諡者多在再傳及三四傳之後前此或以伯仲或以國邑而夏殷之禮相沿而未革故猶有以甲乙為號者齊之丁乙癸宋之丁公是也古書或借玎作丁許氏遂據之而為之說爾釋連山周官大卜掌三易一曰連山簭人文同鄭注大卜云名曰連山似山出內氣也其言望文生義殆失之矣連山即烈山春秋昭二十九年傳有烈山氏祭法烈山氏之有天下是也魯語亦謂之厲山皆語之轉杜子春以連山為宓戲杜預以烈山為神農世諸矦韋昭以厲山為炎帝之號三說不同韋義為允釋童說文童男有罪曰奴奴曰童從辛重省聲僮未冠也從人童聲中按春秋傳士臣皂皂臣輿輿臣隸又斐豹隸也著於丹書司厲其奴男子入於罪隸女子入於舂稿鄭司農謂今之奴婢古之罪人也史記張耳陳餘列傳高祖逮捕趙王貫高與客孟舒等十餘人皆自髡鉗為王家奴田叔列傳孟舒田叔等十餘人赭衣自髡鉗稱王家奴季布欒布列傳周氏乃髡鉗季布並與其家僮數十人之魯朱家所賣之朱家心知是季布乃買而置之田誡其子曰田事聽此奴漢書賈山傳山稱文帝之德曰赦罪人憐其無髮賜之巾王式傳昌邑王廢式得減死論不言所論何罪据王吉龔遂傳二人皆減死髡為城旦則式亦髡為城旦也式後除博士徵來衣博士衣而不冠曰刑餘之人何宜復充禮官詳此數條知古之罪入於髡者則以為奴後則凡為奴者皆髡鉗以自别髡則纚笄皆無所施故不冠而謂之童童之為言秃也語轉而異故牛羊之無角者曰童牛曰童羖山之無草木者曰童山其義一也子生三月翦髮為鬌少長總角及冠乃紒而冠故未冠謂之童名義皆相因也童之從人為類加之偏㫄若芻豢之犓巢車之轈散文則通古書多假借後人傳寫乃兩易之重又童之假借說文之義無可疑也此篇答舉主􅒜侍郎作左氏春秋釋疑左氏春秋典策之遺本乎周公筆削之意依乎孔子聖人之道莫備於周公孔子明周公孔子之道莫若左氏春秋學者其何疑焉然古者左史記事動則書之是為春秋而左氏所書不專人事其别有五曰天道曰鬼神曰災祥曰卜筮曰夢其失也巫斯之謂與吾就其書求之楚子庚侵鄭董叔言天道多在西北南師不時必無功叔向以為在其君之德有星孛於大辰西及漢裨竈曰宋衛陳鄭將同日火若我用瓘斚玉瓚鄭必不火子産不與明年鄭火裨竈曰不用吾言鄭又將火子産以為天道遠人道邇竈焉知天道是亦多言矣豈不或信遂不與亦不復火由是言之左氏之言天道未嘗廢人事也隨矦以牲牷肥腯粢盛豐僃謂可信於神季良以為民神之主也聖王先成民而後致力於神民和而神降之福齊矦疾梁邱據請誅於祝固史嚚晏子以為祝不勝詛由是言之左氏之言鬼神未嘗廢人事也鄭內蛇與外蛇鬭內蛇死申繻以為妖由人興人無釁焉妖不自作隕石於宋五六鷁退飛過宋都內史叔興以為是陰陽之事非吉凶所生吉凶由人由是言之左氏之言災祥未嘗廢人事也晉獻公筮嫁伯姬於秦史蘇占之不吉及惠公為秦所執曰先君若從史蘇之言吾不及此韓簡以為先君多敗德史蘇是占勿從何益南蒯將叛筮之得坤之比子服惠伯以為忠信之事則可不然必敗易不可以占險由是言之左氏之言卜筮未嘗廢人事也衛成公遷於帝邱夢康叔曰相奪豫享公命祀相寧武子以為相之不享於此久矣非衛之罪不可以閒成王周公之命祀晉趙嬰通於莊姬嬰夢天使謂己祭余余福女士貞伯以為神福仁而禍淫淫而無罰福也祭其得亡乎祭之之明日而放於齊由是言之左氏之言夢未嘗廢人事也此十者後世儒者之所執以疑左氏春秋者也而當時深識遠見之君子類能為之矢德音蔽羣疑而左氏則巳廣記而僃言之後人其何疑焉若夫瓊辨玉纓子玉弗致庶乎知道而卒之兵敗身死臧會為僭僂句告吉而終後臧氏天網恢恢吉凶之應有時而爽策書舊文謹而志之所以明教也問者曰天道鬼神災祥卜筮夢之僃書於策者何也曰此史之職也其在周官大史小史內史外史御史皆屬春官若馮相氏􅍖章氏視祲司天者也大祝喪祝甸祝司巫宗人司鬼神者也大卜卜師龜人菙氏簭人司卜筮者也占夢司夢者也與五史皆同官周之東遷官失其守而列國又不僃官則史皆得而治之其見於典籍者曰瞽史曰祝史曰史巫曰宗祝巫史曰祝宗卜史明乎其為聮事也楚公子棄疾滅陳史趙以為歲在析木之津猶將復由吳始用師於越史墨以為越得歲而吳伐之必受其凶然則史固司天矣有神降於莘惠王問諸內史過過請以其物享焉狄人囚史華龍滑與禮孔二人曰我大史也實掌其祭然則史固司鬼神矣隕石於宋五六鷁退飛過宋都襄公問吉凶於周內史叔興有雲如衆赤鳥夾日以飛三日楚子使問諸周大史然則史固司災祥矣陳敬仲之生周大史有以周易見陳矦者陳矦使筮之韓起觀書於大史見易象孔成子筮立君以示史朝然則史固司卜筮矣昭公將適楚夢襄公祖梓愼以為不果行趙簡子夢童子羸而轉以歌占諸史墨然則史固司夢矣司其事而不書則為失官故曰天道鬼神災祥卜筮夢之僃書於策者史之職也古者詩書禮樂大司樂掌之易象春秋大史掌之而儒則有道者有德者使教國之子弟死則以為樂祖祭於瞽宗者也後世二官俱亡而六藝之學並於儒者於是即儒之所業以疑大史此偏知之所得未足語於大道也曰是皆然矣抑猶有可疑者左氏之紀人事所以聳善抑惡以詔後世也而有不信者焉有不平者焉其類有百請約言之鄭息有違言息伐鄭而敗左氏以其犯五不韙而伐人知其將亡鄭請成於陳陳桓公不許左氏謂其長惡不悛按鄭莊公之在位四鄰搆怨無歲無兵取周禾麥射王中肩置母城潁誓不復見人道盡矣而為周孟矦以沒元身陳息一青而亟稱其惡其可疑者一也楚武王將齊而心蕩鄧曼知其祿盡莫敖舉趾高鬭伯比知其必敗按商臣弒父與君享國十二年滅江六蓼服陳鄭宋身獲考終子有令德潘崇教人之子使為大逆奄有大子之室為大師掌環列之尹伐麋襲舒屢主兵事有尫及黨為國世臣比於武王莫敖其咎孰多其徵安在其可疑二也有神降於莘虢公享神神賜之土田內史過史嚚知其將亡虢公敗戎於渭汭桑田舟之僑卜偃知其將亡按虢為卿士於周為睦子頽之亂勳在王室不幸晉方薦食不祀忽諸而四子僃舉其亡徵且周之東遷拜戎不暇渭汭桑田之役豈不亦敵王所愾以張中國之威而以為召殃斯過矣晉獻上蒸諸母盡滅桓莊之族以妾為妻逐羣公子而殺其世子虢多涼德豈其若是而日闢百里晉是以大其可疑三也公孫歸父言魯樂晏桓子知其將亡按歸父欲去三桓以張公室與公謀而聘於晉欲以晉人去之其忠盛矣不幸宣公即世其事不成行父假於公義以敵私怨遂逐子家由是公室四分昭哀失國斯可謂國之不幸而遠以懷魯蔽其罪且意如內攘國政外結齊晉之臣同惡相濟賊殺不辜有君不事使之野死又廢其子其為謀人不巳多乎而及身無咎後嗣蒙業其可疑四也凡若此者是有故焉天道福善而禍淫禍福之至必有其幾君子見微知著明徵其辭其後或遠或近其應也如響作史者比事而書之策侍於其君則誦之有問焉則以告之其善而適福足以勸焉淫而適禍足以戒焉此史之職也故國語史獻書又臨事有瞽史之道又楚有左史倚相能道訓典以敘百物以朝夕獻善敗於君使無忘先王之業禮運王前巫而後史􅍖傅傳瞽史誦詩又博聞強記接給而善􅍟者謂之承承者承天子之遺忘者常立於後是史佚也其見於左氏春秋者曰君舉必書曰史為書曰諸矦之會其德刑禮義無國不記及夫國中失之事咸問之史是其事也意主於戒勸不專於記述其所載之事時有異聞故史克數舜之功十六相四凶之名不同於尚書意有所偏重故昭公失國史墨謂為君愼器與名不可以假人君父不校之義非所及也所謂言豈一端各有所當者此也其有善而無福淫而無禍雖有先事之言不足以戒勸則遂削而不書其事不可沒則載之其故不可知則不復為之辭故史之於禍福舉其巳驗者也其在上知不聞亦式不諫亦入其於戒勸無所用之則禍福雖無驗焉可也其在下愚不可教誨不知話言其於戒勸亦無所用之則禍福雖無驗焉可也天下之上知下愚少而中人多故先王設之史使鑒於前世之善淫禍福以知戒勸者為中人也苟為中人則舉其巳驗者可也此史之職也雖然史之戒勸猶有二焉蔡矦般弒其君歲在豕韋萇宏知其弗過此於是楚靈王誘之於申伏甲而殺之此明著其禍以為戒者也商臣以宫甲圍成王王縊此直書其事以為戒者也禍之有無史之所不得為者也書法無隱史之所得為者也君子亦為其所得為者而巳矣此史之職也百世之上時異事殊故曰古之人與其不可傳者死矣所貴乎心知其意也明乎此則左氏春秋之疑於是乎釋居喪釋服解義居喪釋服之禮王制祭天地社稷越紼而行事一也曾子問天子崩未殯五祀之祭不行既殯而祭自啓至於反哭五祀之祭不行巳葬而祭二也周語襄王使大宰文公及內史興賜晉文公命命於武宫設桑主布几筵大宰蒞之晉矦端委以入大宰以王命命冕服內史贊之三命而後即冕服時去獻公之卒巳十有六年文公不欲繼於惠懷故假居喪即位之禮行之其天子錫命諸矦之正禮固如此也三也曲禮既葬見天子曰類見四也又言諡曰類注使大夫行象聘問之禮大夫為君三年見於天子則元冕五也左氏春秋文公元年傳凡君即位卿出竝聘六也聘禮遭喪將命於大夫主人長衣練冠以受注不以純凶接純吉七也又聘君若薨於後赴者未至則哭於巷衰於館注衰於館末可以凶服出見人其聘享之事自若吉也賈公彥云其行正聘享則著吉服雜記云執玉不麻是也八也聘禮又云歸使衆介先衰而從之注君納之乃朝服反命出公門釋服九也檀弓士惟公門說齊衰曲禮苞屨扱衽厭冠不入公門服問惟公門有稅齊曲禮正義引熊安生云父之喪惟扱上衽不入公門杖齊衰則屨不得入十也郊特牲郊祭之日喪者不敢凶服十一也喪服小記養有疾者不喪服十二也曾子問君薨世子生告於君大祝大宗大宰皆裨冕十三也士喪禮筮宅既朝哭主人皆往兆南北面免絰十四也檀弓辨葛絰而葬與神交之道也十五也喪服小記雜記祥祭朝服既祭乃服素縞麻衣十六也其非三年之喪釋服者雜記大夫卜宅與葬日有司麻衣布帶因喪屨緇布冠不㽔占者皮辨一也又如筮則史練冠長衣以筮占者朝服二也士喪禮將葬卜日族長涖卜及宗人吉服立於門西東面南上三也雜記含者委璧於殯東南宰夫朝服即喪屨升自西階西面坐取璧正義以鄰國執玉而來執玉不麻故著朝服四也又宰舉璧與圭則上介賵執圭將命宰亦朝服也五也其率是禮而行之者漢書律厯志引伊訓大甲元年十有二月乙丑朔伊尹祀於先王誕資有牧方明言雖有成湯大甲外丙之喪以冬至越紼祀先王於方明以配上帝一也周書顧命成王崩康王麻冕黼裳即位卿士邦君麻冕蟻裳大􅍖大史大宗麻冕彤裳二也春秋傳隱公元年三月惠公之喪下凡元二年以童求之公及邾儀父盟於蔑三也九月及宋人盟於宿四也是年公子豫及邾人鄭人盟於翼子為父臣為君皆斬衰三年會盟皆吉服五也三年三月平王崩十二月齊矦鄭伯盟於石門六也桓公元年公即位與顧命同桓公弒兄而自立猶用遭喪繼位之禮故書即位七也三月公會鄭伯於垂八也四月及鄭伯盟於越九也二年三月公會諸矦於稷十也七月杞矦來朝十一也九月公及戎盟於唐十二也十四年十二月齊僖公卒十五年六月襄公會魯桓公於艾十三也莊公十二年八月宋弒閔公十三年春宋人會於北杏十四也閔公元年八月公及齊矦盟於落姑十五也僖公元年會諸矦於柳臣不殤君閔公祔廟成喪十六也九年三月宋桓公卒未葬襄公會諸矦於葵邱十七也九月晉獻公卒十一年春王使召武公內史過錫晉矦命受玉十八也十二年十月陳宣公卒十三年四月穆公會諸矦於鹹十九也十七年十二月齊桓公卒十九年冬諸矦盟於齊孝公與盟二十也二十五年四月衛文公卒十二月成公會諸矦於洮二十一也二十六年正月衛寧速會魯莒盟於向二十二也二十七年六月齊孝公卒二十八年二月昭公與晉盟於斂盂二十三也五月昭公又與諸矦盟於踐土二十四也冬又會於溫二十五也五月陳穆公卒冬共公會於溫二十六也三十二年十二月晉文公卒閒一歲文公元年襄公朝王於溫下言五月圍戚則此在四月以前猶未大祥二十七也文公元年公即位二十八也四月王使毛伯來錫公命叔孫得臣如周拜公及得臣皆當裨冕二十九也三十也二年三月公如晉及陽處父盟三十一也公孫敖與盟於垂隴三十二也六年八月晉襄公卒七年八月趙盾及諸矦盟於扈三十三也十四年九月公孫敖卒於齊十五年夏惠伯猶毀以為請立於朝以待命三十四也宣公元年公即位三十五也六月公會齊矦於平州三十六也宣公喪取襄仲如齊聘其事非禮故不數之元年十月匡王崩三年春不郊而望三十七也八年六月敬嬴薨九年正月公如齊三十八也十年四月齊惠公卒冬國佐來聘三十九也成公元年公即位四十也夏臧孫許及晉矦盟於赤棘四十一也二年八月衛穆公卒三年十一月孫良夫來聘且尋盟四十二也二年八月宋文公卒四年春華元來聘四十三也五年十一月定王崩六年六月邾子來朝四十四也六年六月鄭悼公卒七年春鄭子良相成公如晉四十五也十四年十月衛定公卒十五年三月獻公會諸矦盟於戚四十六也十一月孫林父會諸矦之大夫於鍾離四十七也十八年八月公薨十二月仲孫蔑會諸矦及崔杼盟於虛朾四十八也襄公元年公即位四十九也夏又會諸矦之大夫於鄫五十也邾子來朝五十一也冬衛使公孫剽來聘魯竝受之於廟五十二也晉使荀罃來聘五十三也二年七月仲孫蔑會諸矦之大夫於戚五十四也冬又會於戚五十五也其年七月叔孫豹聘於宋五十六也四年三月陳成公卒五年秋哀公會諸矦於戚五十七也五年十二月季孫行父卒六年冬季孫宿如晉五十八也七年秋又如衛五十九也十年冬盜殺鄭子耳於西宫之朝十一年九月鄭使良霄如楚三年之喪期不使此未及期六十也十五年十一月晉悼公卒十六年春平公會諸矦於澶淵六十一也二十九年鄭子展卒子皮即位按位無定名朝祭喪賓皆有之此則嗣父為卿有位於朝六十二也二十八年十二月楚康王卒三十年正月楚子使薳罷來聘六十三也昭公元年公即位六十四也叔孫豹會諸矦之大夫於虢既入於鄭鄭又享之六十五也二年晉韓起來聘受聘必於廟且受玉又享之公及大夫皆當裨冕六十六也又宴於季氏季氏當朝服六十七也四年十二月叔孫豹卒五年正月昭子即位與子皮同六十八也十年十二月宋平公卒十一年五月華亥會諸矦之大夫於厥憗六十九也十二年夏華定來聘七十也十二年二月鄭簡公卒夏子産相定公朝於晉七十一也十六年晉昭公卒十七年秋晉使屠蒯如周請有事於雒與三塗見王及祭皆吉服七十二也定公元年六月公即位七十三也三年二月邾莊公卒冬仲孫何忌及邾子盟於拔七十四也四年二月陳惠公卒三月懷公會諸矦於召陵五月又盟於臯鼬七十五也五年六月季孫意如卒六年夏季孫斯如晉七十六也哀公元年公即位七十七也二年二月叔孫州仇仲孫何忌及邾子盟於句繹七十八也三年季孫斯卒既葬康子在朝七十九也以上皆居喪釋服而金革之事不與焉左氏春秋僖公三十二年十二月晉文公卒三十三年四月未葬襄公禦秦師墨衰絰喪大記既卒哭辨絰帶金革之事無辟也軍禮變服有此二條若禡及禱則亦吉服於是中為之解其義曰衰麻哭泣喪之文也不飲酒不食肉不御內喪之實也然郊之曰喪者不敢哭寡婦不夜哭奔喪哭辟市朝君使人弔主人迎賓不哭君視斂主人見馬首不哭徹大斂奠設朝奠婦人拊心不哭公史讀遣主人主婦皆不哭婦人下堂不哭男子出寢門外見人不哭凡封大夫命母哭士哭者相止也大荒哭不留日有疾飲酒食肉七十者飲酒食肉既葬君食之則食之大夫父之友食之則食之矣不辟梁肉君命遺之酒肉則不敢辭古之居喪者惟御內為不可假故孟獻子比御而不入孔子以為加人一等至於哭泣飲食皆可通也則夫衰麻之有時而可釋焉宜矣弔於人是日不樂不飲酒食肉一口之喪也故雖天子諸矦有弔服釋服斯須之敬也故既事而復故君有臣民之恩疾則問之喪則臨之遇柩於路則使人弔之故冠絰衰屨皆入公門當事而君至主人不變圭璧以禮神合瑞故雖含必即吉祖考與死者為一體故天子崩諸矦薨祝取羣廟之主藏之祖廟卒哭成事而後主各反其廟喪不祭神人異道故外事則吉服因喪以接神則變喪莫哀於始死故后之喪雖嘗禘郊社之祭簠簋既陳天子廢其禮神不可以乏祀故五祀之祭既殯而行有國者不以人之死為諱故朝聘而終以尸將事賓禮不可以衰麻行之故聘而君薨於國其聘享自若吉也此所謂人道之至文者也雖然君子不奪人之喪亦不可奪喪也苟有可以不釋者則不釋之矣季武子寢疾蟜固不說齊衰而入見曰斯禮也將亡矣士惟公門說齊衰武子曰不亦善乎君子表微晉平公卒既葬諸矦之大夫送葬者欲因見新君叔孫昭子曰非禮也弗聽叔向辭之曰大夫之事畢矣而又命孤孤斬焉在衰絰之中其以嘉服見則喪禮未畢其以喪服見是重受弔也大夫將若之何皆無辭以見是其事也明乎此然後可以解墨子久喪不能從事聽治之惑可以破杜預段畼天子諸矦卒哭除喪諒陰終三年之謬可以釋蘇軾康王吉服即位之疑周官徵文漢書河閒獻王傳獻王所得書皆古文先秦舊書周官尚書禮禮記孟子老子之屬藝文志周官經六篇王莽時劉歆置博士經典敘録或曰河閒獻王時有李氏上周官五篇失事官一篇乃購千金不得取考工記補之據此三文漢以前周官傳授源流皆不能詳故為衆儒所排賈公彥序周禮廢興載馬融傳云秦自孝公以下用商君之法其政酷烈與周官相反故始皇禁挾書特疾惡欲滅絶之搜求焚燒之獨悉其言亦無所據中考之于古凡得六徵逸周書職方解即夏官職方職文據序在穆王之世云王化雖弛天命方水四夷八蠻攸尊王政作職方一也藝文志六國之君魏文矦最為好古孝文時得其樂人竇公獻其書乃周官大宗伯之大司樂章也二也太傅禮朝事載秋官典瑞大行人小行人司儀四職文三也禮記燕義夏官諸子職文四也諸庶字通內則食齊視春時以下天官食醫職文春宜膏豚膳膏薌以下庖人職文牛夜鳴則庮以下內饔職文五也詩生民傳嘗之日蒞卜來歲之芟以下春官肆師職文六也遠則西周之世王朝之政典大史所記及列國之官世守之以食其業官失而師儒傳之七十子後學者繫之于六藝其傳習之緒明白可據也如是而以其晚出疑之斯不學之過也或曰周官周公所定而言穆王作職方何也曰賦詩之義有造篇有述古夫作亦猶是也召穆公糾合宗族于成周而作常棣之詩則述古亦謂之作詳職方大司樂二條知周官之文各官皆分載其一以為官法故每職之下皆繫曰掌而太宰建之以為六典則合為一書穆王作之特申其告誡俾舉其職爾若夫古之典籍自四術以外不能盡人而誦習之故孟子論井地爵祿漢博士作王制皆不見周官不可執是以議之也古今異宜其有不可通者信古而闕疑可也古玉釋名古玉一長尺有一寸其首㫄閷博寸有半脊與身平十五分其首以其一為之厚其刃半之其末判規不剡上厚如其刃博寸有十分寸之九中閷五之一距首寸有十分寸之八在脊有珥在刃有射倚而不直其博二寸有十分寸之四為孔珥與射之間圍半寸始宛平孫侍郎得是玉秀水朱檢討為作釋圭一篇玉今歸江寧張氏乾隆四十九年七月丁丑訪巴豫籍于左衛街豫籍以示中中以為非圭也圭厚半寸此不合一圭剡上左右各寸半此不合二大圭廣三寸自中以上漸閷上廣二寸半此不合三于是定以為刀云古者玉之為器有戚石之為器有砮有砭皆取其利其于刀也何疑檢討之言有不可通者今并正之云琰圭以易行除慝鄭衆謂其有鋒鋩則其厚且閷之按琰圭有鋒鋩惟在圭首此玉不為圭形而末及一邉有鋒不可以當之厚且閷之檢討藉鄭義以演成其說然由厚而薄則可謂之閷即桃氏所謂從也此玉舉體皆薄何閷之有檢討特嫌於厚半寸之文而從為之辭云王所搢圭插于紳帶之閒蓋其鋭與劍相類所謂終葵首也按天子搢珽文見玉藻注釋文正義並不釋搢義玉篇廣韵說文新附竝云搢插也今搢插相閒成文實為不辭劍鋭故有室圭不鋭故可搢于帶此謂鎮圭圭無搢于帶之事使圭之鋭與劍相類衣與帶必受其病矣終葵者椎也在于圭首其長六寸以明無所詘故謂之珽所謂方正于天下也上言鋭下言終葵制既不合義亦相違云考工記天子圭中必鄭氏謂以組約其中央以僃失墜而典瑞駔圭璋璧琮琥璜之渠睂則以組穿聯六玉是几為圭宜鑿好于肉然後以組穿之也按圭之為體也微韋衣木版三色再就以為薦又以絢組約之其固甚矣鑿好于肉玉人釋器皆無其文大圭不瑑而顧有孔乎約之為義非謂穿也少儀刀卻刃授穎注穎鐶也此孔正與鐶同用圭之約者為命圭圭之搢者為鎮圭檢討亦未之辨典瑞六玉乃斂尸之用開渠為睂令汁得流去穿之以組置尸之上下四㫄經文及二鄭之注甚明非謂凡為圭皆如是也塗車芻靈豈可例生者之器乎且渠之與孔其狀亦異云玉長尺有二寸博二寸按此玉度以今營造尺止尺有一寸在周尺則為二尺檢討不考古制強名為圭懼無以輔其說据依鄭君尺二寸之文而遷就之然豈可以今之尺為殷周之度乎玉之博首末中凡三其度今徑謂博二寸亦非也又不言厚蓋知聘禮記雜記之不可誣也而姑置之云剡其上蓋古琰圭之屬按琰義從剡剡之為言炎也火之炎其上必鑯故圭之剡也其上閷也琰則剡上而判規故凡圭皆剡而獨得琰名非剡上即為琰也然琰之異以判規而其為剡上左右各寸半則同此玉左右射而中汀其不可謂之琰明矣云客有先豫觀者為賦玉劍歌豫考桃氏為劍未聞攻玉玉劍之載于六經者無之按劍之制有末有臘有從有莖有首有􅚆有脊有鐔有夾為長為廣為重前籍具在何不一引以折之而但以六經不載為言夫六經不載之器其傳于後世者多矣是不足以關其口也孔子曰蓋有不知而作之者檢討以之謹按此篇有初藁有次藁原刻据初藁刊板今依次藁更正孤喜孫識周公居東證書金縢武王既喪管叔及其羣弟乃流言於國曰公將不利於孺子周公乃告二公曰我之弗辟我無以告我先王周公居東二年則罪人斯得於後公乃為詩以貽王名之曰鴟梟詩鴟梟鴟梟鴟梟既取我子無毀我室傳寧亡二子不可以毀我周室逸周書作雒解武王克殷乃立王子祿父俾守商祀建管叔於東建蔡叔霍叔於殷俾監殷臣武王既歸乃歲十二月崩於鎬肂於岐周周公立相天子三叔及殷東徐奄及熊盈以略疑當作畔周公召公內弭父兄外撫諸矦元年夏六月葬武王於畢二年又作師旅臨衛攻殷殷大震潰降辟三叔王子祿父北奔管叔經而卒乃囚蔡叔於郭淩凡所征熊盈族十有七國俘維九邑俘殷獻民遷於九畢俾康叔宇於殷俾中旄父宇於東明堂解武王崩成王嗣幼弱未能踐天子之位周公攝政君天下弭亂六年而天下大治七年致位於成王列子楊朱篇武王既終成王幼弱周公攝天子之政召公不說四國流言周公居東三年誅兄放弟史記周本紀成王少周初定天下周公恐諸矦畔周公乃攝行政當國管叔蔡叔羣弟疑周公與武庚作亂畔周周公奉成王命伐誅武庚管叔放蔡叔管蔡世家武王既崩成王少周公旦專王室管叔蔡叔疑周公之為不利於成王乃挾武庚以作亂周公旦承成王命伐誅武庚殺管叔而放蔡叔遷之與車十乘徒七十人宋微子世家武王崩成王少周公旦代行政當國管蔡疑之乃與武庚作亂欲襲成王周公周公既承成王命誅武庚殺管叔放蔡叔乃命微子開代殷後奉其先祀說文治也周書曰我之不豳譜正義引王肅金縢注武王九十三而崩以冬十二月其明年稱元年周公攝政遭流言作大誥而東征二年克殷殺管蔡三年而歸金縢云武王既喪即云管蔡流言周公居東則是武王崩管蔡即流言周公即東征也或曰詩序三年而歸此言居東二年其錯何也曰書言其罪人斯得之年詩言其歸之年也詩車攻駕言徂東傳東洛邑也右凡十一條尚書文簡而事核毛公淵厡子夏偏得詩事逸周書經緯年月節目尤詳列子次第明了最可據依史記於周本紀管蔡宋微子二世家竝不誤勝於魯周公世家許叔重稱書孔氏乃用古文之從井訓治孔壁遺簡安國講授其相承固然逸周書凡三言東不知為何地證以車攻傳乃知即是東都王肅好與鄭異是注持義獨正因具録之史記魯周公世家武王既崩成王少在強葆之中周公恐天下聞武王崩而畔周公乃踐阼代成王攝行政當國管叔及其羣弟流言於國曰周公將不利於成王周公乃告太公望召公奭曰我之所以弗辟而攝行政者恐天下畔周無以告我先王太王王季文王之憂勞天下久矣於今而後成武王蚤終成王少將以成周我所以為之若此於是卒相成王而使其子伯禽代就封於魯管叔武庚等果率淮夷而反周公乃奉成王命興師東伐作大誥遂誅管叔殺武庚放蔡叔右一條据大傳禮成王即位年十三云強葆甚言其小也解弗辟為弗辟攝行政是或一義遷雖從安國受尚書證以說文則此非孔義也至於先流言而後反揆諸情事諒亦宜然惟曲阜之封實惟奄宅奄與三國同畔始見翦滅前此禽父無緣就封然讀辟為避而不言避居東都猶愈於馬鄭爾錢少詹事云春秋傳但云因商奄之民以魯為古奄國出自續漢志未知何據康成元凱俱未實指奄所在也更宜考之中按漢書藝文志禮古經者出魯淹中蘇林曰里名也楚元王傳少時嘗與魯穆生白生申公俱受詩於浮邱伯服䖍曰白生魯國奄里人續漢志注引皇覽曰奄里伯公冢在城內祥舍中民傳言魯五德奄里伯公葬其宅也說文䣍周公所誅䣍國在魯括地志兗州曲阜縣奄里即奄國之地也淹䣍奄古今字爾墨子耕柱篇古者周公旦非關叔辭三公東處於商按武王克商巳建商後洎其晏出管叔祿父相倚為姦周公豈得棄其官位投身必死之地此之不實昭然可見而避之為說實以此言為之緣起以其事在諸子自宋以後學者勞於師心逸於考古雖在方策略不窺尋是以具為說之管之為關則語轉也經典釋文弗辟馬鄭音避謂避居東都馬義今不傳賴此箸之豳譜正義引鄭氏金縢注周公以武王崩後三年出五年秋反而居攝罪人周公之屬與知攝者周公出奔二年盡為成王所得謂之罪人史書成王意也成王非周公意未解今又為罪人言欲讓之推其恩親故未敢豳譜成王之時周公避流言之難出居東都二年鴟梟箋時周公竟武王之喪欲攝政成周道致太平之功管叔蔡叔等流言云公將不利於孺子成王不知其意而多罪其屬黨興者喻此諸臣乃世臣之子孫其父祖以勤勞有此官位土地今若誅殺之無絶其官位奪其土地王意欲誚公此之由然文王世子正義引鄭氏金縢注文王崩後明年生成王則武王崩時成王年十歲服喪三年畢成王年十二明年將踐阼周公欲代之攝政羣叔流言周公辟之居東都時成王年十三也居東二年成王收捕周公之屬黨時成王年十四也明年秋大孰遭雷風之變時周公居東三年成王年十五迎周公反而居攝之元年也居攝四年封康叔作康誥是成王年十八也故書傳云天子太子十八稱孟矦居攝七年成王年二十一也明年成王即政年二十二也詩邶風譜武王既喪管叔及其羣弟見周公將攝政乃流言於國曰公將不利於孺子周公避之居東都二年秋大孰未穫有雷電疾風之異乃後成王說而迎之反而遂居攝三監道武庚叛成王既黜殷命殺武庚復伐三監鴟梟正義引王肅云按經傳內外周公之黨具存成王無所誅殺橫造此言其非一也設有所誅不救其無罪之死而請其官位土地緩其大而急其細其非二也設巳有誅不得云無罪其非三也按馬鄭尚書之學是為古文鄭氏詩箋多異毛義而以此諸條求之則違於道夫君在諒暗三年不言百官總己以聽於冢宰尚書論語檀弓具有明文故曾子問君薨而世子生則有攝主春秋國君未踰年則謂之子斯前代成憲仲尼所据成王之立年止十三又在不言之地周公方抗世子之法於伯禽使王知父子君臣長幼之義念社稷新造旋遭大喪自以王室懿親身為冢宰踐阼而治以填天下而三叔覬主少國疑大臣未附茍肆惡言詿誤百姓相率拒命以濟其姦周公秉國之鈞禮樂征伐皆自己出傷丕基之將墜憂四方之不寧龔行天罰以執有罪是誠不得巳者也洎夫管叔既經蔡霍流放雖任常刑猶悼同氣是故咎鴟梟之取子睹零雨而心悲詩東山我心西悲傳公族有辟公親素服不舉樂為之變如其倫之喪其言有文焉其聲有哀焉斯其仁至義盡者巳必若所言流言一至公即避位流言再至公得不殺身乎釋萬乘之國而為匹夫以遁於野一死士之力足以制之是豈不為之寒心哉公之既出此二年中宮府之事竟將誰屬使二公可代則周公始之亦將不攝況管蔡能以流言閒公其不能以流言閒二公乎此又進退無據者也當成王之立朝野宴然三叔輒思動搖王室及宗臣釋位國釁巳生乃俯首帖耳圜視不動待至三年而後反非其理也故使攝位之舉自公創始處非其據是之謂攘浮言朝播大權夕謝倉皇竄伏若恐不及王躬國事莫復誰何是之謂愚居東二年東征又三年國步既夷王年亦長比其反也乃更居攝是之謂食且公之攝位卿尹牧伯下及士庶其誰不知而云罪人周公臣屬與知攝者此又私黨陰謀之說不可以論周公至於臣屬之誅官位土地之請王肅糾之當矣鄭王時代相接鄭義苟有所本王肅無容不見鄭之門人亦何妨據以難王今既不爾謂之橫造殆不誣也至云欲讓未敢則又水火無端互為生滅豈所謂甚難而實非乎夫孟為庶長之稱矦乃五等之爵以目元良且斷以歲斯固委巷之無稽俗師之鄙背今則奉為科律遷就古書以求符合亦巳過矣在吕氏春秋正名篇曰齊湣王周室之孟矦也固與康矦寧矦之類同其美號又何太子十八之云聖人作事通於神明書闕有閒宜折其中馬鄭前世大儒立義有誤不容骫隨後人襲謬固無譏焉史記魯周公世家初成王少時病周公乃自揃其蚤沈之河以祝於神曰王少未有識奸神命者乃旦也亦藏其策於府成王病有瘳及成王用事人或譖周公周公奔楚成王發府見周公禱書乃泣反周公索隱曰經典無文其事或别有所出而譙周云秦既燔書時人欲言金縢之事失其本末乃云成王少時病周公禱河欲代王死藏祝策於府成王用事人讒周公周公奔楚成王發府見策乃迎周公又與蒙恬傳同事或然也蒙恬傳昔周成王初立未離襁褓周公旦負王以朝卒定天下及成王有病甚殆公且自揃其爪以沈於河曰王未有識是旦執事有罪殃旦受其不祥乃書而藏之記府及王能治國有賊臣言周公旦欲為亂久矣王若不僃必有大事王乃大怒周公旦走而奔於楚成王觀於記府得周公旦沈書乃流涕曰孰謂周公旦欲為亂乎殺言之者而反周公旦右秦漢之際言周公事異義如此
