body:
  text: 江都汪中撰釋曟曑二文東方七宿最明大者莫如心西方七宿最明大者莫如曑故古人多用之以紀時令夏小正五月初昏大火中八月辰則伏詩七月流火春秋傳凡土功火見而致用火中寒暑乃退火出而畢賦火出於夏為三月於商為四月於周為五月火伏而後蟄者畢火猶西流國語火朝覿矣火見而淸風戒寒火之初見期於司里此以心為紀者也夏小正二月初昏曑中三月曑則伏五月曑則見八月曑中則旦詩惟曑與昴三星在天毛傳義此以曑為紀也於文曑從晶大火為大曟曟亦從晶並象二星之形而曐即從之故知曟曑之用該乎列宿矣釋闕天子諸矦宫城皆四周闢其南為門城至此而闕故謂之闕春秋僖公二十一年傳鄭伯享王於闕西辟太傅禮􅍖傅篇過闕則下是也亦謂之闕門穀梁桓公三年傳諸母不出闕門史記巍世家臣在闕門之外是也庫門在外路門在內居二門之中亦謂之中闕扁鵲倉公傳出見扁鵲於中闕是也其異名魯周公世家煬公築茅徐廣日一作弟一作夷闕門秦本紀孝公築冀闕戰國策摩燕烏集闕是也闕巍然而高故謂之巍闕莊子天下篇心居乎巍闕之下是也正月之吉縣治象教象政象刑象之法於此故謂之象巍周官冢宰大司徒大司馬大司寇職文春秋哀公三年傳立於象巍之外是也使萬民觀象故謂之觀禮運出遊於觀之上爾雅釋宫觀謂之闕是也觀有臺故謂之觀臺春秋僖公五年傳遂登觀臺以望是也即門為臺故謂之臺門禮器天子諸侯臺門是也亦謂之門臺春秋定公三年傳邾子在門臺是也觀有左右故謂之兩觀春秋定公二年傳兩觀災是也説文闕門觀也缺也古者城闕其南方謂之從􅹮缺省中按古文闕從史得聲象門闕及兩觀相􅍟形許氏存其文而失其義公羊定公十二年傳何休注天子周城諸矦軒城軒城者闕南面以受過也又因誤解義生此謬説在宫之南故謂之南門顧命逆子釗於南門之外盛德記揖朝出其南門是也亦謂之大門司儀車迎拜辱出大門公食大夫禮賓朝服即位於大門外曲禮車馳而騶至於大門是也亦謂之宫門􅕡人職喪紀之事蹕宫門是也亦謂之公門曲禮大夫士下公門鄉黨入公門是也亦謂之中門與中闕同義􅕡人職掌守王宫之中門之禁是也室中度以几堂上度以筵宫中度以尋野度以步塗度以軌惟城度以雉故王宮門阿之制五雉宫隅之制七雉城隅之制九雉城之度以雉由宫城始故宫城之門謂之雉門春秋定公二年傳雉門災明堂位雉門天子應門是也十有六者異名而同實釋三九上一奇二偶一二不可以為數二乘一則為三故三者數之成也積而至十則復歸於一十不可以為數故九者數之終也於是先王之制禮凡一二之所不能盡者則以三為之節三加三推之屬是也三之所不能盡者則以九為之節九章九命之屬是也此制度之實數也因而生人之措辭凡一二之所不能盡者則約之三以見其多三之所不能盡者則約之九以見其極多此言語之虛數也實數可稽也虛數不可執也何以知其然也易近利市三倍詩如賈三倍論語焉往而不三黜春秋傳三折肱為良醫楚辭作九折肱此不必限以三也論語季文子三思而後行雌雉三嗅而作孟子書陳仲子食李三咽此不可知其為三也論語子文三仕三巳史記管仲三仕三見逐於君三戰三走田忌三戰三勝范蠡三致千金此不必其果為三也故知三者虛數也楚辭雖九死其猶未悔此不能有九也詩九十其儀史記若九牛之亡一毛又腸一日而九回此不必限以九也孫子善守者藏於九地之下善攻者動於九天之上此不可以言九也故知九者虛數也推之十百千萬固亦如此故學古者通其語言則不膠其文字矣釋三九中古之名物制度不與今同也古之語不與今同也故古之事不可盡知也若其辭則又有二焉曰曲曰形容何以知其然也曲禮歲凶年榖不登膳不祭肺禮食殺牲則祭先周人以肺不祭肺則不殺也鄭義然不云不殺而云不祭肺坊記大夫不坐羊士不坐犬古者殺牲食其肉坐其皮不坐犬羊是不無故殺之鄭義然不云不無故殺之而云不坐犬羊春秋傳衛懿公好鶴鶴有乘軒者鶴無樂乎軒好鶴者不求其行遠謂以卿之秩寵之以卿之祿食之也故曰鶴實有祿位然不云視卿而云乘軒論語孔子見冕者雖狎必以貌冕非常服當其行禮夫人而以貌也惟卿有元冕云冕者斥其人也謂上大夫也然不云上大夫而云冕者此辭之曲者也禮器雜記晏平仲祀其先人豚肩不掩豆豚實於俎不實於豆豆徑尺併豚兩肩無容不掩此言乎其儉也本鄭義樂記武王克商未及下車而封黃帝堯舜之後大封必於廟因祭策命不可於車上行之此言乎以是為先務也詩嵩高維嶽峻極於天此言乎其高也本劉協義此辭之形容者也周人尚文君子之於言不徑而致也是以有曲焉辭不過其意則不鬯是以有形容焉名物制度可考也語可通也至於二者非好學深思莫知其意焉故學古者知其意則不疑其語言矣釋三九下孔子曰父在觀其志父沒觀其行三年無改於父之道可謂孝矣三年者言其久也何以不改也為其為道也若其非道雖朝沒而夕改可也何以知其然也昔者鯀堙洪水汩陳其五行彝倫攸斁天乃不畀洪範九疇鯀則殛死禹乃嗣興彝倫攸敘天乃畀禹洪範九疇蔡叔啓商惎間王室其子蔡仲改行帥德周公以為卿士見諸王而命之以蔡此改乎其父者也不寧惟是虞舜側微父頑母嚚象傲克諧以孝蒸蒸乂不格姦祗載見瞽瞍夔夔齊栗瞽瞍亦允若曾子曰君子之所謂孝者先意承志諭父母於道此父在而改於其子者也是非以不改為孝也然則何以不改也為其為道也三年云者雖終其身可也自斯義不明而後章敦高拱之邪説出矣明堂通釋明堂有六一宗周二東都三路寢四方嶽之下五太學六魯大廟逸周書明堂篇周公相武王以伐紂夷定天下既克紂六年而武王崩成王嗣幼弱未能踐天子之位周公攝政君天下弭亂六年而天下大治乃會方國諸矦於宗周大朝諸矦於明堂之位天子之位負斧扆南面立公卿士侍於左右三公之位中階之前北面東上諸侯之位阼階之東西面北上諸伯之位西階之西東面北上諸子之位門內之東北面東上諸男之國門內之西北面東上九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上四塞九采之國世告至者應門之外北面東上此宗周明堂之位也明堂明諸矦之尊卑也故周公建焉而明諸矦於明堂之位制禮作樂頒度量而天下大服萬國各致其方賄七年致政於成王周公既行斯禮太史遂記其事以為禮書今在覲禮曰諸矦覲於天子為宫方三百步四門壇十有二尋深四尺加方明於其上方明者木也方四尺設六色東方靑南方赤西方白北方黑上􅏏下黃設六玉上圭下璧南方璋西方琥北方璜東方圭上介皆奉其君之旗置於宫尚左公矦伯子男皆就其旗而立四傳擯天子乘龍載大旗象日月升龍降龍出拜日於東門之外反祀方明禮日於南門外禮月與四瀆於北門外禮山川邱陵於西門外於時有位於朝者各以其職與執事焉周官載之以為一代之典其在司儀者曰將合諸侯則令為壇三成宫旁一門詔王儀南鄉見諸矦土揖庶姓時揖異姓天揖同姓及其擯之各以其等公於上等矦伯於中等子男於下等其將幣亦如之其禮亦如之其在掌次者曰朝日祀五帝則張大次小次設重帟重案合諸侯亦如之其在掌舍者曰掌王之會同之舍為壇壝宫棘門其在大宗伯者曰以玉作六器以禮天地四方以蒼璧禮天以黃琮禮地以靑圭禮東方以赤璋禮南方以白琥禮西方以􅏏璜禮北方皆有牲幣各放其器之色皆謂是禮所謂君作故也周公既朝諸侯遂率之以祀文王於明堂以配上帝而作詩曰我將我享惟羊惟牛惟天其右之儀式刑文王之典日靖四方伊嘏文王既右享之我其夙夜畏天之威于時􅍖之國史為之序曰我將祀文王於明堂也古者天子即位朝諸矦禮百神具有其事故堯典正月上日受終於文祖在璿機玉衡以齊七政肆類於上帝禋於六宗望於山川遍於羣神輯五瑞既月乃日覲四嶽羣牧頒瑞於羣后伊訓惟太甲元年十有二月乙丑朔伊尹祀於先王誕資有牧方明二文與覲禮正合知明堂為古禮周公監於前代而舉此至大之禮因是而制為會同以發四方之禁施天下之政習禮者傳釋其文以為朝事義而魯之儒者又因周書之舊而增飾之為明堂位篇以表周公之功然有虞氏郊堯夏后氏郊鯀商人郊冥代為一帝周公以后稷肇封有斄思文之德克配彼天而文王受命稱王為周太祖祭之宗廟以鬼享之不足以稱其德于是協之於義制為明堂配帝之禮然後尊親之道備焉故孔子曰孝莫大於嚴父嚴父莫大於配天則周公其人也昔者周公郊祀后稷以配天宗祀文王於明堂以配上帝是以四海之內各以其職來祭斯之謂矣祀方明以禮天地四方之神故尚書大傳曰六宗天地四方也萬物非天不覆非地不載非春不生非夏不長非秋不收非冬不藏皆有功於民故尊而祀之六宗之祀與文王同地故曰宗祀四海九州之君咸在國中不足以容之故為壇於郊淳于登以為三里之外七里之內是也堂有二名有宫室之堂有壇壝之堂説文堂從土高省金縢為三壇同墠馬融注壇上堂楚辭南房小壇觀絶􅋼只王逸注壇猶堂也故為壇於郊得稱曰堂大傅禮四代篇天子盛服朝日於東堂日不可禮於堂亦謂東郊之壇也以其無屋故不曰當􅎝當序端當東西榮而曰阼階之東西階之西以其為壇壝宫故有四門有中階不與寢廟同制其曰應門亦棘門也天子歲即其地以祀五帝周官大宗伯兆五帝於四郊五帝與上帝為通語故大宗伯國有大故則旅上帝注上帝五帝也王制天子將出類於上帝注謂五帝之帝所祭於南郊者五帝分祭於四郊而以南郊為尊故孟夏大雩季秋大享皆在南郊降及秦漢之畤異名同制猶封土為之説文畤天地五帝所基址祭地天子又月即其地聽朔玉藻天子􅏏端而聽朔於南門之外注端當作冕南門者國門也其外則明堂古者禮行於廟禮莫大於王事故天子適諸矦必舍其祖廟諸矦聽朔必於大廟天子諸侯皆受國於祖周之祖為文王而明堂則文王配帝之所視大廟尤重故天子聽朔不於廟於明堂以明文王受命於天始改正朔以頒邦國後世莫敢外焉故春秋書春王正月左氏增成其義曰春王周正月而公羊為之説曰王者孰謂謂文王也是七十子所傳之大義不可誣矣此宗周之明堂其地在郊其制為壇三百步其深四尺旁各一門為周公攝政六年大朝諸矦宗祀文王以配上帝之所逸周書作雒篇周公將致政乃作大邑成周於土中城方千七百二十丈郛方七十里南繫於洛水北因於郟山以為天下之大湊乃設邱兆於南郊以祀上帝配以后稷乃位五宫大廟宗宫考宫路寢明堂咸有四阿反坫重亢重郎常纍復格藻梲設移旅楹蠢常畫內階􅏏階堤唐山牆應門庫臺􅏏閫此東都之明堂也匠人載其制曰周人明堂度九尺之筵東西九筵南北七筵堂崇一筵五室凡室二筵古之室皆分堂之後為之有堂無室則曰榭未有置室於堂之中央及四隅者凡室二筵此言乎南北之修也以九筵之地界為五室室得一筵有十分筵之八可知故不言廣中為大室東為東房西為西房又東為東夾又西為西夾夾室之南謂之東堂西堂五宫皆同此制宗周之大廟路寢亦如之其别於他宫室者四阿反坫之屬及夾室東西堂耳故見於洛誥者曰大室見於顧命者曰牖間曰西序曰東序曰西夾曰西房曰東房曰東堂曰西堂此有周君臣喪祭所親厯之地當日大史載事之明文後之君子舍是將何徵哉東都之明堂亦謂之淸廟故大戴記盛德篇或以為明堂者文王廟也又云明堂以茅蓋屋而春秋傳云淸廟茅屋蔡雍明堂論引檀弓王齊禘於淸廟明堂古周禮孝經説以明堂為文王廟皆其證也周書洛誥正言作洛事而曰戊辰王在新邑蒸祭歲周公曰今王即命曰記功宗以功作元祀按司勳之職凡有功者祭於大蒸故孔悝鼎銘勤大命施于蒸彝鼎然則洛誥所言正功臣從享大廟之禮而周書大匡篇云勇知害上則不登於明堂據篇首此篇之作右武王十三祀其時未有明堂蓋古有明堂之稱故素問云黃帝坐明堂之上晉狼瞫引以為未獲死所之證明乎淸廟之與明堂為一地也周公既祀文王於明堂又營淸廟於東都以其同為祀文王之地故亦曰明堂周公於東都之祀文王作詩曰於穆淸廟肅雍顯相濟濟多士秉文之德􅍟越在天駿奔走在廟不顯不承無射於人斯國史為之序曰淸廟祀文王也周公既成洛邑朝諸侯率以祀文王焉凡特立廟皆異其名故薑嫄曰閟宫文王曰淸廟以其禮為先王所未有故曰王肇稱殷禮祀於新邑咸秩無文古之為政於天下者莫重乎率諸矦以祀其先祖故逸周書世俘篇惟四月既旁生霸粵六日庚戌武王燎於周廟翼日辛亥祀於天位粵五日乙卯乃以庶國祀馘於周廟漢書律厯志亦引此注以為今文尚書非也樂記祀乎明堂而民知孝即指此事日明堂者後人之通語是為武王克商有天下之事宗周明堂之位是為周公攝政致太平之事洛邑之祀是為成王即政營東都以朝諸矦之事三者國之大經也天神不可措之廟故宗周之明堂壇而不屋廟不可享於野故洛邑之明堂在國中尸子君治篇明堂在左謂之東宫是其地也古者為宫室都邑皆取法乎天心三星在赤道南中曰明堂宗周明堂所象也明堂三星在大微宫西南角外東都明堂所象也經始於周公致政之後故曰朕復子明辟曰周公誕􅍖文武受命惟七年天子之路寢謂之明堂者玉藻朝君日出而視之退適路寢聽政月朔既視朔於明堂以其一月之政聽之路寢是以得稱明堂逸禮王居明堂是也與東都之明堂同制是以得稱明堂盛德篇説明堂此天子之路寢也不齊不居其室是也周官大史閏月則詔王居門終月謂路寢之門也不於朝於門所以見其為餘月也謂之曰居是聽政之通名非寢宿之恆處也方嶽之下冇明堂者孟子梁惠王篇齊宣王問曰人皆謂我毀明堂孟子􅍟曰夫明堂者王者之堂也史記封禪書泰山東北址古時有明堂處其制會盟則為壇文在司儀掌舍王所居則為宫春秋傳王巡虢守虢公為王宫於玤晉侯為王宫於踐土猶存其禮荀子強國篇為之築明堂於塞外而朝諸矦亦斯意也辟雍之堂謂之明堂者蔡雍明堂論引禮記大學志禮士大夫學於聖人善人祭於明堂其無位者祭於大學魏文矦孝經傳曰大學者中學明堂之位也禮記昭穆篇詩靈臺正義引作政穆大學明堂之東序也盛德篇明堂其外水環之曰辟雍封禪書天子曰明堂辟雍諸矦曰泮宫白虎通禮三老於明堂以教諸矦孝也禮五更於大學以教諸矦弟也此則起於周衰禮廢名實相淆學者各記所聞遂成異義然既有其名不可沒也魯大廟為明堂者小戴記明堂位大廟天子明堂山節藻棁復廟重簷刮楹達鄉反坫出尊崇坫康圭疏屛天子之廟飾也成王以周公為有勳勞於天下命魯公世世祀以天子之禮樂故周公之廟其制得如明堂記曰季夏六月以禘禮祀周公升歌淸廟蔡雍以為取周淸廟之歌歌於魯大廟明魯之大廟猶周之淸廟是也即經典之正文以考六者之制皆事辭明白可據而後百家之異説可得而辨矣考工匠人職夏后氏世室堂修二七廣四修一五室三四步四三尺九階四旁兩夾窗白盛門堂三之二室三之一殷人重屋堂修七尋堂崇三尺四阿重屋此之制度鄭賈俱望文解義粗明其端其詳要不可得聞何者三代相因遞有損益夏殷權量既不能知宮室之制更無他文可證學非尼父時異東周其于文獻無微之事闕疑焉可也周之五室蓋創始於夏后四阿反坫重亢重郎或寫仿於有殷其他則未嘗相襲故鄭注云此三者或舉玉寢或舉明堂互言之以明其同制賈云謂當代王者其制同非謂三代制同也其言核矣盛德篇采集禮説其有瑕瑜不掩之忠其云一室而有四戶八窗三十六戶七十二牖則因世室之制而誤其云上圓下方則因重屋之制而誤而白虎通蔡雍明堂論並沿其説謬學流傳固與昆侖之圖蒿宫之柱同其閎大矣吕氏春秋十二紀孟春之月天子居靑陽左個仲春之月天子居靑陽大廟季春之月天子居靑陽右個孟夏之月天子居明堂左個仲夏之月天子居明堂大廟季夏之月天子居明堂右個中央土天子居大廟大室孟秋之月天子居總章左個仲秋之月天子居總章大廟季秋之月天子居總章右個孟冬之月天子居􅏏堂左個仲冬之月天子居􅏏堂大廟季冬之月天子居􅏏堂右個按吕不韋傳稱不韋使其客人人著所聞集論以為八覽六論十二紀二十餘萬言以為僃天地萬物古今之事今觀其書儒墨刑名兼收並蓄實為後世類書之祖此十二紀又見於淮南時則訓而其文加詳今不知撰自何人以中星考之乃在周末之世本周書時訓之舊兼逸禮明堂之篇參以新意用垂典章其中先王之制豈無一二賴以傳者而明堂制度最誕妄不經深可忿疾易曰聖人南面而聽天下嚮明而治蓋取諸離故巍舒南面衛彪徯知其必有大咎而孔子之美仲弓亦曰可使南面今以天子之居而四時易位在於三夏則皆北面而朝其臣其謬一也禮文雖闕然五門三朝六寢猶犁然可考今月令之明堂未知建於何所以為在郊則無王者終歲野處之禮以為在宫中則無地容之鄭氏雖傅之大寢然按以周官諸職之文實無一合其謬二也諸室周回其狀如井若不上置衝梯下開隧道則更無出入之門其謬三也神依於廟人居於寢各有攸處是以不相雜糅今四正之室皆曰大廟以時王聽政之地冒始祖世祭之宫雖漢高之祠黑帝周宣之居天臺猶不至此其謬四也以靑陽總章􅏏堂三名與明堂相配然則總為十二室明堂止居其三何以得專斯名其謬五也其他與周制違異者不可枚舉以於明堂無涉故不具論夷考其文實為大一下行九宫之學故盛德篇之二九四七五三六一八即其制作之義漢世謂之明堂隂陽見於藝文志及巍相傳建武以後著為王禮司馬彪所編禮儀志具載其文自馬融入之禮記鄭康成為之作注後世遂尊為經而莫之敢議矣巍書賈思伯傳載其言曰月令亦無九室之文原其制置不乖五室其靑陽右個即明堂左個明堂右個即總章左個總章右個即􅏏堂左個􅏏堂右個即靑陽左個如此則室猶是五而布政十二此説傅會五室舉四正而遺四隅宋人祖之遂為考工月令之調人曾不知吕氏本為假設之詞而自古固未有此制也玉藻正義引鄭志説五室之制曰水木用事交於東北木火用事交於東南火土用事交於中央金火用事交於西南金水用事交於西北周人明堂五室帝一室今就其説求之七筵之堂大室中踞其二南北所餘各得二筵有半在於大廟則無以為朝聘饗食之所在於路寢則無以為聽政合族之地以其與顧命斯干覲禮不合從為之辭而辭則遁矣又神祇無廟享之禮牽合五帝五室之文猥云每帝一室求之禮意尤有所違夫風雨小祀猶在於壇亡國之社始弇其上何有天帝大神而陟降於二筵之室以鄭氏之學其於天神地祇人鬼之别豈猶有未了於心者而忽有斯言可謂千慮之失後之俗儒自謂紹承絶學而巧為之説曰為壇而祭故謂之天祭於屋下而以神祇事之故謂之帝君子於此將哀矜之不暇而又何尤焉議禮之家古稱聚訟較其甚者無若明堂禮曰毋勦説毋雷同必則古昔稱先王孔子曰蓋有不知而作之者我無是也多聞擇其善者而從之多見而識之知之次也竊取其義以作是篇明堂五室二圖明堂位圖吕氏春秋明堂圖釋媒氏文媒氏中春之月令會男女於是時也奔者不禁若無故而不用令者罰之會讀若司會其訓計也男子二十而冠有為人父之道女子十五許嫁有適人之道媒氏令男三十而取女二十而嫁所謂禮言其極亦不是過者也霜降逆女氷泮殺止至於中春則過時矣凡男女自成名以上媒氏皆書其年月日名焉於是時計之則其年與其人之數皆可知也其有三十不取二十不嫁雖有奔者不禁焉非教民淫也所以著之令以恥其民使及時嫁子取婦也王居明堂禮孟冬之月命農畢積聚繫收牛馬月令仲冬之月農有不收藏積聚者馬牛畜獸有放佚者取之不詰非教民盜也所以著之令以懼其民使及時收斂也非徒恥之抑又罰之故曰若無故而不用令者罰之令者媒氏令男子三十而取女子二十而嫁之令也若其有故雖不用令可也內則所謂有故二十三而嫁是也國語句踐令女子十七不嫁其父母有罪丈夫二十不取其父母有罪句踐罪之周官恥之罰之其意一也周之興也周南之化桃夭美之召南之化摽有梅美之其衰也晉失其政綢繆刺之陳失其政東門之楊刺之昏姻之道可以觀政焉先王之所重也媒氏又司男女之無夫家者而會之會之者計之也鰥寡有不能自存者以告於上以門關之財養之為人後者為其曾祖父母祖父母服考為人後者為其本宗之服經惟載父母昆弟昆弟從父昆弟之長殤姊妹之適人者而曾祖父母祖父母無文以記於兄弟降一等推之而知其不可行也此曾祖父母祖父母雖不為之後猶是正尊小功兄弟之服不可以服其祖齊衰三月降則無服準之經意其服本服無疑也持重於大宗服不二斬故降其父母期親無數並服何嫌曾祖上殺益無嫌矣女子子適人者為其父母期為曾祖父母祖父母並不降傳曰不敢降其祖也斯其例與婦人無主答問問曰凡祭婦人無主於禮有徵乎答曰謹按春秋公羊文公二年傳虞主用桑檀弓虞而立尸士虞禮記男男尸女女尸虞卒哭祔練祥禫皆男女别尸别尸則别主虞卒哭祔婦人既有主矣公羊傳練主用栗注期年練祭埋虞主於兩階之間易用栗祥禫之祭婦人猶有尸而於練不為作主斯不然也埋其虞主而不作練主斯又不然也自練至毀廟惟一主然則婦人有主明矣祔禮之見於雜記喪服小記者婦祔於祖姑妾祔於妾祖姑公子公孫之為士大夫者其妻袝於諸祖姑亡則皆中一以上而祔妾無妾祖姑者易牲而祔於女君祖姑有三人則祔於親者始來仕無廟者夫卒而祔於其妻其妻為大夫而卒而後其夫不為大夫而祔於其妻則不易牲妻卒而後夫為大夫而祔於其妻則以大夫牲苟所祔者無主於廟則後之虞主於何而祔婦雖與夫同廟亦有分祭之禮故雜記男子祔於王父則配女子祔於王母則不配若婦人無主王母何以得專其祭穀梁傳文公二年正義麋信敘録字南山東海人魏樂平太守引衛次仲次當作敬云宗廟主皆用栗右主八寸左主七寸廣厚三寸祭訖納於西壁坎中去地一尺六寸右主謂父左主謂母是可據也問曰吉祭婦人何以無尸也答曰謹按少牢饋食禮筮尸之命曰孝孫某來日丁亥用薦歲事於皇祖伯某以某妃配某氏以某之某為尸尚饗是婦人與夫共筮一尸非無尸也吉祭雖止男尸尸既孫行其體於祖父母則一斯不必更象以孫婦矣鄭注司几筵云雖合葬及同時在殯皆異几體實不同祭於廟中同几精氣合是其義也中又論之婦人之尸必使異姓不使賤者若並筮二尸其為夫婦不可必知交錯室中於事為褻在於禘祫尤不可行故援爵諡從夫之義不立女尸至於主則無嫌也其有異宫若周祭薑嫄魯祭仲子亦必有尸矣方苞侍郎家廟不為婦人作主以為禮也中謹據禮正之如此女子許嫁而壻死從死及守志議女子之嫁其禮有三親迎也同牢也見舅姑也若夫納采問名納吉納徵請期固六禮與然是禮所由行也非禮所由成也何以知其然也曾子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母壻巳葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命女氏許諾而不敢嫁禮也壻免喪女之父母使人請壻弗取而後嫁之禮也女之父母死壻亦如之由是觀之請期之後其可以改嫁者凡四焉而皆謂之禮然則納采問名納吉納徵請期是禮之所由行也非禮之所由成也故曾子問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之曾子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪女在塗而女之父母死則女反於是鄭氏增成其義曰未有期三年之恩也明乎親迎而後可以喪其舅姑親迎而後可以出降之服服其父母也先王制禮以是為不可過也故女子許嫁而壻死從而死之與適壻之家事其父母為之立後而不嫁者非禮也夫婦之禮人道之始也子得而妻之則父母得而婦之故昏之明日乃見於舅姑父得而妻之則子得而母之故繼母如母不為子之妻者是不為舅姑之婦也不為父之妻者是不為子之母也故許嫁而壻死適壻之家事其父母為之立後而不嫁者非禮也禮女未廟見而死不遷於祖不祔於皇姑壻不杖不菲不次歸葬於女氏之黨示未成婦也今也生不同室而死則同穴存為貞女沒稱先妣其非禮孰甚焉婦人內夫家外父母家父母生我者也夫成我者也父母之喪無貴賤一也婦人不二斬故為夫斬則為父母期未有夫婦之恩而重為之服以降其父母於壻為無因於父母為不孝失禮之中又失禮焉女之嫁者為人後者並以出降為父母期若使非我大宗而強為之後是所謂不愛其親而愛他人者也何以異於是先惡人之以死傷生也故為之喪禮以節之其有不勝喪而死者禮之不許也其有以死為殉者尤禮之所不許也雖然父子之親君臣之義夫婦之恩不可解於心過而為之死君子猶哀之茍未嘗以身事之而以身殉之則不仁矣女事夫猶臣事君也仇牧茍息君亡與亡忠之盛也其君茍正命而終於寢雖近臣猶不必死也若使巖穴之士未執贄為臣號呼而自殺則亦不得謂之忠臣也何以異於是哉劉台拱曰歸太僕曰女子未有以身許人之道也女未嫁而為其夫死且不改適是六禮不備壻不親迎比之於奔其言婉而篤矣中以為未盡也事茍非禮雖有父母之命夫家之禮猶不得遂也是故女子欲之父母若壻之父母得而止之父母若壻之父母欲之邦之有司鄉之士君子得而止之周公監於二代而制為是禮孔子述之意周公孔子不可非乎則其禮不可過也故曰過猶不及昏姻之禮成於親迎後世不知乃重受聘以中所見錢塘袁庶吉士之妹幼許嫁於高秀水鄭贊善之婢幼許嫁於郭既而二子皆不肖流蕩轉徙更十餘年壻及女之父母咸願改圖而二女執志不移袁嫁數年備受箠楚後竟賣之其兄訟諸官而迎以歸遂終於家鄭之婢為郭所窘服毒而死傳曰好仁不好學其蔽也愚若二女者可謂愚矣本不知禮而自謂守禮以隕其生良可哀也傳曰一與之齊終身不二不謂一受其聘終身不二也又曰烈女不事二夫不謂不聘二夫也歸太僕曰女子在室惟其父母為許聘于人而己無與焉純乎女道而巳善夫述學别録講學釋義講習也習肄也肄講也國語三時務農而一時講武春秋傳大雩講于梁氏又孟僖子病不能相禮乃講學之月令孟冬之月天子乃命將帥講武肄射御角力是也古之為教也以四術書則讀之詩樂同物誦之歌之弦之舞之揖讓周旋是以行禮故其習之也恆與人共之學而時習之有朋自遠方來所謂君子以朋友講習也傳曰宵雅肄三又曰臣以為肄業及之皆謂此也學人習之其師則從而告之記曰小學正學干大胥贊之籥師學戈籥師丞贊之春誦夏弦大師詔之瞽宗秋學禮執禮者詔之冬讀書典書者詔之曰學曰贊曰詔必皆有言故于文講從言其行禮也或謂之相或謂之傅一也孔子適宋與弟子習禮大樹下魯諸儒講禮鄉飲大射于孔子冢皆講學也禮樂不可斯須去身故孔子憂學之不講後世羣居終日高談性命而謂之講學吾未之前聞也釋夫子古者孤卿大夫皆稱子子者五等之爵也周官典命公之孤四命以皮帛視小國之君大行人大國之孤其禮視小國之君春秋傳列國之卿當小國之君小國之君則子男也子男同等不可以並稱故著子去男從其尊者王朝則劉子單子是也列國則高子國子是也王朝生稱子沒配諡稱公列國生稱子沒配諡亦稱子此其别也稱子而不成詞則曰夫子夫者人所指名也其見春秋傳者曰夫固謂君曰夫豈不知服云夫謂鬪伯比曰夫石猶生我服云夫謂孟孫曰夫不惡女乎服杜並云夫謂太子曰夫獨無姻族乎杜云夫謂晉曰夫亦愈知治矣杜云夫謂尹何曰女夫也必亡杜云夫謂華亥是也以夫配子所謂取足以成詞爾凡為大夫自適以下皆稱之曰夫子孟獻子穆伯之孫穆伯之二子親為其諸父而曰夫子崔成崔強稱其父亦曰夫子故知為大夫者例稱夫子不以親别也孔子為魯司寇其門人稱之曰子曰夫子後人沿襲以為師長之通稱而莫有原其始者左氏春秋昭七年孟僖子召其大夫曰我若獲沒必屬説與何忌於夫子使事之疏云身為大夫乃稱夫子此時仲尼未仕不得稱為夫子以未仕之時為仕後之語是邱明意尊之而失事實益知唯卿大夫得稱夫子也釋厲字義戴君云衛風深則厲説文作砅云履石渡水也爾雅則曰以衣涉水由帶以上為厲此爾雅之失當從説文中按説文砅或作濿厲乃濿之省文下亦云徒行厲水也二文正通非爾雅之失履石渡水為厲以衣涉水由帶以上亦為厲一文二義未可偏廢詩有狐在彼淇厲楚詞石瀨兮淺淺瀨與砅同此履石渡水之厲列子説符篇孔子自衛反魯息駕乎河梁而觀焉有縣水三十仞圜流九十里魚鱉弗能遊黿鼉弗能居有一丈夫方將厲之此以衣涉水之厲詩都人士垂帶而厲傳厲帶之垂者方言帶之垂者謂之厲禮大帶垂三尺涉水則垂者先濡此又因由帶以上之厲轉相訓而生是名也深則厲之義以爾雅為長釋郢孟子文王卒于畢郢趙氏注止云畢郢地名偽疏則云郢楚都在南郡此固邈不相涉按周書史記解畢程氏以亡吕氏春秋具備篇云武王常窮于畢裎矣高誘注畢裎畢豐裎之為豐亦無其據周書云王季宅程又曰文王在程作程寤程典召南譜正義云程亦在岐南是周地之小别皇甫謐云文王徙宅于程豐在京兆鄠縣東豐水之西文王自程徙此皇矣詩云度其鮮原居岐之陽在渭之將正義以為即程邑然則郢裎程止一地形聲小異耳六國獨燕無後爭義顧處士以秦滅六國獨燕無後謂燕棄其宗枝中謂六國燕弱且僻至易王始見于史所載國事多略公侯卿大夫亦罕今其見者曰市被曰騎劫曰栗腹曰卿秦曰將渠曰鞠武皆將相大臣無以定其非同姓也秦滅六國世家于韓曰虜王安于趙曰顔聚亡去以王遷降又破嘉遂滅趙于魏曰虜王假遂滅魏于楚曰虜楚王負芻于燕曰虜燕王喜卒滅燕于齊曰秦兵入臨淄王建遂降遷于共而淮南子言遷流于房陵列女傳言秦殺假誅羣公子滅其族貨殖傳言虜卓氏信陵君傳言屠大梁貨殖傳言遷宛孔氏秦之威虐所及世家不具也以秦之切齒于燕既并天下逐太子丹荆軻之客皆亡漸離變名姓為人庸既以善擊築得赦則王喜太子丹豈有種乎高帝紀云高祖曰秦始皇帝楚隱王陳涉魏安釐齊湣王趙悼襄皆絶張耳陳餘傳云秦為無道破人國家滅人社稷絶人後世據此則六國值暴秦之世並國滅無後未可咎燕宗之不振也且六國之立特豪傑假其名號以收人心非必為本枝計也韓廣將兵徇燕地燕故人貴人豪傑謂韓廣曰楚巳立王趙又立王燕雖小亦萬乘之國也願將軍立為燕王是時楚立陳勝趙立武臣燕之立韓廣亦何異哉處士博學詳説中所服膺而斯言則不核故為爭之五諸侯釋名史記項羽本紀漢王部五諸侯兵東伐楚漢書同五諸侯塞王欣翟王翳河南王申陽魏王豹韓王信也漢二年漢王東略地塞王欣翟王翳河南王申陽皆降韓王昌不從使韓信擊破之更立韓太尉信為韓王三月漢王從臨晉渡魏王豹將兵從此其國土其位號其兵皆具故數之也章邯方受圍于廢丘司馬卭巳為漢所虜則應邵有雍與殷如淳徐廣無韓有殷韋昭無河南有殷者皆非也張耳跳身歸命何士卒之足言留侯多方誤楚豈可為據師古之説荒矣答錢少詹事問問陳書本紀太建五年左衛將軍樊毅克廣陵楚子城六年廣陵金城降十二年周廣陵義主曹藥率衆入附以上三條所云廣陵今之江都乎抑後魏僑置之廣陵乎承問陳書宣帝太建五年六年十二年所云廣陵皆在今揚州府治之北四里漢之廣陵國隨之江陽縣也陳承梁亂淮南州郡或陷或存廣陵則為南兖州如故也太建五年則樊毅乃從吳眀徹北伐當時兵路由江入淮由淮入泗六年則新克夀陽江北兵力正盛楚子城金城蓋軍戍之别壘為齊人所據者故樊毅傳云攻廣陵楚子城拔之擊走齊軍是也若曹藥之附乃當太建十一年淮南盡亡之後其時亦得其一隊之人而未嘗得其地本紀云南北兖晉三州及盱台山陽陽平馬頭秦厯陽沛北譙南梁等九郡民并自拔向建鄴亦此類也是時周於廣陵置吳州總管為重鎮矣義主南史作義軍主於辭義為完陳齊周交兵南極建康北極吕梁西極壽陽而止若魏僑置之廣陵乃分東豫州置據隨志東豫州在汝南新息縣陳之兵力所不至且魏興和中所置至此或併或廢不可知且又人戶不滿二千無緣别有城戍也答人問問郊用牲而易傳曰聖人亨以享上帝豈亦有體薦折俎歟答周語禘郊之事則有全蒸鄭注內饔實鼎曰脀蒸脀古今字耳禮器郊特牲郊血大饗腥三獻爓一獻孰注血腥爓孰遠近備古今也尊者先遠差降而下至小祀孰而已中謂天子祭宗廟及郊並血腥爓孰具羣小祀及大夫士祭其先薦孰而已上得兼下下不得僭上韋昭訓蒸為升是也云禘郊皆血腥則未盡也既云全蒸則牲體不解可知記稱函牛之鼎蓋為是用與郊有燔燎正祭止有特牲熊氏皇氏以為分牲體而用之唐元宗鶺鴒頌跋尾唐元宗行書今存于世者惟金仙公主碑及石臺孝經後之批答手書並豐徑氣象偉如望之心懾所謂五十年太平天子者猶令人想見其盛此書筆致翩翩可云具體行間時有米法或疑為元章所摹然元章善于仿古往往亂真果出其手亦可謂買王得羊矣據集古録稱王沂公舊有刻本今不可見此卷較戲鴻堂所刻豪髮無異故知是其底本思翁精鑒自當先得我心也徐季海書朱巨川告身跋尾宣和書譜收唐人告身凡三十有六今其存者惟此本耳自洪武中尚書開濟刊定文書頒行新格唐宋以來舊式後人遂無由得知此本戲鴻堂快雪堂二刻均刪去官階但存署名意在從簡不若停雲館所刻顔書朱巨川告身之為得體也其敕由中書而門下而尚書當日三省職掌如是侍中中書令罕正授者中興後勳臣方鎮率多為加官雖不判省事猶列其官崔祐甫傳載朱泚郭子儀事亦其例也尚書省諸官自署其名而中書門下二省皆令史所書者告身為尚書吏部之事故于中書門下二省但録其文若今之鈔白也尚書但有左丞者以左丞總吏戶禮三部也署名不署姓者六人曰鴻漸綰慶渙亞者杜鴻漸楊綰裴遵慶蔣渙杜亞也鴻漸綰遵慶亞及元載皆有傳蔣渙見崔元暐傳于時遵慶年且九十可謂衣冠盛事曰察延昌者宰相世系表有王察李延昌皆值是時未知即其人否郗昻有樂府古今題解三卷見藝文志此告舊傳為徐季海書季海是時自廬州召入復為中書舍人中書舍人職地尊嚴書告本非其職或本人自以情求之則有之矣其筆勢沈雄具有怒猊抉石渴驥奔泉之狀固知非季海不能也此跋為畢尚書作雲麾將軍碑跋尾雲麾將軍李思訓碑所書厯官皆與史合史蓋采碑以為傳也思訓嘗為江都令李北海乃其縣民其曰姪吏部尚書兼中書令集賢院學士修國史者林甫也林甫為思訓弟揚州參軍思誨之子開元二十二年五月林甫以黃門侍郎為禮部尚書同中書門下三品此則資淺望輕所謂以它官兼攝其名不正者也至二十四年十一月進兼中書令則巳為真宰相而同中書門下三品之銜不復稱之矣此則開元時之令式也其為吏部尚書則為二十七年四月事是時北海年六十有三此碑之立當在其後矣又八年而林甫搆杜有鄰獄北海遂以枉死文字之緣不足以庇其身林甫之賊虐蓋可畏哉雲麾碑書法出於大令變本加厲益為徑險其於用筆之法可謂發泄無餘矣米元章趙子昻董元宰各以書雄一代其實皆從此碑得法故是碑實法書之津逮也懷素草書千字文跋尾懷素自題云貞元十五年年六十三當以開元二十五年生至貞元中已為尊宿郎官石書記在二十九年則人書俱老自敘帖所謂恨不與張顚長史同時是也右軍草書正如德驥馳騁之氣固而存之虔禮之譏子敬元章之議張旭正病其放爾此卷沈鬱權竒生氣勃勃而求以右軍之法不失豪釐無復怒張之習可謂草法中興書家之聖在于唐代惟書譜足以相抗往者安氏得書譜真迹刻以行世世謂之千金帖此本可與之爭席矣王澍給事嘗謂右軍以後惟智永草書千文孫過庭書譜足稱繼武可謂知言然余惜其未見此本也三家之學右軍各不相謀譬如九方臯之相馬得其精而忘其粗得其內而遺其外是所謂深造自得者然外此亦罕嗣音矣顔魯公揚少師草書意外雄奇于右軍要為别派爾日對此書莫名其美憶唐太宗論右軍書云煙霏霧結狀若斷而恆聮鳳翥鸞翔勢如竒而反正可謂善于形容者矣請為素師誦之此跋為畢尚書作高府君墓志跋尾高力士太馮盎曾孫為延福養子延福無他才能以力士之故生與其寵沒揚其名蓋有天幸焉誰非人子苟欲保世亢宗尚念之哉汪中贈謙之學書并題孫季良見新唐書文苑傳延福又有神道碑張燕公撰見文苑英華九百三十一卷志云開元十年卒年六十三碑作十二年年六十四未知孰是碑及唐書宦者傳皆云名延福蓋以字行也定武石刻修禊敘銘嗟余薄祜居賤且貧晚獲此寶期沒吾身存莫之敓亡或以殉哀而聽之實為仁人定武修禊敘篋銘雲門在梁昭陵以玉鮫龍守之舟行不覆揚州營遊擊白公頌并序古之政典自軍將至於伍長皆取備於六鄉之吏平日則治其夫家井牧飲射讀法之事有故則授之兵而掌其徵令於事無不當為故恩信在人周知閭閻之疾苦而所至有功兵農分而文武異其用武臣雖存心利物而勢有所不得為故功蓋天下而不足以得民心夫事不越職而道濟于生人此公之所以不可及也公以侍衛厯官揚州營遊擊以恤以練士氣既作政肅人馴罔或羣飲譁于市者凡利民之事若迫于身宣德達情政無回隱追胥糾暴人告其心他吏或耽逸非度畏公清直輒逡巡斂迹雖臧穀婦子莫不尸而祝之灑然如出一口而公之德政尤在救火城市窮鄉陽焰一發則匹馬如風萬人辟易而至騰踔火中燎及鬚睂指揮水龍應手而滅是以自公至而火不為災夫兵猶火也先王以火政昭顯天地之光明化腥臊而救時疾其利庶矣燎原之勢不可嚮邇于是乎以生人之道殺人兵者凶器聖人作之以威不軌于是乎以殺人之道生人周以司爟隸夏官而掌行火之政令天生五材而並用之蓋以兵火為官聮而公能舉其職者也比之攻城野戰勦民命以為名者其功為大詩曰凡民有喪匍匐救之豈非仁人之利哉蟄居發策每攬古賢人治績和風甘雨成物樂生恨不生及其時謳詠其行事況在下風敢忘休烈公白氏名雲上河內人頌曰猿臂頎頎渥丹其顏駿馬錦衣赫如神人吮創分甘即之也溫嘻嘻出出灼我頭額朱旗四麾煙銷煤息熒惑風師嗚喑卻立原土不焦萬瓦猶赤繫鼓刲羊酺醵有懌作此好歌以紀文石師君贊日料鹽穀千人以活既安既集歸乎井溢村名師姓所居凡百君子視此淳德水毁木飢歲無我厄褊針峭厲峻急不集其福泛愛容容遊心自得弓張必弛以養其性在醜孰尊惟學之競華嶽倚天其麓則平陂澤流惡不疾以清與為其高寧為其大廓如渾如庶無災禍朱先生學政記敘乾隆三十六年先生以翰林院侍讀學士提督安徽學政以十一月甲子到官既歲考遍科考及安慶甫卒事用造册誤左遷去在官凡二年先生敦厚有大度篤念故舊然廉正無所苟自其少時巳負盛名既回翔翰林二十年為通人學士所歸宿故所至常務扶樹道教以人材經術名義為急於婺原得故歲貢生江永故處士汪烜上其書於朝且祀諸紫陽山合食於朱子於亳得陳烈女於阜陽得張烈女於和州得薛孝子為立碑冢上率有司以特牲祭其冢皆身不接其人其事不領於學官而激揚慨慕若恐不及旌門配祀潛德用光百世之下聞其事者感焉豈所謂樹之風聲者與信乎大賢之德長也先生教不一術其要以通經習小學為大端凡所甄引咸著於録嘗慨史文闕略搜所部金石遺文得三百餘通别為安徽金石志三卷拾遺刊謬俾古事昭晳於真文忠公講學丹陽及元張羽奉事不屈事尤核先生既被議天子仍置諸翰林領四庫書局諸生樂先生之教而惜其去重念古者行人之職固以萬民之禮俗政事教治刑禁之逆順為一書反命於王以周知天下之政因屬中次其事迹兼仿趙商鄭志之例釐為四卷俾後之教者有所取法先生於人多所愛故居官常過於厚強其所不足而愼終如始則先生優為之矣旃蒙敦牂寎月謹敘龍潭募建避風館疏江東之渡秦漢以上在江乘自齊浣開伊婁河乃下趨於京口而龍潭當其中為唐升州下蜀戍地往來者多取徑焉地屬句容治為句容城北行七十里至此入河又東北行二十里至龍趵州始出大江又北行二十里至青山為儀徵地又東行十里至新河江路自此止又東行十里至儀徵城其江北上岸下船皆新河其江南上岸下船皆龍潭新河居民旅店相鱗次風不利則就宿焉故行者無所苦龍潭既去江遠包以回沙復嶼蓬葦蒲柳相參錯故風水之信嘗不得而悉及船達江口其地荒野無人迹而船率露版無篷不可以栖宿或雨雪日暮加之皇迫故顛風怒濤必犯險而渡焉當其時中流而滅沒在望也號呼冤痛之聲相聞也而勢不能以中止舉不訾之軀眀知其畏途也而蹈之至于併命魚腹一瞑而萬世不視是可哀也若其顚連驚悸病惑失志遂為棄人者又時時有之而財物之亡失則不足道巳今度龍趵洲之南高卭之地夏水所不至者造草屋三間中祀江神召僧之強幹願慤者主之仿京口之制榜曰避風館官為條教不可使胥役與其事凡南來之船遇風則止其下就宿者人三錢歸之僧飲食聽之貧者量減其數風止乃行于船錢勿有增損以龍潭埠戶領之如故且天險既夷行者日多維舟人亦無不利焉此地舊為江船所停泊又句容漕船每歲經此交兌百物市易之利久而自滋若使居人稠聚更建汛地北對靑山營為江南屏蔽守望相助盜賊鹽梟並得資其防緝至龍潭差役既繁船多敝漏尚將召募紅船二以備不虞今其力不能遽集也建屋之費約銀二十兩館始建恐四方行旅不能知僧無所得食酌與薪米銀十二兩共應用銀三十二兩凡諸樂善之人幸相與成之嗚呼人生實難況非死所井有人焉君子可逝是故無惻隱之心非人也易曰澤上有地臨君子以教思無窮容保民無疆其所以使天下之民無一夫不被其澤者蓋以是矣與劉端臨書汪中再拜敬致端臨足下曩者中與次卿為深友次卿沒而中不復有出境之交以為疾病死亡之際不能自必於一見適以負疚於朋友故不如其巳雖然中自里閈生長以至宦學四方道路之中所與朝夕遊處者何可勝計而心許者無過三數人至於抗志希古尚友其人如及其時而與之進退揖讓又何必於吾身親見之而後為樂哉故中與端臨聞名而思既見而相許不數日而遽别離索之感常為愔結於心然念他山攻錯之義誠使學業行誼表見於後世而人得知其相觀而善之美則百年易盡而天地無窮今日之交乃非偶然離散之故又不足言也中見族兄觀魯道足下涵養寧靜之言以為深中吾病相對咨嗟纍日觀魯曰君往者不受人言而今心折劉君者有説與中曰往者人之立言其始欲摧我以求勝其卒歸乎毁方以媚於丗是適足以發吾之激昻耳劉君欲吾養其德性而無騁乎血氣此吾所以服也足下天資清粹穆然有道之人學問之事吾何間然惟是居官蒞事必求其實用毋使文法俗吏得以妄訾儒者至於犯顏敢諫仗節死義則必常持斯志以成吾浩然之氣此小心愼密之久恆足以有為也自惟生平風義不當為世俗可市之言遂爾快意纍纍又朋友相字禮也故欲與端臨行之天寒伏惟勉食自愛心慰遠人臨書惘然中再拜與端臨書正月二十一日汪中頓首謹致端臨大兄足下去年十月中得四月見寄一書知留京教學以待決科于足下謀生之計甚得即會試不可必或上館得一教職亦足為養親地貧不可長忍也正歲再得書知有是正文字數條惜未及指示一二中于經文亦有是正數處幸足下教之堯典光被四表偽孔傳訓光為充戴君云光當作橫本與下句為對舉中按鄭君治古文尚書詩噫嘻箋云噫嘻乎能成周公之功其德已著至矣謂光被四表格于上下也周頌詩譜引此亦作光字噫嘻正義引注云言堯德光耀及四海之外此鄭注也其非橫字明矣漢書宣帝紀甘露二年陛下聖德充塞天地光被四表然則光又不可以充訓也古音橫黃同聲黃從炗古光字則又不必易光為橫也多方云天惟五年須暇之子孫于義不了周頌武正義引書云天惟五年須暇湯之子孫有一湯字其義方足文苑英華七百五十二卷朱敬則北齊文宣論則云須夏湯之子孫又以暇為夏義亦得通此異文不可不知也執金吾武榮碑亦世載德楊震碑亦世繼明綏民校尉熊君碑亦世載德李翕西狹頌今在成縣亦世賴福中常侍樊安碑亦世載德樊毅修華嶽廟碑亦世克昌先生郭輔碑休矣亦世並見隸釋亦世即奕世也然則大雅之不顯亦世乃丕顯奕世耳顧處士巳釋不為丕其奕世則中所得也月令注有娠釋文音身又音震然則詩大任有身載震載夙左氏傳方震大叔身震並與娠同也禮記一戎衣康誥及左傳宣六年所引皆云殪戎殷殷衣鄭注巳言之一即殪之誤也凡此諸條甚多惜不得一一為足下言之去年交歙程舉人瑤田洪中書榜二君與金殿撰于戴君之學皆可云具體又長夏客江寧與錢少詹事相處日夕談論甚契惜不能為足下詳説之程君今在豐潤時來都中客歙縣會館其人有體有用不可不內交之李成裕客彭侍郎幕中王懷祖竟無出山之志二人俱衰病侵尋日多鬱抑李君相見時每以足下篤信宋人為恨君子之學如蛻然幡然遷之未審比來進德修業亦嘗發寤于心否所諭鳩集文字中亦素有此志然中之志乃在述學一書文藝又其末也道遠會稀相思何巳諸惟珍玉不盡拳拳汪中頓首上竹君先生書八月二十三日門人汪中頓首奉書先生門下七月初剱潭至曾肅一書奉上嗣得誠齋先生書知入夏病瘧甚憊因欲往歙省之計可謁先生於黃山適以秋熱侵人老母舊疾舉發是以不果來南望悵悵心靡所屆在昔樹人之計敬仲期以百年容善之臣秦穆思其有利眼前碌碌諸公非先生尚誰與任之哉是故責望愈深而引之愈力負纍愈衆而處之愈豪愛憎毁譽之端遇之而平恢奇慢易之習投之而融乞假沾被之情竭之而滿然則先生蓋亦樂乎此而不反也斯其所以大與中汨于習俗碌碌無成於古人為學之方至今歲始窺其門戶任重道遠莫能自致羣疑衆難就正末由其汲汲無歡可知也里中人事數月來頗為衰減光伯叩城竟以凍死楚望談經終日未飯恐為其續奈何方公有事上之敬有下士之禮在公之門者程檢討及中皆其部民而中尤有賴焉被先生之蔭無巳也嗚呼人生而有羣於是有交相為用之勢勢迫而事起於是有作而致之之情以此知人生之難也尋珊竹公墓詩一卷呈上中久不親丹槧數年不復作詩觀之輒為失笑李朝陽者嘗於程檢討座上見之其視中藐焉蓋杜溫夫其人也剱潭日常鬱鬱中與之燕語以為非壽者之徵今不知何如矣有書敢乞致之伏惟起居萬福汪中頓首上朱侍郎書十二月十五日汪中叩頭謹上夫子門下七月中紀綱北上奉到手書及犀角華莢聮舟器一件中母於七月朔棄養凡在遠道俱未告哀故未敢赴於左右中方居苫􅒘準之於禮非喪事不言故不獲敬問起居今葬雖未舉而時日淹遲巳當三虞卒哭之後意人事其可通乎母氏食貧守志于衰宗有再造之功中撰墓銘一篇表述先德鬻子之閔鮮民之哀具載于篇少暇當録一本呈上故兹不詳及其石之首大書七字曰汪氏母勞苦之碑惟夫沒從子之義凱風寒泉之思章于來世庶幾不朽敢乞夫子銜名題之資于淸德以發幽光夫子其哀而許之乎巡撫畢侍郎今歲買書畫七百餘兩參术之費喪葬之資咸取給焉誠可感也向蒙夫子為中致書是以及之中叩頭再有請者秀水鄭贊善一代名德且與先師學士有淵源之舊身後有子三人皆貧不自立然淸門世學文行修飭其第三子師亮經年臥疾若存若亡第七子師靖寄食亳州僅能糊口第八子師愈才調最美比于贊善可云具體而微又善星命以之入世雅俗共賞向依金糧儲糧儲用財有坤道之吝嗇今又卒官鄭君益無所託表康成之里字任昉之孤不於夫子其誰望之且其人國子監生未有考校之事薦以一館無嫌也夫子豈有意乎中與鄭君久不相見時念之故敢陳乞幸垂意焉與巡撫畢侍郎書汪中頓首謹覆書年伯弇山先生閣下得手教及與鹽政全公書竊以為閣下之德量古人未之有也何者古之人雖好士必見其人而後好之而閣下乃施之于其所不相識之人推是心也天下之士其有一人不被公之澤者哉比公移節河南歲事不登荒政具舉飢而不害維古有之若大旱用作霖雨又云百姓望君如歲於公見之矣昔子産治鄭西門豹治鄴汲黯治淮陽黃霸治潁川虞詡治朝歌張全義治洛陽並以良績光于史策公既兼其地又兼其政邦家之光民之父母斯則中之所企注者耳中少日問學實私淑諸顧寧人處士故嘗推六經之旨以合于世用及為考古之學惟實事求是不尚墨守所為文恆患意不稱物文不逮意不專一體重蒙君子賞譽輒欲盡寫所作以奉淸娛值夏暑侵人重以病目日月推遷竟無成緒夷門之報不在片言半詞先生覽其遺事亦可量中之心矣中向者于周秦古籍多所校正于墨子巳有成書誠不及先生所刊之精確不敢自匿所短謹録序目奉上又有後敘篇在季仇書中伏乞教之射陽石門畫像東漢時物其石今在中家謹以打本二奉上東京夢華録何焯學士所校亦奉左右先生行部之日按籍而稽當用發深慨耳與劒潭書正月二十四日中白足下以孤子為母氏所成就克有聞于世凡其相習者與之言則必及其母凡其有文者則必求為之述其母記曰君子之所謂孝也者國人稱願然曰幸哉有子如此可謂孝也巳其子之謂歟雖然子之所望於人者不過狀婺室之艱貞敘生我之勞瘁當世號為女宗國史懷其舊俗如是而止矣竊以為虛文無濟未足以充子之志也以中所見大抵為寡婦者必夀其子苟成也則家必昌雖貧也必孝此天道之可知者然當始孤之日蒙稚無知其親血氣堅壯疾疢不作而飢寒愁痛斫削萬端使不得一日遂其性洎其子成人授室門戶再造之日方思從容頥養以娛暮年而精力奄亡􅚿然稿木參苓梁肉無補于既敝之身是憂患之日則其親既當之而以傷其生安樂之日則妻子僕妾皆得與享之而親轉不能堅其命豈非生人之至痛哉是雖日用三牲之養曾不若及其壯而日一再食之為美也孟子曰鰥寡孤獨天下之窮民而無告者文王發政施仁必先此四者然吾觀先王之世耆老孤子則司門遺人得以委積財物養之惟寡婦無聞餘夫授田見周官遂人及孟子間民無常職轉移執事見大宰及詩載芟疏蘧篨戚施侏儒矇瞍聾聵官師之所材見晉語皆不及寡婦無逸謂文王惠鮮鰥寡約言之耳王制云皆有常餼與孟子同不知何王之制魏書食貨志太和九年行均田法寡婦守制者雖免課亦授婦田列史此外所見當更考之故大田多稼至于遺秉滯穗始得取之以為利而夫死妻稚子幼無大功之親于是有同居不同居繼父之服豈非人道之窮雖聖人亦不能事為之制歟議曰凡州縣察其寡婦之無依者必良家謹願者造屋一區為百間間各戶使居之命之曰貞苦堂外為門有守門者門左為孰凡其兄弟親戚之男子來省者待于其所以其名族召之則出見之非是不得入婦有姑若子女三人者月給米一石錢二百終歲綿六斤布五匹其多少以是為差任以女工絲枲之事而酬其直門右為庫有主藏者非六十以上不得充主門者亦如之擇鄉大夫之敦篤有智者總其事出入嬴縮之節官吏不得問焉今蘇州冬日賑粥即此法人甚賴之門外為社有師一人凡孤子五歲至十歲者學焉命之曰孤兒社三年視其材分志趣而分授以四民之業然而必通孝經解字體至十六度能自食其力以次減其廩至二十則舉而遷之於外其賢者能者既老則使掌其堂之事各修其業以教社之子弟其富且貴者十分其資而三入之堂訖于其身凡民雜犯自杖以下視其輕重而要之使入其財於堂遠鄉若有屋不入堂者聽之廩之如在堂者此其大略也其它損益之惟其人此事所憂者財不足耳經費之所出不可豫定惟不宜置田以田有水旱之虞且須關白布政司也多一監臨察核之法即生一吏胥耗蠧之弊馴至案牘滋而實意亡矣荀子曰有治人無治法吾子志之是故哀苦蕉萃之狀日聚而相習則夜哭之感不生而從一以終者衆矣少蓄其力則老而不衰而孝子得以終其養矣幼有所長而督之以恆業則夫人思自奮而材智出矣國家法紀明備百度具舉若養濟院育嬰堂漏澤園蓋皆養生送死恤老慈幼以周萬民囏厄也惟兹堂之設而風化以厲人材以起又非徒哀其煢獨而巳往乾隆丙子桂林陳公巡撫江蘇屬年飢命節婦之貧者親族共周恤之以全其操誠大臣之言矣然是時吾母子方流離乞食而三族之富人無問者無亦文告之感人者淺歟吾子志之它日得志或行之一府一縣使四方以為法或告於上而頒之天下以為令典使經世大法詩書所載三代聖王之所不及而今日行之後世考其良法善政而曰自汪某之為其母始惟其母之賢以至于是則所以貽之令名者豈有既哉詩曰孝子不匱永錫爾類記曰博施備物可謂不匱矣夫是之謂大孝是謂得人之歡心以事其親吾子勉之中懷斯痛劇于常人自以放廢之身有母且不能養天地一罪人耳鬱鬱之心敢以望之足下凡孤子之得行其志者並以告焉使當世不獨有能為是言者則幸矣中白與朱武曹書汪中再拜武曹足下曽子有言往而不返者年也中往與成裕足下相見序其歲相次以九年惟足下無家室人事之纍年壯而身逸則其為學也易矣有遠見之識有淳篤之性有力學之志有父兄朋友之益是天以儒者之業責武曹也不可以不勉傳曰民生在勤勤則不匱荀卿子曰鍥而舍之朽木不折鍥而不舍金石可鏤盛年不再日力可惜願足下之循序而持久爾中嘗有志於用世而恥為無用之學故於古今制度沿革民生利病之事皆博問而切究之以待一日之遇下至百工小道學一術以自託平日則自食其力而可以養其廉恥即有飢饉流散之患亦足以衛其生何苦耗心勞力飾虛詞以求悅世人哉此吾藐然常有獨學之憂而願與足下勉焉者也凡端臨書所巳及者不復言足下可取視之前期相見未知何日竊在下風以俟嘉譽中再拜繁昌縣學宫後碑系代繁昌縣知縣葉一彪作澤宫五遷卜兹其吉年百而踣高宇為垤作其秩祀唯哲是率民順如流決湍倏忽我來自南既築既營作則弗見乃逮其成貞石巍巍言樹之坊直道繚垣周以櫺星四阿重屋閎我享堂日光麗宇丹碧浮采高標隱空霞駁雲靡椒壁朱塵曲奧潭潭晝入居隂在暑不炎松柏蒙翳有來鶴羣淸風舒陂璧水沄沄金峩虎負翠削當門東西房戶其下維廡先師國故明神攸處濟濟生徒比舍如鱗鼓篋升堂曳裾紆紳雒誦琅琅朱絲應節涼飇宵發淸揚四徹國不立學民曷以教凡此成勞用俾世效匪惟成之又潤色之終事告備我其力之物嬗而敝孰繩其迹敢昭告於後人視此不忒浙江始祀先蠶之神碑文并序凡物生天地之間其功可被於萬民其精氣著為列象則必有聰明睿知之人竭其心思變通以盡其利而後世奉以為神社稷五祀是其官也生民之業惟食與衣祈報由弭田事為多先嗇司嗇歲不乏享公桑所禮則維天駟意農祥昏覿適當蠶月取于同物比於龍見而雩而嫘祖之祀無聞周官放散是有遺典不然禮貴反本功無不報老婦貪人猶歆其祭況神黃帝之妃西陵氏之女方雷所出姬姓是宗淳化昆蟲垂衣裳而天下治弼成內政其功如是豈有周人修隂禮而沒其先妣者哉漢決以讖菀窳寓氏名實不經魏祀軒轅加牢無配秩宗不修其職學士莫考其文禮失則昏其來遠矣宋氏南遷保聚江湖吳越之郊蔚為桑土蠶之豐歉利恆倍於穡事乾隆五十有九年三月寒雨洊至蠶比不登皇帝從浙江巡撫侍郎臣某之請立廟於杭州城東艮山門之右以奉先𧖟人神同嗜屋而不壇嘉薦孔時無俟奉種於是自有熊以降綿越干紀始定為天子命祀領以祠官神靈受職大報冠帶衣被天下之功創制顯庸於斯為至其年十月臣中遊學是土欣見嘉會用敢珥筆以美形容其辭曰咨古生民衣皮蓁蓁不田不漁或裸其身有物蠕蠕莫知其利天牖哲人曲為之制禦我寒威亦昭行禮以蔽以章遂修人紀凡在能言自别攸始外薄四荒咸遵厥軌蔽前有知猶象以韠矧矣制器闕焉不食禮亡祭法詩失樂章民志靡依神用弗康百世以俟惟聖有作赫赫明命神具來格歲秩其常靈宇式啓百職駿奔有牷有醴慎制國典三古所逸刊石海隅以為民極巴豫藉别傳豫藉故富家生而通敏眉目踈秀身纎而晳少好刻印務窮其學旁及鐘鼎款識秦漢石刻遂工隸書徑險飛動有建寧延熹遺意又益搜古書畫器用及琢研造墨究極精美羅列左右入室粲然其父弗善也顏其居曰可惜子藉不能改又善交遊自通人名德勝流畸士下至工師樂伎偏材曲藝之美莫不一見灑然如舊相識周旋款密久而不衰或欺紿攫奪豫藉惛惛不之校他日遇之則又如故豫藉好棋及馳馬度曲遇名山勝地佳時令節可喜可愕之事未嘗不身在其間竟數十年由是大亡其財且日病晚為人作書自給數年賣其碑刻尚三干金然其愛之彌甚節嗇衣食時復買之乾隆五十八年夏遊江都卒豫藉雖貧以死然其聲名流溢士大夫間其遺迹所在有之惜在治生不在好古也是故埏埴以為器方圓具矣而天機不存焉巧工引手冥合自然覽之者終日不能窮其趣然而不可施之以繩墨知此者可與語豫藉矣余與豫藉同歲而交深一别五年相距數千里余篤疾再生而豫藉適至所欲與談諧者何盡而竟不及一見而死豈余與豫藉朋友之緣固止于是與悲夫豫藉名慰祖歙之漁梁人卒年五十葉天賜母汪氏家傳母汪氏歙之某村人年二十有一適同縣處士葉君鼎熙未三月處士適興化遘疾卒有遺腹孤逾八月而生始生母悲且喜曰天賜也遂以名其子家宿貧數遭艱窶母奉養老姑撫前妻女具有恩禮教其子嚴而有法日夜望其成立子幼每循墻立母輒以爪刻其尺寸視兒加長則喜始就傅隨從父望齡於繁昌既長而歸母子驟不相識兒入門母見兒卻立兒呼曰母安在母曰在此矣曰兒某也遂相抱持哭室中人皆哭天賜客四方力致甘旨於母取婦生子家以再立乾隆二十二年有司以母節行聞於朝凡婦人年未三十而寡更三十年得旌其閭先是母有姑王氏居嫠室四十餘年以夫亡時年逾三十不得應旌典母曰禮子雖齊聖不先父食先姑苦節吾所逮事而吾顧以年受旌是馳百二十里絶溪河七十餘道未至寨二三里而止賊急乘險下木石而凱軍去寨遠不可得傷俄而銃數響四山鳥鎗火炮齊發塵焰漲天守備溫如琦率兵自山後入其寨賊倉卒反走前後夾擊大破之賊多燒殺及投崖死塹谷皆平獲賊首數百人縱其餘數千人為民寨遂墟中軍狗補寨寨目吳老羅至瀘溪劫人取質凱盡中左前右四營兵勦之久之未發沿途諸生苗數十寨隂為老羅耳目度官軍即發非十日不至而凱濳率師五百别由烏巢河糯糖山用兩日入其寨俘老羅歸既數日大路諸寨苗乃覺皆駴怖稱天兵明年勦卡洞寨苗吳老卡吳老􅎒營既立凱便衣從十騎出營覘賊遇賊數千人至于是凱去營五十里矣乃麾其騎曰吾衆寡不敵若止賊且不測即退是自敗也遂據險接戰會日暮救至收其兵而止凱曰賊度我方困必不復往兵法所謂攻其不備可一鼓擒也因急擊虜之遷參將署辰州副將桑植土司某保靖土司彭御彬淫虐不法總督福敏請改設流官世宗命凱兼桑植副將以便宜摘印凱擊辰州協守備王肅文九溪協守備鈕正己由九溪至桑植由桑植至保靖彭御彬聞之盡撤其衆守桑植而凱率鎮筸右營參將王進昌永順土司彭肇槐由北河至保靖獲彭御彬并其黨送長沙桑植由是遂潰彭肇槐亦因凱請以永順歸內地併其地為永順府永順保靖龍山桑植縣凱更為永順副將明年遷鎮筸鎮總兵湖北美容土司田旻如橫惡不道結忠建等十九土司侵慈利石門縣抗命不出對質敕凱討之凱度旻如兵精而衆不附急則死鬪緩則可不戰而下乃整兵壓其地馳使諭其下曰旻如重斂淫刑苦役以逞其欲慈父孝子忍死而莫之抗者豈其力不足以制一土官哉尊天子之命吏畏國法也皇上不忍百姓無罪將去其疾而旻如保險跳梁抗拒王命是作賊也百年無事食其土之有以長子孫民皆王臣受國恩厚矣黨惡不義逆命不祥且焉用養害以自戚也夫內脫其苛虐而外享忠順之名孰與助寇仇以陷大戮乎未幾其下果縛旻如出旻如畏罪縊死遂定其地不戮一人以其地為鶴峯州長樂縣忠建等十九土司亦請歸土官印以其地為施南府施恩宣恩來鳳威豐利川建始縣貴州台拱丹江紅苗亂接壤鎮筸凱控扼險阻首尾援擊賊以窮蹙大兵乘之得就戡定當是時鎮兵盡出所在紅苗嘯聚謀乘虛竊發城中人洶洶凱急募兵數百人日夜四出巡徼所至變其旗幟衣服以次踐更羣苗疑募兵大集憚不敢發人心以安天子數下書褒美賞賜甚渥今上即位遷湖廣提督凱由守備兩任遊擊三任副將一任總兵至提督歷二十年終始不出湖廣凡破寨三改土司二十有三闢府二州一縣十有一夷夏讋服威信大著苗民終其身不復亂總督史貽直以事劾其失職凱上疏自辨且不即受代由是革職乾隆十六年天子南巡至髙郵召見凱命仍以總兵用從幸杭州授河南河北鎮總兵會澤州水漲注丹沁河決河內武陟二縣凱督兵塞之具以事聞其後歸仁利濟二渠又決壞懷慶護城堤十餘丈而薪盡不屬凱出布帛數萬裹土下卒塞之後數日巡撫鄂容安至劾其干預民事且以密旨示人遂再革職二十五年與賀皇太后萬壽命降二等給銜卒年八十二凱執喪盡禮喜接士大夫兄謙為天津鎮總兵縻餉數千金凱傾其資償之子二甲寬甲更名文淵成進士論曰土司自唐宋以來因亂撫定其地假其兵力遂羈縻之固非神明之後有功德于民如古諸侯封建也後世恃險與富虐害生民天討既加如出水火與夫將帥之臣假邊事以要功者異矣遭時承平天子神武奉國威靈竭其智勇所向成功而凱説禮樂而敦詩書有古名將風然剛烈而不能下人卒以不振云書周義僕事寶應潘愷僕周大從愷往田舍有佃暴死潘氏之族誣愷殺之引僕為證知縣吳之珽訊僕考掠纍日僕力陳其冤遂以夾折其脛血溢口鼻而死瀕死猶胡嚨言佃實病既絶而目不瞑聞者哀之知縣巳致僕死而懼妄云僕承遂易其辭以上獄不決者五年其後巡撫劉公參驗僕辭而疑之讞之得其實為罷知縣官而抵族人罪於是獄遂白愷為僕置冢子孫世祀之勿絶汪某曰吾觀於今之僕而知吏職之不修與士大夫不得保其門族者焉吏一命以上其貪沒亡檢者率自其僕成之其用事者威福或過其主不幸而蹉敗則盡以其罪委之主或多發其隂私承望風旨搆成其事以冀免于刑敗車相望而後不之戒也見小利而好近娛冒於大險以覆其宗哀哉吾故于義僕事而樂書非以為一人事也或委質事君泛然如路人之相值明知其可憂而姑幸其不及己阿諛苟祿以恣睢於一時者亦何心哉大淸故翰林院檢討程君墓表并序君諱元基儀徵人由舉人官元和訓導成進士改庶吉士入翰林授檢討憂歸一歲卒儀徵商稅三曰河餉常鎮通道主之曰梁頭知縣主之皆征於舟曰落地稅課司主之征於市征於市者不征於舟征於舟者不征於市既久乃交征之以厚其入三稅歲額實不及萬主者擾之民力以困而淮南鹽運江西湖廣者歲百三十萬引至則荆湖魚米竹木𥿄布之饒率附其舟以下苦儀徵稅重乃東輸之鎮江舟不時至則鹽屯而曰耗百貨不至則民生瘠君既家居與鹽策諸商議使每歲代輸其稅既鹽綱無所滯而民食其利則皆許諾將告於當事者而君遽卒君嘗集其鄉人以修學宫又與其鄉人為救火具甚周故沒而人哀之國初以來品官居鄉恆為民患其後上之人痛以法繩之其勢始戢雖然鄉士大夫習知其地之利病又通於官府之事而齷齪自封一委諸不習之吏以示守法民事所以滋不舉也古者封國分以故家世族使之鎮撫其土而與為存亡若君者其猶幾此哉始君在元和亦能其官君之葬有某之文以銘其幽故其族系年壽子女皆不具而揭其大者以為之表系曰猗嗟程君勇於為人如於其身百世有聞尚保兹墳宜爾子孫大淸故貢生汪君墓志銘并序國初以來學士陋有明之習濳心大業通於六藝者數家故于儒學為盛逮乾隆初紀老師略盡而處士江愼修崛起於婺源休寧戴東原繼之經籍之道復明始此兩人自奮於末流常為鄉俗所怪又孤介少所合而地僻陋無從得書是時歙西溪汪君獨禮而致諸其家飲食供具惟所欲又斥千金置書益招好學之士日夜誦習講貫其中久者十數年近者七八年四五年業成散去其後江君沒大興朱學士來視學遂盡取其書上於朝又使配食於朱子戴君遊京師當世推為儒宗後數歲天子修四庫之書徵領局事是時天下之士益彬彬然嚮於學矣蓋自二人始也抑左右而成之者君信有力焉而君不幸死矣然君亦以是自力于學所著文二百餘篇咸淸暢有法著楚詞音義三卷又治毛詩義編未成以乾隆三十八年十二月卒年四十七明年某月葬於縣之某原君諱梧鳳字在湘曾祖某祖某父某其先與中同出唐越國公後子四輝灼炘照灼好學世其家銘曰有噦其鳴天下文明其道大光西溪潏潏實為丹穴我銘載之表君幽域大淸故國子監生顧君墓志銘并序君名春生世為江都人祖某父某君淵靜好書羸秀多病而善交人中與君遊時年十有四故中之友惟君與朱篔最久乾隆三十六年春中在府城會其子周歲中與篔往造焉當其時君父母巳傳家事皆強健善飯君有一子二女內足於財闢所居樹竹木置書策琴瑟與四方之士相樂而是日天氣淸晬列坐多異材耉德及暮而賓主皆醉飽盡其意中退與篔歎其不復此也及中客當塗間一歲再至則君方居父喪而子女皆夭病益深毛髮時畏寒灑淅悽然慮其不久及今而過之則君之喪巳在殯立孫財二嵗衰而􅈱􅈱不能具拜禮而君之母纍然撫諸哀次嗚呼以君一人之身不數歲而死生榮落若是其難知也況其在百年哉人孰無死惟君死而生人之事至是而泯然皆盡尤可悲也中以平生之誼將為之銘以致其哀而狀不可得友人宜興儲潤書以為言乃草此以付其家而其生之年與葬之日月與其地及它不審者則俟異日詳焉銘曰昔康以碩維子之樂而豫是託倏陵以夷維豫之悲而子不知蕭蕭墓草子宫所考萬世是保袁玉符妻劉氏墓志銘并序袁玉符既喪其妻以狀請銘於中曰吾婦太學生某某其祖也處士某某其父也婦以乾隆三十六年某月沒得年三十有某歲歸袁氏者十有某年上孝其姑尊中宜其夫下慈其子姓內敏而外柔能力以儉始歸生數子不育恐吾父母老而不克抱孫遂請於姑而飾侍者以為簉洎與妾並舉子二子皆疾婦日夜撫抱其妾子加篤今吾子褒長矣而婦遽殁嗚呼其可哀也吾將以某月日葬某兆敢請銘中也聞諸公父文伯之母曰好外男死之好內女死之孝行衰故其言易私玉符執父之喪哀過而至於瘠痛其父之嗜肉而誓諸終身不以食玉符篤於父子之恩其不牽於私愛以誣其妻必矣是其言可信於法宜銘銘曰升堂煢煢姑老而若或侍也入室營營兒寒而若或視也夫子之羸家事無與治也我銘以章之哀同穴志也大淸故奉直大夫掌江西道監察御史江君墓志銘并序君諱德量字量殊江都人曾祖澄祖世棟並不仕父恂拔貢生終徽州府知府以才略稱于時君生有異稟徽州故好金石之文多所搜輯君幼即世其學徽州顧而曰吾有此子即此物之在江氏得更多數十年矣君始壯以進士高第授編修踰六年為順天鄉試同考官以父憂歸服闋遷江西道監察御史轉掌道御史君性渾融與人交不見圭角久近無所忤然素履簡靖未嘗求請于人不妄取豫公餘鍵戶以文籍自娛以是負淸望庶官中一監順天試久之丁母憂解官君臨事敏絶人有所咨立口立斷洞見始終後雖百變莫能外越幼從徽州在官熟知吏治居朝多識舊聞博通掌故而深湛謹密未始以才氣加人既以久資當出為道府益究心世務刑獄河渠漕運災振損益古今之宜分端講習以備施用久于其道者咸拱手謝不及乾隆五十有八年君將補官北行感疾十月辛丑殁年四十有二嗚呼以君器識干涉淸塗而天年夙隕嘉猷猛志湮鬱無傳門戶遽衰妻孥漂泊有識者所為悼生才之難而為世用惜也君取張氏道州知州元和某女子會女二長適徐某次字吳謹案是篇先君臨終前一夕作初鹽政某禮致先君校勘文宗閣四庫書既畢復延往杭州校勘文瀾閣四庫書先君于乾隆五十九年十月遊杭州寓梁氏葛嶺園十一月十九日二鼓撰此志未及終篇閣筆就臥疾作自謂中臟亟呼僕買石菖蒲不可得至二十日子時棄養此篇遂為絶筆勿勿十七年孤露餘生屏營若失每一展讀刺心泣血哀何可言嘉慶十五年十月孤喜孫泣識大淸誥授通議大夫山東提刑按察使司按察使原品致仕恩加一級沈公行狀曾祖懷英明仁和縣學生員祖兆乾皇國子監生纍贈通議大夫山東按察使司按察使考元滄皇敕授文林郎文昌縣知縣纍贈通議大夫山東按察使司按察使浙江杭州府仁和縣忠淸里沈廷芳年七十一狀公字椒園本徐姓世為仁和人自公考出嗣于舅氏沈遂承沈姓沈故吳興望族明歲貢生首暘始遷仁和於公為六世祖康熙五十年八月公生於海寧之園華里幼端慤有志操嘗書其坐曰守道守身為忠為孝又嘗讀明楊忠愍公繼盛傳激昻慨慕思其為人外祖查少詹事升歎曰是奇童也即異日立朝其風節自此見矣少長益濳心正業博綜羣典學以大殖弱冠遊京師聲譽籍甚巨人耆德接待若恐不及安溪李侍郎淸植長洲惠學士士奇太倉張詹事鵬翀桐城方侍郎苞於時並申師友之契雍正十一年丁文昌公憂歸明年故大學士高文定公時總督南河聞公名馳書幣致諸幕府文定公素習有宋諸儒之學好賓接士大夫於公尤有加禮嘗謂公曰君年方少而博聞篤行遂至于是不圖今世乃見古人既服闋再至京師補一統志館校録先是世宗憲皇帝詔舉博學宏詞公入都既晚蟄居卻軌未嘗詣人求舉乾隆元年故左都御史楊恪勤公汝榖時以兵部右侍郎祭告南嶽還朝上命續舉所知遂以公名及其學行對十月御試保和殿名在二等選翰林院庶吉士明年授編修入直武英殿同修起居注總理宗人府各學三年充一統志纂修官兼校勘明史明年殿試充收掌試卷官公嘗集前世君臣善敗之迹為類各十有六名曰鑒古録以備法戒是年冬表進賜段四匹書交懋勤殿六年補山東道監察御史公精敏絶人諳悉舊典朝章國故官方民隱口陳手畫本末如流通於當世之事而務出於忠厚上承世宗勵精之後益思勤恤民生周知疾苦采納直言慨然思古陽城馬周之選於時西林鄂文端公高安朱文端公海寧陳文勤公興縣孫文定公江隂楊文定公後先繼長朝列用忠淸公正弼成至治而公以卑官後進與相應和凡所陳秦尤在於奉宣德意成樂物生七年以淮安鳳陽徐泗諸府州連遭水祲請于常振之外盡發常平諸倉存穀遍為振恤並加振直隸山東浙江甘肅之被災者又以國家設關徵稅蓋以抑逐末之民且使國用所出不專取給于農畝而巳然米豆者百姓所仰食正使逐地流行乃以收通工易事之利況登場之日既徴其地丁漕糧以充正供則關稅宜在可免奉旨允行戶部議以米豆既免正稅請將載米豆之船加稅船料公復奏言米豆之稅免而載米豆之船料增是猶二五之與一十也朝廷如天之仁所爭豈在此請並米豆之船料除之奉旨交九卿議行焉其後公外轉有司遂復請稅米豆如故時蓋自許墅關監督始其年秋上幸奉天公奏言邊地風氣早寒七八月間巳如冬令且山川紆阻跋涉疲勞乘輿遠駐塞垣搜簡軍實惟冀于閲武之餘勿事馳騁田獵敬愼起居以迓釐福又因直省米價加昻有旨停鄰省采買公奏采買以充積貯既楚弓楚得且有成數可稽惟海洋物産富饒珠犀羽象之美掌握兼金而洲嶼沙石盤互斥鹵磽確穀生不蕃不得不資之內地商人沒於重利往往冒禁興販近口之地民間倉廩為之空珍異日至民食日少是棄有用以博無用也且使無賴之藏海島者得食以植其黨為患方大事下部議申禁又言自古建立都邑既設支輔又必廣樹藩籬漢唐都關中而朔方河西常列重兵其巳事也兹聞三聽獨石諸邊盜風少熾特遣大臣督緝分察疆理伏考老哈河喀喇河屯興州河及鄂爾多斯諸處為大寧開平興和東勝舊地今則八旗察哈爾禮部太僕寺考牧之區外接諸藩內逼獨石口此皆膏衍上地水土甘美請就其中置屯牧務一所遣大臣為總理擇司員分領其事度今在京滿洲間散之丁不下數萬誠徙以屯田塞下豫之籽種耕畜分地種牧暇則練習擊刺騎射之法繕完城堡修飭軍器數載之後屹然成重鎮據長城外險為京師後蔽兼可西護山西東援遼薊所謂有備無患者也有旨交議政王大臣議奏卒格不行時東南連歲米貴公以采買既停倉儲尚寡請將乾隆九年江蘇安徽浙江江西湖北湖南六省漕米截留數萬石視州縣大小倉庾多寡虛實以次抵補為平糶振濟之用戶部議駁旋奉特旨施行上將幸木蘭會久雨水潦汜溢公言車駕所及一事不欲以纍民而有司多取人木竺二稗治道乞以謁陵禮成加賚所過地被旨申飭部議革職上命降二級調用十年奉旨仍以御史用補江南道監察御史奉命巡視山東漕糧十一年請建祠祀宋臣謝枋得於憫忠寺又以長生店涿州積水泥濘行旅苦之請敕行修治並請加振直隸被水窮民俱報允十二年充順天鄉試同考官再命巡視山東漕糧公以山東比歲告飢雖屢截漕加振恐民氣未舒奏於南漕抵山東時更截留六十萬石又奉命隨大學士高文定公查辦山東振務公分理兖沂曹東昌泰安五府城市窮鄉莫不親履條理精密吏不能欺五月閲靑苗七月勘水災故事山東巡漕御史率於六月回道至是於九月始復命云公為御史前後六年凡有屬草輒閉閣齋戒如對明神憂勤忠愛之心發於顔色溢於毫楮其言體事達情曲折盡意公貌淸古秀削身裁及中人與人言喣喣然若不能盡及當事執持廉直自將雖賁育無以過故尚書彭維新復官工部右侍郎公奏劾罷之尤為人所稱道所上四十餘摺舉其要者著於篇其未發科鈔者世固莫得而知也轉分巡山東登萊青道布政使司參議舊時為吏者飮食百貨之用取諸市豫賈恆十之五謂之官賈賓客僕役或因為姦利公至勒石為約悉革其弊管內當積荒之後人士流離公率其屬醵養廉數千兩招集逃亡給本錢使復其業數年戶口充實所墾田皆大孰置漏澤園募人收掩四境遺骼小淸河自新城孝婦河以東經高苑入靑州境屈曲三百餘里至夀光入海河道淤狹夏秋山水暴發高苑博興樂平諸縣田廬纍經漂沒公相水勢濬馬車瀆口以上某千某百丈相地勢增築堤堰水屬理孫民以無恐萊州老儒高鳳起法坤厚毛贄並晦名樂道不涉世流公徑造其廬待以賓師之禮相與搜訪舊聞考訂學業由是人知所矜式暇日以一騎入村落巡行稼穡問民所苦即田間集父老子弟而教語之或以村酒果餌進欣然食之至盡既久公所乘白馬人皆識之見策白馬度陌者則喜相告曰使君至矣故老言先時陳恪勤公鵬年在江寧陸淸獻公隴其在嘉定固皆如是國朝百餘年來得公凡三人而巳遷河南按察使祥符民有淫人之婦而殺其夫者既乃以語婦婦告其夫之妹使訟之官有司引律因姦致死本夫婦雖不知情亦絞公曰本不與謀又獄由婦首是無死法巡撫及幕客皆執不可公披舊牘厯三夜得成案援以定讞婦竟減等鹿邑民甲殺人而賄乙誣服公察而直其罪其它平反閲實類此十九年十二月入覲上以查太淑人年九十特賜御書曰壺範遐齡眀年春乞終養歸其秋太淑人卒公素不喜佛老説至是居喪遂屏浮屠法不用並廢七七之奠服闋補山東按察使公謂愚民畏法其犯罪或出於不知乃舉律文之日習而易犯者陳列罪名以為條教它所奏變通法令數事俱見施行時巡撫方操勤吏職公雍容儒者見為迂緩又嘗發民治道公故寢其事由是滋不説適公奏請祀故尚書湯文正公斌於孔子廟廡又論孟子廟配饗事二十七年上南巡至山東以公年老命以原品致仕公起諸生至大官諫行言聽膏澤下於民於公不可為不遇然緣公體國之忠與其憂民立事之心蓋嘗抱無窮之藴而惜乎公則衰矣公之歸生儒耆老數千人南送四十里至崮山驛不去皆曰使君前者去率不數歲復來今當以何時至耶使君壽考無極它時幸得相見公下輿慰之曰荷父老意甚厚其歸善教訓子弟力田孝弟為良民奉上法度何必使者長在此耶使者亦願父老自今歲有康年無生災害與使者共食此福皆列拜流涕日暮乃散公在官食不過一肉三族之待以養者數十家既歸貧不能自贍復以課讀為業纍為鰲峯端溪樂儀敬敷四書院山長嘗謂其門人汪中曰吾通籍三十年有宅一門里萊田二頃故既老而終嵗教學於外汝以吾為得巳耶中對曰古者七十而致仕大夫為父師士為少師以教于其鄉蓋與司徒樂正之官相為用血氣不足以任職事而道德則可以為師然則師者所以息老也是故君子生而有益於人者不使其身一日無用於天下公頷之公為教善因人之材使人各盡其長然後授之以其事故多所成就篤念故交於通門子弟及名臣節士後尤加重自初宦迄於老率如是三十年上南巡賜公紵絲表裏三十五年與祝皇上夀賜段四匹公子世煒自雲南主試歸上召見瀛臺從容問公年齒精力於是知上之恩顧深矣三十六年與祝皇太后夀恩加一級明年二月甲申考終於京師之椿樹三條胡同公子禮部主事世煒之邸公兩兄俱有學行與公少共艱苦後並偃蹇不遇公奉事之無不至從子世燕官武陟典史公生死顧恤之如子有孤蚤殤為立嗣守純伯兄無子先以仲子世炯為之後世炯死無子復以孫守誠嗣之治辦方定而公遂沒公學詩於海寧查編修愼行及編修弟侍讀嗣瑮學文于方侍郎並沖融醇懿稱其德量有理學淵源十卷續經義考四十卷鑒古録十六卷文章指南四卷隱拙齋詩集四十卷文集二十卷盥蒙雜著四卷其十三經注疏正字八十一卷則嘉善浦鏜同校公由庶吉士授編修兩官監察御史出為山東登萊靑道參議河南山東按察使誥授通議大夫致仕加一級娶汪氏誥封淑人令德莊儉白首無違子世煒庶吉士改禮部主客司主事明達負氣得公之節世炯世炆並先卒孫守正守誠守純守端公官在三品不得請諡於考功謹具厯官事迹上翰林院國史館論撰伏惟鑒察乾隆四十年正月某日門人江都縣附學生員汪中謹狀經舊苑弔馬守真文并序歲在單閼客居江寧城南出入經回光寺其左有廢圃焉寒流淸泚秋菘滿田室廬皆盡惟古柏半生風煙掩抑怪石數峯支離草際明南苑妓馬守真故居也秦淮水逝迹往名留其色藝風情故老遺聞多能道者余嘗覽其畫迹叢蘭修竹文弱不勝秀氣靈襟紛披楮墨之外未嘗不愛賞其才悵吾生之不及見也夫託身樂籍少長風塵人生實難豈可責之以死婉孌倚門之笑綢繆鼓瑟之娛諒非得巳在昔婕好悼傷文姬悲憤矧茲薄命抑又下焉嗟乎天生此才在于女子百年千里猶不可期奈何鍾美如斯而摧辱之至于斯極哉余單家孤子寸田尺宅無以治生老弱之命縣于十指一從操翰數更府主俯仰異趣哀樂由人如黃祖之腹中在本初之弦上靜言身世與斯人其何異祇以榮期二樂幸而為男差無牀簀之辱耳江上之歌憐以同病秋風鳴鳥聞者生哀事有傷心不嫌非偶乃為詞曰嗟佳人之信嫮兮挺妍姿之綽約羌既被此冶容兮又工顰與善謔攘皓腕以杼思兮乍含豪以綿邈寄幽怨于子墨兮想蕙心之盤薄惟女生而從人兮固各安乎室家何斯人之高秀兮乃蕩墮于女閭奉君子之光儀兮誓偕老以沒身何坐席之未溫兮又改服而事人顧七尺其不自由兮倏風蕩而波淪紛啼笑其感人兮孰知其不出于余心哆樂舞之婆娑兮固非微軀之可任哀吾生之鄙賤兮又何矜乎才藝也豫奪其不可馮兮吾又安知夫夫意也人固有不偶兮將異世同其狼籍遇秋氣之惻愴兮撫靈蹤而太息諒時命其不可為兮獨申哀而竟夕汪純甫哀詞君諱介壽字純甫與中同出越國公自君以上遷錢唐凡三世故君籍錢唐為諸生某甲官浙江以君管其書記始中依代州馮兵備於鄞兵備遷臺灣中不能度海以與某甲僚也屬中於某甲既成言矣他日中造某甲則辭以事不得見於是兵備去巳遠而中留與歸則皆無所得食悵然其生之窮也當是時武進蔣御史客於甲所告中曰甲之友汪純甫數以足下才藝學業矜語於某甲謂其身羈貧可念且兵備之交不可棄是中固生而未嘗識君亦未有文字之涉朋舊之遊揚也其後中兩過君之居拜君之父於堂下君皆不在中歸而以書貽之曰淮海鄙生早孤失學不自意為君子所采譽此身猶在要當立名成業以報知己託生本支俱及壯年相去七百餘里必有見期庶幾相視莫逆為子桑溫伯之遇君答書辭旨多同今檢不得間二歲中數訪君行迹最後得人問之則君死矣吾安知夫終吾身之遂不識君也悲夫往觀李習之所賦梁補闕常太息悲傷其事雖然習之以所業求知己則其譽之也有因其身既親於補闕之門則亦有師友講習之樂足以自慰然且感其知而悲其後之不可再若斯也君施德於其所不相習之人而終不得一見而死則中之悲且感宜何如哉先君寫定述學內篇目録一釋晨曑二文二釋闕三釋三九上中下四眀堂通釋五媒氏釋疑六為人後者為其曾祖父母祖父母服考七婦人無主答問八釋冕服之用九玎文正十釋童十一釋連山十二女子子許嫁壻死從死及守志議十三左氏春秋釋疑十四居喪釋服解義十五古玉釋名十六周公居東證十七墨子敘後敘十八賈誼新書敘十九石鼓文證草廣陵曲江證草一江都縣榜駁義草二漢鴈足鐙銘釋文草三江淹墓考草四故岷洮道馮君妻三李氏不合葬議多有與述學刻本不合者釋冕服之用江都縣榜駁義漢鴈足鐙銘釋文江淹墓考故岷洮道馮君妻三李氏不合葬議五篇刻本所未録又先君有手寫文藳目録一狐父之盜頌二弔黃祖文三荀卿子徵文四大學平義五越三仁駁董仲舒義未作六駁齊論義未作七江都縣榜駁義八漢鴈足鐙銘釋文九孫枝生墓銘十修禊敘跋尾十一先考靈表十二先妣靈表十三畢尚書母祠銘十四吕氏春秋序十五鐵牛銘十六渦水堤銘十七釋印十八江淹墓辨十九釋冕服之用草自序草一哀鹽船文草二洪君妻蔣氏墓銘草三瞽瞍説草四嬪于虞解草五王基碑跋尾草六老子考異草七宋書宗室世系表序草八鄭贊善銘未作草九泰伯廟銘三十越國公廟銘未作今合前五篇去復重及未作者為補遺一卷其目録所不載有為劉先生端臨所録喜孫所搜輯者倣蔡雍外文例為别録一卷附焉孤喜孫識行狀王引之先生名中字容甫江都人少孤好學貧不能購書助書賈鬻書於市因遍讀經史百家過目成誦年二十應提學試試射雁賦弟一補附學生詩古文詞日益進儀徵鹽船厄於火焚死無算先生為哀鹽船文杭編修世駿序之以為驚心動魄一字千金由是名大顯當世通儒如鄭贊善虎文朱學士筠盧學士文弨馮按察廷丞見先生所撰咸歎賞以為奇才年二十九始顓治經術與家大人及李進士成裕劉教諭台拱共討論之其後謝侍郎墉提學江左特取先生為拔貢生每試别為一榜列名諸生前侍郎嘗謂人曰豫之先容甫以爵也若以學則豫於容甫當北面矣其見重如此朱文正公提學浙江先生往謁答述楊州割據之迹死節之人作廣陵對三千言博綜古今天下奇文字也畢尚書沅總督湖廣招來文學之士先生往就之為撰黃鶴樓銘歙程孝廉方正瑤田書石嘉定錢州判坫篆額時人以為三絶先生於六經子史以及詞章金石之學罔不綜覽乃博考三代典禮至於文字訓詁名物象數益以論撰之文為述學內外篇又深于春秋之學著春秋述義識議超卓論者謂唐以下所未有為文根柢經史陶冶漢魏不沿歐曾王蘇之派而取則於古故卓然成一家言性質直不飾容止疾當時所為隂陽拘忌釋老神怪之説斥之不遺餘力而遇一行之美一文一詩之善則稱之不置事母以孝聞貧無菽水則賣文以養左右服勞不辭煩辱居喪哀戚過人其於知友故舊沒後衰落相存問過於生前蓋其性之篤厚然也年五十一卒於杭州西湖之上先生家大人之所推服也其學其行竊聞於趨庭之日久矣而先生於豫所説尚書訓詁極奬厲以為可讀父書則又有知已之感焉雖不能文尚欲揚榷而陳之以告後之君子嘉慶二十年歲在乙亥六月庚申髙郵王引之謹狀祭文盧文弨維年月日同學友盧文弨孫志祖張燕昌梁玉繩等謹以清酌之奠致祭於拔萃汪君容夫之靈曰吁嗟汪君無怛而化驟聞惡耗舉皆驚詫日者相招促坐談笑曽未浹旬銷聲埋照君實不狂而衆曰狂皮裏春秋涇渭分明彼妄男子號召羣愚如羶集蟻如矢叢蛆世奉尊奢君實唾棄海內正人備載簡記師門風義不忘久久沈椒園鄭誠齋兩先生披榛拜墓遺金恤後同道為朋端臨劉台拱懷祖王念孫秋史江德量先徂金蘭誰補四庫在胸為行祕書大放厥辭佩玉瓊琚文章何師西京鄴下汴都臨安未始嚅炙不恕古人指瑕蹈隙何況今人焉免勒帛衆畏其口誓欲殺之終老田間得與禍辭名園髙枕山茶雙植竹閣柏堂風流允嗣不死揚州而死杭州禪智山光終焉首邱吾儕結契無論舊新聞名相思握手情親臭味本同膠投漆中來幸天假去何匆匆一去不返儀觀在目樽酒具陳皋某來復聞君佳兒嶄然頭角庶幾他年父書能讀魂無不之𨝍江之湄執紼相送涕下漣洏嗚呼哀哉尚饗述學外篇一江都汪中撰京口建浮橋議爾雅天子造舟郭璞謂比船為橋即今之浮橋也川之大者若河渭洛皆有浮橋其建于大江者漢建安二十五年夏矦尚為浮橋以攻南郡唐乾寧四年朱友恭為浮橋于樊港以攻武昌宋開寶二年曹彬為浮橋于采石以攻江南元至元九年伯顏為浮橋于石箄以攻宋前史具載之今京口之渡自瓜州至金山一里三分自金山至箄灣半之于江津為最狹若南北造浮橋二道交會于金山行旅往來如在枕上此百世之利也昔杜預請建浮橋于河陽議者咸以為古無此事預卒成之至唐猶賴其利近世李敏達公于鄞縣甬江造浮橋至今稱便有非常之事必待非常之人道固然爾廣陵􅍟乾隆五十二年正月中謁大興朱侍郎于錢塘侍郎謂中曰余先世籍蕭山本會稽地今適奉使于此嘗覽朱育􅍟濮陽興語喜其該洽度後之人不能也吾子咨于故實而多識前言往行亦可以廣陵之事諗余乎􅍟曰中幼而失怙未更父兄之訓長遊四方又有昏瞀之疾故書雅記十不窺一何足以酬明問抑聞不知而言不知知而不言不忠二者中之所不敢出也昔者黃帝迎日推策分天以為十有二次南斗牽牛是為星紀七政會焉布算者於是乎託始而後歲月日時咸得其序揚州之域是其分野自漢以來或治歷陽或治壽春或治建業而廣陵卒專其名其占應之昆侖之山實維西極河出其北江出其南自麗江至于高闕其距八千里萬折而東夾廣陵以入于海而𨝍溝貫之江河於是乎合焉于辰為維首于水為歸墟故廣陵者天地之所以成始而成終也竊嘗求之人事稽其善敗之迹比于矇誦其庶幾乎夫秦滅六國楚最無罪當陳王首事而死楚地之衆未有所屬其有矯命項氏引兵渡江以爭天下遂戰巨鹿西屠咸陽則召平首建大謀以報秦仇也漢室傾危董卓于紀百城拊心莫敢先發其有區區郡吏無爵于朝而義感邦君結盟討罪升壇慷慨必死為期則臧洪説張超起兵糾合牧守以誅賊臣也祖約蘇峻稱兵犯闕幼主幽厄京師塗炭其有固守孤壘大誓三軍力遏賊衝以􅍖東土西師乘之遂殄狂寇則郗鑒董率義旅犄角上遊以匡晉室也桓元負雄豪之名藉纍世之資挾荆州之衆乘晉道中衰本末俱弱易姓受命人無異心其有手梟逆徒協謀京口既克建康偏師獨進凶族盡夷乘輿反正祀晉配天不失舊物則劉毅舉州兵以平桓氏光復大業也矦景反噬二宫在難諸鎮不務徇君父之急而日尋干戈甚者望風請命委身賊手其有居圍城之中無謀人軍師之責而唱義勤王有死無二則祖晧來嶷襲斬董紹先馳檄討景為梁忠臣也武氏淫虐人倫道盡臨朝稱制唐祚將傾其有控引江淮奉辭討賊功雖不成其所披泄亦足伸大義於天下則徐敬業舉兵匡復殺身亡宗以酬國恩也且夫武氏之立績實贊之敬業既心在王室又以蓋前人之愆忠孝存焉侍郎曰敬業不直趨洛陽而覷金陵王氣固忠臣與中曰兵者凶器當唐全盛之時武氏積威所劫海內莫不聽命敬業舉烏合之衆起而與之抗故欲掃定江表厚集其力先為不可勝以侍敵之可勝發謀之始義形于色握兵日淺未有不臣之迹安可逆料其心而僃責之哉春秋賢反經禮母測未至推斯義也雖與日月爭光可也侍郎曰善願卒聞之曰藝祖擢自行間典兵宿衛受周厚恩幸主少國疑倒戈自立其有前代懿親不樂身事二姓繕兵守竟城孤援絶舉族徇之則李重進以淮南拒命握節而死下見世宗也宋氏積衰元兵南伐勢若摧枯列郡土崩不降則潰其有孤城介立血戰經年洎行在失守三宮北遷而焚詔斬使勇氣彌厲忠盛于張巡守堅于墨翟則李庭芝乘城百戰國亡與亡也當明季世流寇滔天南都草創姦人在朝方鎮擅命國勢殆哉不可為矣其有上匡暗主下撫驕將內攬羣策督師開禮賢館士多歸之外抗天兵鞠躬盡力死而後巳則史可法效命封疆終為社稷臣也故以廣陵一城之地天下無事則煮海為鹽使萬民食其業上輸少府以寬農畞之力及川渠所轉百貨通焉利盡四海一旦有變進則翼戴天子立桓文之功退則􅍖據州土力圖興復不幸天長喪亂知勇俱困猶復與民守之效死勿去以明為人臣之義歷十有八姓二千餘年而亡城降子不出于其間由是言之廣陵何負于天下哉侍郎曰卓哉言乎昔陳郡袁氏世有死節之臣矜其門地不與人伍今聞吾子之言天下百郡洵無若廣陵者後之過者式其城焉可也抑聞之危事不可以為安死事不可以為生則無為貴知矣此數君子者劉毅材武故有戰功郗公名德雍容而巳自祖晧以下敗亡接踵意川土平曠非用武之地與其民脆弱不可以即戎與若其建名立義類多守土之臣又虞翻所謂外來之君非其土人者也子其有以語我中曰蔡澤有言人之立功豈不期于成全邪身與名俱全者上也名可法而身死者其次也名在僇辱而身全者下也必若所言求之前代功成名遂抑有人焉孫策用兵仿佛項羽既定江東威震海內舉十倍之衆叩城請戰陳登出奇制勝再破其軍由是畫江以守吳雖西略而北不益地尺寸則匡琦之戰為之也金人乘百戰百勝之勢挾齊南下其鋒不可當韓世忠要之半塗多所俘馘諸將用命同時奏功戰勝之威民氣百倍由是開府山陽屹為重鎮而淮東久不被兵則大儀之戰為之也李全聮京東以為餌通蒙古以為窟屢賊帥臣厚索稟賜乍服乍叛十有六年朝廷姑息有似養虎既連陷州縣進薄三城太淸之禍近在旦夕趙葵建議討賊身肩其事輕兵迭出所向有功由是長鯨授首餘寇悉平迅掃淮壖復為王土敵國寢謀宗社再安則新塘之戰為之也三者􅍖竟卻敵之功至壯也非地不利人不勇也苻堅強盛禹迹所奄九州有其七傾國南侵目無晉矣􅒜元以北府之兵選鋒陷陳使數十萬之衆應時崩摧秦因以亡由是再復洛陽進軍臨鄴國威中振尊諡曰武則淝水之戰為之也開皇始議平陳賀若弻獻其十策巳而濳師濟江據其要害直抵近郊于時建康甲士尚十餘萬人魯達忠勇人有死心而弻力戰摧鋒破其鋭卒禽其驍將由是陳諸軍皆潰新林之師鼓行而進江左以平則白土岡之戰為之也朱溫雄踞大梁並吞諸鎮悉其精兵猛將三道臨淮當是時淮南不守錢氏馬氏必不能自立溫之兵力極于嶺海地廣財富則難圖也楊行密朱瑾決計攻瑕梟其上將偏敗衆擕長驅逐北由是􅍖據江淮奉唐正朔闢土傳世終梁之亡不能得志于吳則淸口之戰為之也夫晉之與秦吳之與梁皆非敵也然舉一國之命決機于兩陳之間小則兵敗將死大則國亡若是矣又況南北區分垂三百年一戰而天下合于一以此行師其孰能禦之詩曰武王載斾有虔秉鉞如火烈烈則莫我敢曷廣陵有焉若夫異人間出邦家之光前之所陳固猶未盡為其事之不繫于廣陵也則請僃言之桓靈之際常侍擅朝朝野切齒劉瑜以宗室明經身侍禁闥協心陳竇議誅宦官仰觀天文俾其速􅍘謀之具違并隕其族而漢業亦衰同姓之臣與國升降屈平之志也王敦專制朝政有無君之心戴淵忠諒盡心翼衛及戎車犯順石頭失守雖逼凶威抗辭不撓主辱臣死卒蒙其難正色立朝人莫敢過而致難于其君孔父之義也武氏始以色升浸成驕橫來濟諫之上官儀謀廢之納君於善繼之以死比干之仁也龐勛既陷武寧泗為巡屬又當長淮之衝在所必爭辛讜出萬死不顧一生之計冒圍求救往反十二是時賊兵北及泰山南至橫江主帥既戕官軍屢衄而肘腋之下一城獨完苦身愁思以憂社稷申包胥之哭也黃巢豨突京師僭稱大號乘輿播于遐裔羣盜蜂起跨州連郡唐之政令不復行于四方當此之時天命去矣王鐸連十道之兵總九伐之任承制封拜以繫海內之心王師既奮賊遂走死而唐祚之復延者且三十年二相干位諸矦宗周共和之政也宋氏武功不競西夏跳梁宇內騷然當寧旰食張方平建議赦其罪而與之更始由是元昊請臣而中國之民得以休息及熙寧用兵再進苦口謀臣不忠遂成靈州永樂之禍而神宗以此飲恨而終王者務德而無勤民于遠祭公謀父之諫也故廣陵自周以前越在荒服其時人士未聞于上國秦漢而下始有可紀然當三代盛時忠臣烈士之行事所震耀于天壤者先民有作舉足以當之此亦才之至盛巳至若政事法理經緯乎民生文學道藝立言不朽里閭耆德孝子貞婦一至之行蓋以千百計非國家之所以廢興存亡者則皆略之考其事迹則如彼語其人才則如此維桑與梓必恭敬止故君子尤樂道焉夫子詳之侍郎曰善乎子之張廣陵也辭富而事核可謂有徵矣古者誦訓之官掌道方志以詔觀事王巡狩則夾王車故曰山川能説可以為大夫吾子其選也朱育之􅍟何足以當之中謝不敏退而發策謹録為是篇表忠祠碑文并序維乾隆四十一年正月己卯皇帝永念故明建文革除之際諸臣守不戴天之義隕身湛族百折不回當明中葉雖少弛厲禁終以臣子曲諱使忠臣義士之氣不伸爰命廷臣迹行議諡以發幽光于是廷議為專諡通諡之典其以靖難死者得諡凡一百某十文俾有司各祀于其鄉有失其里居者則于其授命所而臣某適典江寧府治西故有祠曰表忠明萬歷四年敕建祀太師魏國公徐輝祖文學博士方孝孺以下一百一十四人積歲而圯某奉宣詔書懼秩祀之不修使神靈怨恫無以稱朝廷式閭封墓之德用率官屬士民因舊基而廓之役不踰時所費為銀五百六十八兩又醵銀二百兩權子母以共祀事維諸公或舉宗就夷孤傷無所血食而是為其授命地既應令典又協于因國無主後之義用屬臣中為文刋石紀之辭曰在明二世孝孫嗣服有叛曰燕盜我王國臣無二心天實制之謀人軍師敗則死之社稷可遷君也則亡孰是仇讎可與並生于殄厥身于覆厥家君獲死臣其德不瑕匹夫有志莫子敢阻咨爾亂臣威虐斯沮仇牧隕首孔父正色九宗五正匪躬在昔矧矣開創報禮則重以我忠腸遘兹創痛亦有冥鴻山澤徘徊浩然悲歌用抒國哀凡此藎臣人惟自靖身之不恤榮名孰幸運徂代往改厥朝列黃河白日風期不滅皇帝稽古眷焉發策渙是德音以薦毅魄祠官丕承奔走蹌蹌有寢有堂式彼舊章鍾山東顧興作雲雨朝日夕月照臨我宇冶城綿蕝會朝所肄玉佩華裾明靈攸娭祀不一族類以同德昭格不違甘我飲食天子教忠萬世維服翼翼齋宮人臣之鵠大淸故高郵州學生賈君之銘並序君諱田祖字稻孫先世北平人十四世祖愚以從明成祖靖難功官高郵指揮司僉事子孫襲官因家其地祖良璧舉人父兆鳯翰林院檢討君好學多所涉獵喜左氏春秋未嘗去手旁行斜上朱爛然善為詩所作凡三千餘篇發言深摯哀樂過人性明達於釋老神怪陰陽拘忌及宋以後禪學無所惑伯兄有痼疾喜怒失中君事之曲得其欲矜立名節猛志疾邪少所容貸及其所善窮鄉末學一節之美終身咨誦不可弭忘與同里李敦王念孫友三人皆善飲句酒酣君輒鉤析經疑間以歌詩往牒舊聞泛演旁出嘲噱風生戲而不虐洎夫述先正之明淸傷末俗之流失聲情激烈恆蓋其坐人故君雖窮老而志不衰乾隆四十二年君試於泰州五月乙亥一宿而卒琴瑟方御弔者在門逆旅桐棺視不受含斯生人之極哀巳君生十三歲而入於州學既久始食其廩膳其沒也年六十有四葬在神居山某原祔於先人禮也妻陳氏食貧味道雅志夙諧先君即世今則同穴子載銘曰於穆賈君實惟固窮鑒於前言以澤爾躬北風蕭蕭平地雪尺飢人在牀歌出金石駕我朱轓婆娑樂神矯矯危言正彼淫昏心則亡疚名以不揚幽宮永夜鬱此剛腸小同蒙稚西華淪落家風遂隕遺書罕託善其何勸天亦難知我銘樂石惟亡愧辭大淸誥授通議大夫湖北提刑按察使司按察使兼管驛傳馮君碑銘並序君諱廷丞字均弻其先畢公高之後食采馮城因而命氏世遠失其譜系明成化中壽光馮盛以軍隸振武衛遂家代州五傳至明期領鄉薦其族始顯皇朝曰如京廣東布政使司左布政使子曰雲驌禮科給事中為君高祖曰㻾南寧府同知為君曾祖曰光裕都察院右副都御史巡撫湖南為君祖曰祁翰林院編修為君父馮氏以文學起家至君凡十一世立朝涖官咸有名績家法謹嚴為北方所重君既冠舉於鄉乾隆二十一年由蔭生授光祿寺署正君儀觀溫雅造次必於禮法嘗引見上望其舉止喜曰是舊家子弟丁父憂去官君自以有祿於朝乃盡以遺産與諸弟而獨任喪葬之事服闋補故官官間少事因得肆力於學與大興朱學士筠及其弟侍郎圭嘉定錢少詹事大昕靑浦王按察使昶歙程編修晉芳桐鄉汪舍人孟鋗以名節相矜尚文章議論咸縕藉有根柢是時諸人皆卑官其後仕宦或顯或不顯天下稱名德焉君多識史事尤精於地理自禹貢以下川瀆異同都邑沿革口講手畫昭然如覩丹黃纍篋老而益勤然不喜著書自娛而巳差監通州本裕倉有善政既受代吏人往來京師更十餘年參謁惟謹遷大理寺寺丞故事大理於三法司主平反刑部權日重大理不得舉其職君在官於罪名出入數有糾駁刑部諸司皆怒而大學士劉文正兼刑部尚書獨心善焉未幾遷刑部廣西司員外郎既謁文正文正傾心禮遇事無大小悉以咨之踰年遷廣東司郎中君公廉不受請託然用法持平多所矜恕是時文正方得政所奏請無不當故君得行其志其後君由江西按察使入覲大學士于文襄問君在刑部治狀君曰夫獄者愈求則愈深要在適中而止則情法兩盡文襄嗟賞其言告諸司官以為法出為浙江分巡寧紹台兵僃道兼海關監督歲造戰船采木於屬縣吏因以為利君閲實其木書之於策以次伐之吏無所容手潮犯蕭山君急裝立塘上曰水至則死於此督吏民修防更三晝夜塘得不壞歲入有餘則以舉其地之公事次則施諸三族之貧者通人名德禮接如不及故交遊士咸得其欲而君被服如儒者不聽音樂終身無妾媵遷官之日至無以治裝調福建分巡臺灣兵僃道兼提督學政承黃教亂後撫治雕敝務安靜不苛擾柵城三千七百丈以為外衛數巡廳縣供頓餽遺無所受嘗一夕卻金如意七列城歎服稱盛事有吏職造船應支番銀二萬吏之子為諸生其年當選拔吏請無受直而貢其子卒不許遷江西提刑按察使司按察使江西當江湖嶺嶠之湊地險而民瘠是以多盜君廣設鉤距得其主名將竟其事會王錫矦字貫獄起君坐失察革職發軍臺效力贖罪尋準君捐贖發江南以同知用四十五年上南巡駐蹕宿遷詔許君降捐道員仍留江南候補君自至江南前後為總督者謂君不習為吏接遇甚簡既論贖盡毀其家不足當十一素畏愼善憂及兹牢落生意遂盡諸道凡缺七官輒為人得署常州徐州淮安三府蘇松常鎮太糧儲河庫江南鹽巡松太兵僃四道率不數月代去常日旁皇無所得食賈人責家咸見逼迫及其當官則淸操彌厲同官或叩其所入輒權詞答之終不以其守蓋人盡心民事尤急貧弱雖一日必舉其職時人以君好施而無所取淸而不刻篤學勤政未嘗近名謂之三反當君管河庫日大學士誠謀英勇公以閲河至見君深相器重使開臨河集引河刻期而竣比還朝陳君忠實可任且言其淹恤由是補整飭江南鹽務分巡江寧道踰月遷湖北提刑按察使司按察使兼管驛傳荆門州知州某為民所毆以抗糧聞君馳往撫定其衆究其致釁始末乃坐倡首者而貸其餘人施南民以爭地相仇殺君履行萬山中親定其界為瘴氣所中重以飢勞舊疾遂作既歸猶冒暑聽斷不少止踰秋浸劇請解官治疾甫報允而卒是為乾隆五十年十一月乙丑春秋五十有七貧不能具含斂妻子歸無所居寄食京師士大夫知與不知莫不痛惜君長於撫御短於應變故與同官多不相中而恆得民心嘗慕古爭臣守節死義昌言天下事遇事激發引為已任久宦京朝隨牒平遷未有言責其後五官司道上不能專制下不得親其民淸勤自力無所表樹經世之學體國之忠生不竟其施沒不傳於後世其可哀也巳君取翰林院侍讀學士錢塘周玉章女誥封淑人子宬候補八品小京官女適翰林院編修臨汾曹錫齡宬以君卒之次年十一月乙丑葬君於代州之煙望村禮也中自依有道逮一星終愧以下材遇賞君子始則窮鳥投懷實蒙忘分與年流言不信既而繾綣從公共涉夷險凡所披陳無不意盡嘗恐朝露有期將使老母弱女纍君高義而一辭祖道遽至撫棺遂以衰疾餘生哀述舊德天道人事其何可量銘曰邈矣公高光我文昭畢分晉國馮坐秦朝上黨東陽其延十世良德和龍亦雄四裔代州之顯當明末造綿祀二百自他有耀君生而貴亦與憂俱􅍖世守官尺寸不踰高柴用刑刖人感惠汲孺閉閣淮陽稱治君雖習吏澤不及民盛德在抱萬物知春在邦在家曰有簠簋何以飭之臣心如水朝酗夜歌彼維何人乃速高位以康其身此焉小心履冰集木缿筒尺書蒼黃詔獄鈞金孔棘焚心汗顏隕我國寶傷哉百鍰牽復有時交摧莫訴如彼敬通坎坷末路目營四海受纏朱紱金玉滿堂泊如無物一材一藝百年千里聞名嚮風載矜載喜生館死殯其歸如林外無德色內無倦心戚戚兄弟莫遠具邇女憂女嘆如余在體窮年奔命一肉不完人賴舉火君死勤官年裁中壽家亦屢空完然白璧君子之躬百世有師淸風不墜我無愧辭人惟墮淚大淸故貢士馮君墓銘並序有馮廷重者衰而造門以其叔父邵所為狀請中為銘而納諸其父之墓邵為人敦篤好學與中雅故知其言不苟乃屬詞曰君諱鄄字翼縯先世壽光人明成化中有曰盛者以軍隸振武衛遂籍代州至君凡九世曾祖雲驌禮科給事中祖欽刑部四川司主事父祖悅陜西整飭洮岷兵僃道按察使司副使君七歲喪母居喪如成人事副使孝謹未嘗有過乾隆二十年副使以雷州府知府卒官君年二十有二副使故廉貧官數遷謫垂老投瘴地飾終之日餘俸不足共斂事代州水陸萬里歸無居業葬無墓地老幼百口莫知所依君以弱年為家督謀慮枝梧率中夜廢寢北行未半糗糧垂竭其家遂散君使諸婦孺各依其母氏而自與弟舁棺以歸間出稱貸四方經營生事以葬以養以迎其親屬督諸子弟就學取婦生子嫁其二妹凡更十餘年副使之家遂立初君之生也副使年四十有三人以為晚至是竟收其力焉君與其弟郟邵相愛甚郟既前夫邵久客無子君命邵歸而身授學京師越五年竟卒君以選拔貢生舉順天鄉試卒之年四十有七葬代州某原禮也君既力庀其家事風雨漂搖僅而即安而以憂勞損其天年終以客死宜邵之述德纍行其詞有哀焉邵又言君事繼母有禮性平恕恢然長者惜中之不及見也銘曰噫嘻馮君率是常道送死事生孝于惟孝喪葬既舉室家既聚衆曰淸吏是宜有後曾是克家不康其身旅館僮奴傷哉飾巾句注蒼蒼有子有弟百里見星孰撫爾視封土若堂巋然牛脊我銘志之終惟安宅大淸故候選知縣李君之銘並序君諱敦字孝臣高郵人祖某父某仍世好善多所周貸家故富贍因是遂貧君治諸經通敏于詩春秋尤深作解義數十條義並精審晚好厯算得梅氏書盡通其術是時古學大興元和惠氏休寧戴氏咸為學者所宗自江以北則王念孫為之唱而君和之中及劉台拱繼之並才力所詣各成其學雖有講習不相依附君于年為長三人者兄事焉君知鬼神情狀不惑于非類于宋以後愚誣之學距之尤力內行淳篤臨財無所苟與人交恂恂退讓己所不為不以責人巳所知不與人爭其所親善死生貧富不以易其心既久困諸生籍以高弟將貢于國學其前夕執友賈田祖死君遂不入試而親棺斂以歸之君身短不及中人貌質朴嗜酒善諧笑至其執心尚義勇于為人雖賁育不過也乾隆四十五年君成進士注選知縣越四年病卒年五十有一中既與君久要得詳其行誼每觀先哲話言詩書所稱述求之君身則百行僃焉嘗與同志歎息謂古淑人君子見于今日然君居則受侮于家出則不諧于鄉里客于四方遊于京師人或始慕而終棄之其愛而加敬者不十人焉以為古之道不宜于今今之人不足以知君也然君當少壯之日窮餓奔走汲汲無歡中歲以後百疾交侵支離骨立未霑一命竟隕中身女失所歸子又不肖則非人之所能為也然後知世之同力以擠君者實順乎天心而莊周氏所稱人之小人天之君子者至于君而其言不驗焉烏乎豈君之命與銘曰力學修行其職在我曰貧曰疾道無不可生莫我知沒豈貴名銜哀纍德以表余情大淸故吳縣儒學教諭喬君墓碑並序君諱汲字敏伯先世籍長洲明洪武中有某者始遷寶應之柘溝至君凡十三世曾祖可聘明掌河南道監察御史巡按浙江國亡遁迹完節以終祖萊皇翰林院侍讀與河道總督靳輔爭議海口奪官父崇修用人材辟召既見以疾固辭授銅陵縣教諭自君曾祖復遷於縣城君弱冠領鄉舉壻於武陵胡氏舅期恆巡撫甘肅從學甥館是時故撫遠大將軍方貴巡撫為之盡其力而偏愛於君君即有求謁再轉則得請於上當君在道州縣或郊迎長跽因門下白事君儉德晦名蟄居誦習人事饋問亡所通二族既敗有司迹君於蕪湖推問纍旬卒以不坐選吳縣教諭故時居是官者率倚富人為緣君守官敦朴日與諸生論説經義未嘗詣人束修之禮非其道不以入諸生鳩民財以祀禹於包山既成言於大府君為議曰禹食於江以南會稽之廟實為命祀禮煩則瀆諸生自有先聖先師不可以侍前古明王之祀由是中止縣為布政使治屋積材木於學宫君爭之不能得曰吾居其官是不可干也去則惟公所為即日以病告歸學政晉寧李侍郎久之得其事惜君之去表其行迹下諸學官以為法君家居篤老三族之禮事弔死而問疾未嘗不在凍梨植鰭有晬其容登降折旋終日亡怍多識朝廷掌故先民德音出辭藹然依於忠信小大傾心虛往實歸鄉人君子莫不歎息以是為邦家之光人倫之表焉矣君恆日自力寫書燭入則誦其文不中程不止既病惟諷諸經卒之前夕次及禮記中遇誤文求書正之而沒於時年八十六矣是為乾隆四十一年九月甲午遺命三月而葬不營佛事禮也中之妻於君為镾甥昔操几杖婁接音談委宛平生情瀾不竭顧望崦嵫悽然身世之託曾不踰歲再經君里巳在殯宫永念久要期亡慙負而君之子士宗務求之達官固不具狀謹據所知敘而藏之且繫以辭曰喬維望宗三世箸節遺訓之資爰張其烈秩秩庠門載灑載掃曰食其官曰守其道大木百車間於弦歌我義不安它人則那杖函玉佩雍容井里洋洋話言充人心耳惟寢惟食惟學與謀屬纊綿綿雒誦其休廣川大業魯山德範既訓既親吾生何憾惟此善人實以天全安其真宅式告萬年黃鶴樓銘並序代畢尚書作江出峽東至於巴邱沅湘二水入焉又東至於夏口漢水入焉於是西自岷山西南自牂牁南自桂嶺西北自嶓冢五水所經半天下皆匯於是以注於海而江夏黃鵠山當其衝江環其三面再折而後東故地形稱險焉縣因山為城山之西有磯起於江中石立如植激水逆行恆數里於形為尤險其上為樓咸取於山以為名始自孫吳酈氐著之齊梁二書並載其迹於後樓之興廢史莫能紀乾隆元年大學士史文靖總督湖廣乃更其制自山以上直立十有八丈其形正方四望如一高壯閎麗稱其山川厯年六十堅密如新其下則水師蒙衝在焉歲以十月都試吳戈犀甲蔽川耀日江以西商旅百貨之所湊道路晝夜行不休著籍戶八百萬公私舟楫列檣成林南北二郊原隰沃衍禾黍彌望無高山深林之蔽桴鼓一鳴上下百里若示諸掌姦宄無所匿其迹惟江夏自宋立郢州以來代為重鎮國家疆理天下愼固封守常以尚書侍郎鎮撫其地及司道之所治百城冠蓋四至趨風馹路劇驂輶軒之使不日則月西南際海屬國以百數終王受吏纍譯來庭往反上都皆道於此守土之吏率會於兹樓以飲食之禮親其僚友不降階序而民風穡事胥可知也洎夫王臣咨諏每懷靡及舌人體委懷柔遠人治官蒞民禮賓詰戎邦之大事於是乎咸在外以設險內以經國地勢然也其有逐臣羇客登高作賦感物造端可興可怨丹邱羽人雲水栖遊徜徉乎其地均足以發抒文采增成故實沅始釋褐文靖以元老在朝先後序同歲為衣冠盛事蒙恩揚厯兹繼其武既欣踐於勝地且感遺構乃為銘曰海有神山河惟底柱巨靈爰闢列仙攸處樂哉斯邱曾城之顚上標崇觀下俯大川柱天不傾障江欲回山增比嶽水激成雷都會是程蠻荆斯控光映鳥帑勢吞雲夢四野砥平八窗洞屬登若馮虛望惟極目朱衣行水毛人墮城夢有先兆神或不經大别西踞樊口東趨神禹明德黃武伯圖川逝無停人往不作我紀兹遊思同民樂漢上琴臺之銘並序代畢尚書作自漢陽北出二里有邱焉其廣十畞東􅍟大别左界漢水石隄亘其前月湖周其外方志以為伯牙鼓琴鍾期聽之蓋在此云居人築館其上名之曰琴臺通津直道來止近郊層軒纍榭迥出塵表土多平曠林木翳然水至淸淺魚藻交映可以栖遲可以眺望可以泳遊無尋幽陟遠之勞靡登高臨深之懼懿彼一邱實具二美桃華淥水秋月春風都人冶遊曾無曠日夫以夔襄之技溫雪之交一揮五弦爰擅千古深山窮谷之中廣厦細旃之上靈蹤所寄奚事刻舟勝地寫心諒符元賞余少好雅琴粗諳操縵自奉簡書久忘在御弭節夏口假館漢皋峴首同感桑下是戀於以濯足滄浪息隂喬木聽漁父之鼓枻思遊女之解佩亦足高謝塵緣希風往哲何必撫弦動曲乃移我情銘曰宛彼崇邱於漢之陰二子來遊爰迄於今廣川人靜孤館天沈微風永夜虛籟生林泠泠水際時泛遺音三歎應節如彼賞心朱弦巳絶空桑誰撫海憶乘舟巖思避雨邈矣高臺巋然舊楚譬操南音尚懷吾土白雪罷歌湘靈停鼓流水高山相望終古附伯牙事考漢上伯牙遺迹方志無稽誠不足道古籍載伯牙事所連及者琴操有成連方子春吕氏春秋有鍾子期成連方子春無所考吕氏春秋本味篇伯牙鼓琴鍾子期聽之高誘注云伯氏牙名或作雅鍾氏期名子通稱悉楚人也又精通篇云鍾子期夜聞擊磬者而悲高誘注云鍾姓也子通稱期名也楚人鍾儀之族誘受學於盧尚書立言不苟其時故書雅記存者尚多必有所本期為鍾儀之族則是世官而宿其業也其知音也固宜又鍾建亦為樂尹不知與期何别也荀子勸學篇伯牙鼓琴而六馬仰秣楊倞注伯牙不知何時人今檢史記巍世家昭釐王十一年當秦昭王四十一年昭王問左右今日韓巍孰與始強如耳巍齊孰與孟嘗􅉭卯賢中旗馮琴而􅍟中旗秦策又作中期而韓非子見難篇正作鍾期以馮琴事準之則為鍾子期無疑也昭王十年楚懷王入秦二十九年白起攻楚取郢為南郡鍾期之自楚入秦固有因也然則伯牙為楚懷王頃襄王時人明矣列子與鄭子陽同時而湯問亦載其事者劉向謂穆王湯問二篇迂誕恢怪非君子之言以今考之正他書誤入之駁文也余既銘斯臺因附書於石之陰以告學者春秋述義諸侯受國于天子而盡臣其封內生殺慶賞咸莫不專之故史之所書內事從君舉郕太子朱儒來奔公以諸侯之禮逆之則史以郕伯書之此邦交從乎君舉也莊公子赤襄公並為世嫡其生也惟莊公書桓公以太子生之禮舉之則史以子同生書之此繼體從乎君舉也公子買戍衛楚人救衛不克公懼于晉殺子叢以説焉謂楚人曰不卒戍也公以不卒戍刺之則史以不卒戍書之此刑人從乎君舉也文薑哀薑聲薑齊薑孟子皆夫人也文薑哀薑穆薑皆有罪而哀薑又齊人所殺也子氏聲子成風敬嬴二定姒齊歸皆妾女也赴于諸侯反哭于寢祔于姑則曰夫人某薨葬我小君某不赴則不稱夫人不反哭則不言葬小君此喪禮從乎君舉也傳據簡牘務詳其事經為策書必循其體明乎此則經與傳之不合者可以息其疑矣至于經所不書其例非一而非公命不書隱元年發其例雖至改葬先君鄰國之會葬亦以公不臨不見故不書是知內事之繫乎君也君舉必書此之謂也魯之春秋策書之法實本周禮韓起所見祝鮀所述有其徵矣有即位之禮周書顧命篇國語周語故桓文宣成襄昭定哀皆書即位隱不書攝也莊不書文薑出也閔不書亂也僖不書公出也使周禮無即位之禮則春秋所書為無據矣有君卒于路寢之禮喪大記故莊宣成三公書公薨于路寢傳于成發其例曰言道也僖薨于小寢文薨于臺下襄薨于楚宫定薨于髙寢傳于僖發其例曰即安也昭薨于乾侯言失其所也隱閔書公薨而不言地明其為弒也桓書公薨于齊明其為戕也使周禮無君卒于路寢之禮則春秋所書為無據矣周公制禮事為之制曲為之防伯禽受之以封于魯魯之史世守之以為春秋莫敢損益焉故曰魯猶秉周禮又曰吾今而知周公之德與周之所以王也春秋本一代之禮成一國之史上不可通于夏商旁不可施于吳楚而後之君子欲援春秋之法以定列代之史斯不然矣問者曰周禮具在魯之史據而書之何待于孔子而後作哉答曰譬折獄雖有刑書猶求聖哲之上明察之官忠信之長慈惠之師然後能聽其情而議其輕重以徵于書春秋亦猶是也有君不事周有常刑必有董狐然後能正其惡周衰史失其官而禮經將廢自孔子修之而後先王之典存焉故禮之與春秋相為權衡也非周公不能作非孔子不能修豈可泛然望諸衰世之史哉魯叔仲惠伯之死荀息之忠也不書何也曰以諸侯之策書之則當曰魯公子遂弒其君惡及其大夫彭生春秋內諱書子卒而不地其君既諱則其臣無所繫無所繫則不書忠如彭生惡如公子翬皆是也若曰公子遂殺叔仲彭生則是兩下相殺之詞無以昭惠伯之忠故不書者辭窮也杜謂史畏襄仲非也春秋有通例有變例諸侯失地名荆敗蔡師于莘以蔡侯獻舞歸是也而齊人滅談談子奔莒談子不書名滅同姓名衛侯燬滅邢是也而楚人滅夔楚人不名入國曰滅而虞師晉師滅下陽取邑而曰滅宋公入曹以曹伯陽歸滅國而曰入弒君稱君君無道也晉靈公陳靈公齊莊公無道而不稱君襄二十六年澶淵之盟晉趙武宋向戍曹人皆稱人趙武卿不會公侯也向戍後也曹微者也三稱人同辭不同義襄二年夫人薑氏薨襄公嫡母也四年夫人姒氏薨襄公母也九年夫人薑氏薨襄公祖母也而其辭不别成十年傳晉景公有疾立太子州蒲為君以伐鄭經書五月公會晉侯齊侯宋公衛侯曹伯伐鄭此晉侯厲公也丙午晉侯獳卒此景公也而二晉侯同辭是其義也述學補遺釋冕服之用冕服之用自祭祀而外見於經典者凡十有一玉藻􅏏端而聽朔於南門之外注端當作冕一也哀公問冕而親迎二也周官司服饗射則鷩冕三也四也據注及正義食禮在廟亦鷩冕五也覲禮天子衮冕負斧扆以朝諸侯六也文王世子冕而總干親在舞位以養老七也祭義天子諸侯為藉冕而躬秉耒八也司服諸侯之大夫聘于天子􅏏冕九也夏采王崩以冕服復于太祖十也節服氏衮冕六人朝覲維王之大常諸侯四人服亦如之十一也後之俗儒專以祭服當之誤矣江都縣榜駁義江都縣衙前榜二曰績傳董相邑肇荆王中以為皆誤也自孝景前四年徙汝南王非王江都傳子建元朔二年自殺凡二世三十三年其時并得鄣郡而不得吳有廣陵江都高郵平安宛陵於潛江乘春穀秣陵故邱丘覃句容涇丹陽石城湖孰陵陽蕪湖黝溧陽歙宣城二十一縣為今揚州太平寧國池州徽州五府通廣德二州江寧府之上元江寧句容高淳溧水鎮江府之溧陽及杭州府之於濳昌化泗州之天長十縣地諸侯相治其國視郡守秩二千石在其上見哀帝紀汲黯傳而江都縣自屬江都國其令自千石至六百石今之江都縣知縣正可當漢之江都令耳地之廣袤尚不及其半若傅之董相是以國為縣以相為令其淆甚矣荆王劉賈以高帝六年封至十一年為英布所殺無後其立國至淺賈都于吳漢興以來諸侯年表此地為其支邑自名廣陵至孝景置江都國賈死巳四十三年江都縣之名前此絶無所見疑即託始于此時安得以為肇于賈也二者之云失于不學榜立五年無覺其非者中據史以為之辨漢鴈足鐙槃銘釋文漢銅鴈足鐙槃高今尺三寸七分徑四寸七分銘半環槃背云竟寧元年考工工護為內者造銅鴈足鐙重三斤十二兩護武嗇夫霸掾廣漢主右丞賞守令尊護工卒史不禁省又一行云中宮內者弟二十五下少空又云受內者凡篆文五十五重文作二者一首六字漫漶日中拭水視之乃可辨考下從作者其刻獨明乃後人妄為鉤泐不足辨也鐙故為江都馬氏物今歸巴慰祖豫籍豫籍從甥胡唐詠陶審定其文今具釋之云竟寧元年者元帝建昭六年正月改元即位之十六年也云考工者少府屬官本名考工室武帝太初元年更名臣瓉云冬官為考工主作器械是也云為內者造銅鴈足鐙者內者亦少府屬官有令有丞外戚傳許廣漢女平君當為內者令歐侯氏子婦則內者非奄人也古之燭束薪為之或執之於手以膏為燭始見於秦始皇本紀則宜有槃以承之鐙其别也故外戚傳乃夜張鐙燭鐘鼎款識所載凡七鐙别出車宫承燭槃是也鐙錠互訓正謂器首之注膏者徐鼎臣謂錠中置燭故謂之鐙誤矣故上林榮宮鐙銘上林榮宮銅鴈足鐙下有槃並重六斤是也云重三斤十二兩今權之得二十四兩二錢吕微仲考古圖漢好畤官厨鼎刻曰重九斤一兩今重三斤六兩歐陽永叔集古録漢谷口銅甬刻曰重四十斤今重十五斤以此鐙校之今六兩當漢一斤有嬴有縮皆不畫一疑漢權公私大小非一律也云護武嗇夫霸掾廣漢主右丞賞守令尊者漢制縣有嗇夫職聽訟是謂少吏張釋之慱有虎圈嗇夫外戚傳有暴室嗇夫及此銘之武嗇夫其名雜矣漢官之非真拜者有行有領有護有守郎中秩比三百石都水水衡都尉屬官劉向以郎中為都水使者本傳稱領護三輔都水及遷光祿大夫秩比二千石則尊矣而所校諸書序皆稱護左都水使者光祿大夫則護者兼官之名若後世之差遣此武嗇夫乃假吏也霸嗇夫名掾丞令皆考工官吏廣漢賞尊其名也守令亦其未即真者耳丞之多者佽飛九丞掖庭八丞宦者七丞獨考工不知其數今言主右丞則非一丞矣云護工卒史不禁者不禁卒史名嗇夫掾丞令皆先卑而後尊卒史在令後者以護工别出之云省者漢諸器銘多有之若呂氏春秋之言監工矣云中宫內者弟二十五者漢時皇后所居稱中宫蓋永定宮也漢諸鐙銘多紀其次弟云受內者謂中宫侍御受之內者也金石録平周金鉦銘云平定五年受圜隂與此同意乾隆四十九年八月晦汪中釋江淹墓辨歙之江氏皆祖梁金紫光祿大夫醴陵侯淹以醴陵為濟陽考城人歲遣人至今考城修墓致祭中以為誤矣宋書州郡志云晉永嘉大亂幽冀靑并兖州及徐州之淮北流民相率過淮亦有過江在晉陵郡界者晉成帝咸和四年司空郗鑒又徙流民之在淮南者于晉陵諸縣其徙過江及留在江北者並立僑郡縣以司牧之又云文帝元嘉八年以南徐州治京口割揚州之晉陵兖州之九郡僑在江南者屬焉故南徐州備有徐兖幽冀靑并揚七州郡邑其南徐州下有濟陽郡領考城鄄城二縣蕭子顯齊志亦同宋齊二志南徐濟陽郡領考城鄄建武三年省濟陽郡考城度屬魯尋又省鄄城度屬南濮陽齊志又云臨淮以下十二郡並無實土由是言之江氏本貫實在今之考城春秋之戴國漢之災縣章帝始改今名而醴陵所係之濟陽考城則僑立于今之丹徒縣境二者邈不相涉醴陵卒于天監四年自宋眀帝泰始三年失淮北四州今之考城久淪于魏至是已四十二年魏之濟陽始置徐州繼屬陽夏郡地形志載其建置甚眀當醴陵之卒日尋干戈其時壽陽合肥並為魏土豈深入敵境千里自營窀穸況渡江百族並無反葬故里之事一壞之土不知誰何纍百衣冠拜伏流涕真可謂無妄之福巳雷州府知府馮君妻三李氏不合葬議代州諸馮皆族葬自眀舉人某考卜於州東北華甲莊至雷州君凡五世為基二十有六雷州君凡五取其三皆李四張五戈戈則今固在始取李沒於康熙三十九年葬於四十一年次沒於四十七年葬於五十一年次沒于雍正七年葬於十年皆在祖墓張始生子鄄郟邵􅔛乾隆五年雷州官岷洮道張沒于官所于時華甲莊地盡不可復葬乃假葬於域外之碑堂又十五年雷州卒於其官又十七年始得兆於州北之北岡距三李之沒久者殆六十年近亦四十餘年議將遷而合諸北岡馮氏諸長老皆曰葬久不可知既動損幽靈脫有朽敗其忍使遺蛻露見于天日且魂氣有知往來冥合非墓地之所能隔苟為不然無寧久依於其舅姑而勿播遷以從其夫于是不果遷惟張與雷州同穴其後三年邵客於鄞告中以其事且曰邵三前母皆無出邵兄弟又不逮事而所生母獨從父葬人其謂我何子為我求諸禮吾將勒諸窆石之隂中曰以茲所為求之於禮則固不協不協而為之辭非中所能雖然奉雷州以附於祖則無其地遷三母以就雷州則慮棺之毁是人事之窮非得為而已者也張之體魄不可即安于假葬三李下窆嵗遠止可仍其真宅又必至之事非厚薄之差也前世若晉鄭袤先取孫氏蚤亡袤卒繼室曹氏迎孫喪於黎陽合葬唐楚王靈龜前妃閻氏嫁不踰年而夭及靈龜卒妃上官氏為備禮同葬史皆美其知禮今張既先雷州殞世事非自主無歉於曹與上官又彼並孤魂無依此則從葬祖墓其事差殊苟欲致其無巳之情則猶有二焉使華甲莊墓域之外有地可拓異日以一孫及孫婦從於三李準諸卒哭班袝之文以定公墓昭穆之次女尸異姓神道所馮非親而祔示不遐棄喪服小記婦祔於祖姑祖姑有三人則祔於親者注親者謂舅所生斯亡於禮者之禮也古之事亡惟重廟祀享諸野外於禮不經馮氏四時家祭人各立主則張不先三李而食其分固自秩矣若以拜墓之典有舉莫廢則祭雷州成禮即馳祭三李之墓然後還祭于張同日異日視道之遠近以是為先後之序焉則夫夫妻子母之心尚亦交慰哉雖然私議刻諸石非古也附之譜記待後世達者其可爾江都縣附學生員汪中謹議狐父之盜頌并序列子説符篇東方有人焉曰爰旌目將有適也而餓于道狐父之盜曰邱見而下壺餐以餔之三餔而後能視有感其事因作此頌狐父之盜厥名曰邱鮑食而嬉稅于道周東方有人惟爰旌目貿貿然來既餒而踣於時子盜盱睢審顧匪我昏媾匪我舊故嗒然七尺形在神奄弱息裁屬飢火方炎致此非我哀爾無辜左挈懿筐右執方壺得之則生失之則死藐爾一簞倏焉人鬼􅉭􅉭下土曾無可依惟盜餔我慈母嬰兒彼盜之食於何乃得外御國門內意窟室勇夫寢戈暴客是禦國有常刑在死不赦惟得之艱致忘其身既淅既炊以濟路人舍之何咎救之何報悲心內激直行無撓吁嗟子盜孰如其仁用子之道薄夫可敦悠悠溝壑相遇以天孰為盜者吾將託焉弔黃祖文并序往尋禰生遺事輒羡其榮遇故北海忘年而下交章陵跣足而請命懿彼兩賢是云死友固無得而稱矣若夫孟德威振天下屈意于狂夫之言劉表坐談西伯忍耻于細人之譖曠世高舉異人同情蓋若有天相焉即其遭命江夏終隕國寶後之君子攄懷舊之想悼生才之難莫不扼腕斗筲傷心五百然觀衡為黃祖作書輕重疏密各得體宜祖持其手曰處士此正得祖意如祖腹中之欲言則猶有賞音之遇也夫杯酒失意白刃相讎人情所恆有至于臨文激發動色相咨解帶寫誠歡苦親戚其沖懷遠識豈可望之今世士大夫哉雖枉天年竟獲知己嗟乎禰生可以不恨余束髮依人蹉跎自效逮于長大幾更十主何嘗不賦鸚鵡于廣筵識豐碑于道左而醉飽過差同其狷狹飛辨騁辭未聞心賞其于黃祖蓋猶得其惡而遺其善焉古有三疾今也則亡論者不察猥使祖于千載之下獨受惡名斯事之不平者也用述斯篇詔來雪往其辭曰歲在單閼兮四月幾望有士失職兮獨居愴恍世既莫吾知兮將託于古之人溯汶江以通誠兮遠弔府君昔夏口之高會兮方虎視而自威何死公之等道兮乃衆辱于白衣彼隕其生兮子喪其名嗟須臾之不忍兮遂兩敗而俱傾固凶德之交會兮豈九天之可正惟人世之不齊兮孰富夀而貧天覩周鼎而目迷兮奉康瓠以為寶子吹竽則信工兮固吾王之不好緊夫子之識真兮又達心而不欺由執手之款言兮曰白首以為期感斯情之信厚兮恨不與之同時苟吾生得一遇兮雖報以死而何辭惟夫子之殺士兮世相戒以畏塗歷千祀而蒙詬兮亦足以蔽其辜節一惠以為名兮猶將傲今之人以所無重曰鳳皇虬龍不可紲兮相彼九州身安置兮願得君子終焉事兮庶保元吉沒吾世兮荀卿子通論荀卿之學出於孔氏而尤有功於諸經經典敘録毛詩徐整云子夏授高行子高行子授薛倉子薛倉子授帛妙子帛妙子授河間人大毛公毛公為詩故訓傳于家以授趙人小毛公一云子夏傳曾申申傳魏人李克克傳魯人孟仲子孟仲子傳根牟子根牟子傳趙人孫卿子孫卿子傳魯人大毛公由是言之毛詩荀卿子之傳也漢書楚元王交傳少時嘗與魯穆生白生申公同受詩於浮邱伯伯者孫卿門人也鹽鐵論云包邱子與李斯俱事荀卿包邱子即浮邱伯劉向敘云浮邱伯受業為名儒漢書儒林傳申公魯人也少與楚元王交俱事齊人浮邱伯受詩又云申公卒以詩春秋授而瑕邱江公盡能傳之由是言之魯詩荀卿子之傳也韓詩之存者外傳而巳其引荀卿子以説詩者四十有四由是言之韓詩荀卿子之别子也經典敘録云左邱明作傳以授曾申申傳衛人吳起起傳其子期期傳楚人鐸椒椒傳趙人虞卿卿傳同郡荀卿名況況傳武威武威據史記張丞相傳當作陽武張蒼蒼傳洛陽賈誼由是言之左氏春秋荀卿子之傳也儒林傳云瑕邱江公受榖梁春秋及詩于魯申公傳子至孫為博士由是言之穀梁春秋荀卿子之傳也荀卿所學本長于禮儒林傳云東海蘭陵孟卿善為禮春秋授后蒼疏廣劉向敘云蘭陵多善為學蓋以荀卿也長老至今稱之曰蘭陵人喜字為卿蓋以法荀卿又二戴禮並傳自孟卿大戴曾子立事篇載修身大略二篇文小戴樂記三年問鄉飲酒義篇載禮論樂論篇文由是言之曲臺之禮荀卿之支與餘裔也蓋自七十子之徒既殁漢諸儒未興中更戰國暴秦之亂六藝之傳賴以不絶者荀卿也周公作之孔子述之荀卿子傳之其揆一也故其説霜降逆女與毛同義禮論大略二篇穀梁義具在又解蔽篇説卷耳儒效篇説風雅頌大略篇説魚麗國風好色並先師之逸典又大略篇春秋賢穆公善胥命則為公羊春秋之學楚元王交本學於浮邱伯故劉向傳魯詩穀梁春秋劉歆治毛詩左氏春秋量仲舒治公羊春秋故作書美荀卿其學皆有所本劉向又稱荀卿善為易其義亦見非相大略二篇蓋荀卿於諸經無不通而古籍闕亡其授受不可盡知矣史記載孟子受業於子思之門人於荀卿則未詳焉今考其書始於勸學終於堯問劉向所編堯問第三十其下仍有君子賦二篇然堯問卜附荀卿弟子之詞則為未篇無疑當以楊倞改訂為是篇次實仿論語六藝論云論語子夏仲弓合撰風俗通云穀梁為子夏門人而非相非十二子儒效三篇每以仲尼子弓並稱子弓之為仲弓猶子路之為季路知荀卿之學實出於子夏仲弓也宥坐子道法行哀公堯問五篇雜記孔子及諸弟子言行蓋據其平日之聞於師友者亦由淵源所漸傳習有素而然也故曰荀卿之學出於孔氏而尤有功於諸經韓詩外傳客有説春申君者曰湯以七十里文王以百里皆兼天下今孫子天下之賢人也君藉之百里之勢臣竊以為不便于君苦何春申君曰善于是使人謝孫子孫子去而之趙趙以為上卿客又説春申君曰昔伊尹去夏之殷殷王而夏亡管仲去魯入齊齊強而魯弱由是觀之賢者之所在其君未嘗不善其國未嘗不安也今孫子天下之賢人何為辭而去春申君又云善于是使請孫子孫子偽喜戰國策作為書謝之曰鄙語曰厲憐王此不恭之語也雖然不可不審也此為劫殺死亡之主言也夫人主年少而放無術法以知姦即大臣以專斷圗私以禁誅於已也故舍賢長而立幼弱廢正適而立不善故春秋之志曰楚王之子圍聘於鄭未出竟聞王疾反問疾遂以冠纓絞王而殺之因自立齊崔杼之妻美莊公通之崔杼率其羣黨而攻莊公莊公請與分國崔杼不許欲自刃於廟崔杼又不許莊公出走踰于外墻射中其股遂殺而立其弟景公近代所見李兌用趙餓主父于沙邱百日而殺之淖齒用齊擢湣王之筋而懸之於廟梁夙昔而殺之夫厲雖癰腫痂疕上比遠世未至絞頸射股也下比近世未至擢筋餓死也由是觀之厲雖憐王可也因為賦曰璇玉瑤珠不知珮雜布與錦不知異閭娵子都莫之媒嫫母力父是之喜以盲為明以聾為聰以是為非以吉為凶嗚乎上天曷維其同詩曰上帝甚慆無自瘵焉按春申君請孫子孫子答書或去或就曾不一言而泛引前世劫殺死亡之事未知其意何屬且靈王雖無道固楚之先君也豈宜向其臣子斥言其罪不知何人鑿空為此韓嬰誤以説詩劉向不察采入國策其敘荀子新書又載之斯失之矣此書自厲憐王以下乃韓非子姦劫弒臣篇文其言刻核舞知以禦人固非之本志其賦詞乃荀子佹詩之小歌見於賦篇由二書雜采成篇故文義前後不屬幸本書具在其妄不難破爾孫卿自為蘭陵令逮春申之死凡十八年其間實未嘗適趙亦無以荀卿為上卿之事本傳稱齊人或讒荀卿荀卿乃適楚詩外慱國策所載或説春申君之詞即因此以為緣飾周秦間記載若是者多矣至引事説詩韓嬰書之成例國策載其文而不去其詩此故奏之葛龔也今本荀子二十卷元時槧本題云唐大理評事楊倞注一本題云唐登仕郎王建初年荀卿復自趙來齊故曰三為祭酒是時春申君封于淮北蘭陵乃其屬邑故以卿為令後八年春申君徙封于吳而荀卿為令如故又十二年考烈王卒李園殺春申君盡滅其族本傳云春申君死而荀卿廢因家蘭陵列著數萬言而卒因葬蘭陵荀卿之卒不知何年堯問篇云孫卿迫于亂世鰌于嚴刑上無賢主下遇暴秦鹽鐵論毁學篇方李斯之相秦也始皇任之人臣無二然而荀卿為之不食覩其罹不測之禍也據李斯傳斯之相在秦并天下之後距春申君之死十八年距齊湣王之死六十四年是時荀卿蓋百餘歲矣荀卿生于趙遊于齊嘗一入秦而仕于楚卒葬于楚故以四國為經託始于趙惠文王楚頃襄王之元終于春申君之死凡六十年庶論世之君子得其梗概云爾劉向敘録卿以齊宣王時來遊稷下後仕楚春申君死而卿廢史記六國年表載春申君之死上距宣王之末凡八十七年史記稱卿年五十始遊齊則春申君死之年卿年當一百三十七矣朝公武郡齋讀書志謂史記所云年五十為年十五之訛然顔之推家訓勉學篇荀卿五十始來遊學之推所見史記古本巳如此未可遽以為訛字也且漢之張蒼唐之曹憲皆百有餘歲何獨於卿而疑之荀子歸趙疑當孝成王九年十年時故臣道篇亟稱平原信陵之功是時信陵故在趙也以信陵君之好士得之於毛公薛公而失之于荀卿惜夫韓非子難四篇燕王噲賢子之而非荀卿故身死為僇荀子遊燕在遊齊之前事僅見此本書強國篇荀子説齊相國曰今巨楚縣吾前大燕鰌吾後徑魏鉤吾右西壤之不絶若繩楚人則乃有襄賁開陽以臨吾左是一國作謀三國必起而乘我如是則齊必斷而為四三國若假城耳其言正當湣王之世湣王再攻破燕魏留楚太子橫以割下東國故荀卿為是言其後五國伐齊燕入臨災楚魏共取淮北卒如荀卿言荀子之為齊與樂毅之為燕謀伐齊所見正同豈可謂儒者無益於人國乎此齊相為薛公田文故曰相國上則得專主下則得專國王伯篇云權謀日行而國不免危削綦之而亡齊湣薛公是也荀卿之為是言者疾田文之不能用士也大學平義大學其文平正無疵與坊記表記緇衣伯仲為七十子後學者所記于孔氏為支流餘裔師師相傳不言出自曾子視曾子問曾子立事諸篇非其倫也宋世禪學盛行士君子入之既深遂以被諸孔子是故求之經典惟大學之格物致知可與傅合而未能暢其旨也一以為誤一以為缺舉平日之所心得者著之于書以為本義固然然後欲俯則俯欲仰則仰而莫之違矣習非勝是一國皆狂即有特識之士發寤于心止于更定其文以與之爭則亦不思之過也誠知其為儒家之緒言記禮者之通論孔門設教初未嘗以為至德要道而使人必出于其途則無能置其口矣周秦古書凡一篇述數事則必先詳其目而後備言之其在逸周書管子韓非子至多本書祭統之十倫孔子間居之五至三無皆是也今定為經傳以為二人之辭而首末相應實出一口殆非所以解經也意者不託之孔子則其道不尊而中引曾子則又不便于事必如是而後安爾門人記孔子之言必稱子曰子言之孔子曰夫子之言曰以顯之今大學不著何人之言以為孔子義無所據孔子曰中人以上可以語上也中人以下不可以語上也眀乎教非一術必因乎其人也其見論語者問仁問政所答無一同者聞斯行諸判然相反此其所以為孔門也標大學以為綱而驅天下從之此宋以後門戶之爭孔氏不然也宋儒既藉大學以行其説慮其孤立無輔則牽引中庸以配之然曾子受業于孔門而子思則其孫也今以次于論語之前無乃傎乎蓋欲其説先入乎人心使之合同而化然後變易孔氏之義而莫之非所以善用其術而名分不能顧也大淸故國子監生贈句容縣儒學教諭孫君墓銘并序君諱枝生字一鳳先世定遠人明樂安郡公興祖弟子濠梁衛指揮使繼達賜宅常州遂籍武進武進孫氏凡二侯三指揮使傳十餘世與明終始登庶司者又百餘人而尚書愼行以淸節碩德著名四朝故世為望宗君曾祖艅封翰林院檢討祖自儀桂陽州同知封翰林院編修父謀禮部主客司郎中君生十餘嵗兄鳳飛官恩承州吏目君從之官所義寧縣知縣許建者宜興人無子有一女以君為贅壻生子勳君念門戶中衰二親棄養一身遠依外家非學無以自立由是下帷誦習靡有晨夜體素淸羸遂遘疾以卒是為雍正九年四月壬子春秋二十有六踰年義寧君亦沒君妻許孺人攜子奉二柩以歸各祔於其先壠為父立後而身歸武進以奉孫氏其教勳嚴而有法勳舉順天鄉試官句容教諭贈君以其官勳事母孝謹喜交友強直有氣尤達於政事三子皆材曰星衍星衡星衢星衍通小學最善為文亦舉於鄉君童年遠客以諸生早終故行迹不傳於世而苦節可貞克昌厥後卒以成君之志則君之內刑于妻下施於孫子者可知也君葬武進某原後五十四年星衍使其友汪中為之銘其詞曰樂安桓桓官有世功門祚中夷疇亢其宗猗彼文孫心長命促鼓篋方誦帷堂巳哭有噭其孤衰衣在抱越嶺浮湘翩翩丹旐令妻孔瘁二世其昌苦體有牉君為不亡封土延陵實堅實好立石旌事崇公之表修禊敘跋尾晉右軍將軍會稽內史琅琊王羲之修禊敘定武石刻五字不損本乾隆五十年八月江都汪中審定題字今體隸書以右軍為第一右軍書以修禊序為第一修禊敘以定武本為第一世所存定武本以此為第一在于四纍之上故天下古今無二修禊敘别本至多理宗所集遊氏所藏不可得見無以定其甲乙今之行世者潁上筆致翩翩矯若雲中之鶴故為别調亦具本色若東陽國學二本俱定武適嗣而各有其一體東陽淸徑過是則其失也峻開皇偽體是也國學秀朗過是則其失也媚吳興臨本是也孔子曰質勝文則野文勝質則史文質彬彬然後君子持是以論書吾於定武石刻見之敘中塗改諸字此刻若因寄所託因字向之二字良可二字悲夫夫字斯文文字皆先書他字而後改之筆迹宛然其翻刻定武本及别本所刻皆不爾故知定武是從右軍真迹上石也然中雖能鑑古使不見定武真刻亦何從知之此非人力所能為也定武石刻出自歐陽率更若以為率更所書者中嘗疑焉太宗之於此敘愛之如此其篤也得之如此其難也既欲壽諸貞石嘉彼士林乃舍右軍之真迹用率更之臨本譬之叔敖當國優孟受封中郎在朝虎賁接席殆不然矣後見何延之蘭亭始末記云帝得帖命馮承素韓通政等各拓數本賜太子諸王一時能書如歐虞褚諸公皆臨拓相尚劉餗嘉話録云蘭亭敘武德四年入秦府貞觀十年始拓以分賜近臣何子楚跋云唐太宗詔供奉臨蘭亭敘惟率更令歐陽詢自拓之本奪真勒石留之禁中然後知定武本乃率更響拓而非其手書于是前疑始釋古稱石刻之佳者曰下真迹一等此則以右軍之真迹太宗之元鑒率更之絶藝盛事參會千載一時雖山隂暢敘興到再書昭陵絸紙人間復出何以過之自宋以來士大夫萬金巧購性命可輕良有以也往見宋番陽薑氏禊帖偏旁考心焉笑之即如此本正猶靑天白日奴隸皆見何事取驗偏旁然後知為定武真本設有作偽者依薑氏之言而為之又何以待之然則牽合于薑氏者所謂貴耳賤目者也薑氏固季咸所見善者機也古碑鐫刻之工以昭陵為最此刻亦然轉折鋒稜絲豪俱備自貞觀至慶厯凡四百年如前三行及一死生一字之類固日就刓敝然其存者一點一畫精神煥發如新脫手與太學石鼓正同非徒碑師之良即其石亦美材也昔班孟堅論孝宣之治至于器械工巧元成以來鮮能及之吾于此刻亦以知貞觀文物之盛巳右軍書不名一體十七帖中吾服食久旦夕都邑二帖絶似率更書正率更書所自出也唐書文苑傳稱率更本學王羲之書可謂高識此必柳芳吳兢之舊文宋子京承用之爾世人不識右軍書見定武修禊敘結體似率更遂以為率更所書則誤矣褚河南書學故與率更抗行今潁上本之行世者尚是覆刻王澍給事有元拓一本給事細書跋尾凡十有六考證鑒定均極精審今歸巴慰祖舍人中曾見之誠絶世之寶也然比于定武本正如婢見夫人以此知定武非率更書也董尚書書法輕纎于定武風力未能學步乃謂潁上本在定武之上曹鄴詩云難將一人手掩盡天下目請為尚書誦之吾友趙文學魏江編修德量皆深于金石之學文學語編修云南北朝至初唐碑刻之存于世者往往有隸書遺意至開元以後始純乎今體右軍雖變隸書不應古法盡亡今行世諸刻若非唐人臨本則傳摹失真也編修以諗中中歎文學精鑒為不可及也然中往見吳門繆氏所藏淳化帖弟六弟七弟八三卷點畫波磔皆帶隸法與别刻迥殊此本亦然如固知固字向之二字古人云云字悲夫夫字斯文文字政與魏始平公造像記梁吳平侯神道石柱絶相似因歎前賢遺翰多為俗刻所汨沒而不見定武真本終不可與論右軍之書也中年十四五即喜蓄金石文字數十年來所積遂多屬有天幸每得善本惟修禊敘未嘗留意以為不得定武本則他刻不足稱也而祖刻畢世難遇無望之想固無益爾今年夏有人持書畫數種求市是刻在焉裝潢潦草無題跋印識而紙墨神采如新遂買得之念此紙之留于天壤間者將八百年中間凡更幾人曾無豪髮之損固云神物護持然使其有一二好古識真之士為之表章重以錦褾玉軸之飾則當價重連城為大力者所據余又安能有之物之顯晦遇合誠有數歟趙承旨得獨孤長老本為至大三年承旨年五十有七其本乃五字巳損者中生承旨後五百年聲名物力百不及承旨今年四十有二而所得乃五字未損者中于文章學問碑版三者之福所享巳多天道忌盈人貴知足故于科名仕宦泊然無營誠自知稟受有分爾江都縣學增廣生員先考靈表唐忠武將軍華之裔繁于歙當宋嘉祐中有承淸者居縣西之古唐至君凡二十五世君諱一元字兆初髙祖曰文耀餘姚縣知縣有惠政沒而配食於社曾祖曰應健壻於鄭重得其畫法祖曰鎬京工詩喜篆籀名人通士多所交接始遷江都父曰良澤善刻印人尤長者自君以上數世咸負異材擅文藝而不顯君母喬孺人懷君七月痁作而免無乳以酒哺之故既長而弱孺人彌愛憐焉十歲猶傅面置膝上家宿貧孺人躬井爨恆使世叔父佐其勞不以任君然君事二親尤順於其志親沒四時之食苟未祭不敢嘗隸學宫二十年矜名負氣舍鬻文教學不以食淵靜好書星厯卜筮聲樂皆究其微嘗使中握粟一溢君以箸畫几算之即得其數用時憲法所逆推凡十餘年與臺官皆密合君卒吾母視其藁訖於乾隆十四年四月君實以是月卒蓋以數知之也中生凡七歲寢息嬉遊未嘗不在君側會文弔喪咸置于抱一食不甘輒罔罔不自得鄉黨僚友莫不異之逮君即世然後知君于中父子之恩至深而為日至淺故汲汲用之惟恐其不盡即君亦莫能解于心也君遺書三簏朱墨遍其上所手書又一篋年飢家室流散並亡佚遂無以知君所學君立身行道無愧幽眀天既嗇之以位與年並其言論文采不傳于後世蓋依古以來士之懷道而不遇者以君為窮焉君之卒年四十有二葬縣北大儀鄉葉家橋祔祖父母之右子二中選拔貢生二庚殤女二適黃孰畢合孫喜孫後三十有八年吾母將葬於是托君之遺事流涕而書之石曰粵有君子晢而上僂雅步嶷然君子之守寡笑與言希接世務學殖行修名遇不副棲遲下里冥沒中壽百世之藏尚其無朽先母鄒孺人靈表母諱維貞先世無錫人明末遷江都凡七支其六皆絶故亡其譜系父處士君鼐母張孺人處士授學於家母暇日於屏後聽之由是孰中諸書皆成誦張孺人蚤沒處士衰耗母盡心奉養撫二弟有恩家事以治及歸於汪汪故貧先君子始為贅壻世父將鬻其宅先主無所置母曰焉有為人婦不事舅姑者請於處士君割别室奉焉已而世叔父數人皆來同爨先君子羸病不治生母生子女各二室無童婢飲食衣屨咸取具一身月中不寢者恆過半先君子下世世叔父益貧久之散去母教女弟子數人且緝屨以為食猶思與子女相保直歲大飢乃蕩然無所託命矣再徙北城所居止三席地其左無壁覆之以苫日常使姊守舍攜中及妹傫然丐於親故率日不得一食歸則藉藁於地每冬夜號寒母子相擁不自意全濟比見晨光則欣然有生望焉逮中入學宮遊藝四方稍致甘旨之養母百病交攻綿歷歲年竟致不起嗚呼痛哉母忠質慈祥生平無妄言接下以恩多所顧念方中幼時三族無見恤者母九死流離撫其遺孤至於成立母稟氣素強不近醫藥計母生七十有六年少苦操勞中苦飢乏老苦疾疢重以天屬之乖人事之湮鬱蓋終其身鮮一日之歡焉論其摧剝金石可銷況于血氣故吾母雖以中壽告終不得謂其天年之止于是也嗚呼生我之恩送死之戚人所同也家獲再造而積苦以隕身行路傷之況在人子嗚呼痛哉以乾隆五十二年七月辛丑朔卒眀年三月戊寅合葬於先君子之墓其哀子中泣血為之表曰嗚呼汪氏節母此焉其墓更百苦以保其後後之人尚保其封樹畢尚書母張太夫人神祠之銘并序惟乾隆四十五年天子省方南土鎮洋畢尚書時居母張太夫人憂在里門蒙召見於行在具陳單門早孤母故名家女有文學諸經多其口授且養且教至於成人凡今之得以受恩陳力者皆母氏之賜上動容稱善嘉太夫人之懿節能勤鬻其子為國之楨用是手書旌之以成尚書稱善揚名之志其文凡四曰經訓克家史臣具書於策求忠錫類以為美談而國人皆稱願焉曰幸哉有子如此可謂孝巳初尚書以太夫人命居吳縣西之靈巖閉門誦習嵗且十稔及兹拜命乃推本成學策名之所由爰闢舊館築樓以奉御書其西為祠共太夫人祀事既成命中銘其麗牲之石中惟古者爵有德而祿有功其策命之詞必稱其祖父以明世選爾勞之美所命北面再拜稽首受書以歸而舍奠于其廟作彝器以論撰其先祖之德善功烈勳勞慶賞聲名列于天下及其車服戈帶之賜并著於銘祀其先祖以對揚天子丕揚休命而俾子孫萬年永寶用享尚書本自休寧既循其宗法以祀先世祖考又緣魯頌閟宮别祀薑嫄春秋仲子考宮之義為是祠以榮君之命而昭太夫人之德祭之以禮是謂之孝於法宜銘太夫人世居吳縣邱江縣知縣誥贈中憲大夫分巡雲南迤西道諱某之女誥贈榮祿大夫兵部侍郎兼都察院右都御史巡撫河南兼提督軍門諱鏞之室尚書始巡撫陜西之三年太夫人卒于官所春秋七十有八子三長即尚書次員外瀧次知縣某凡官閥言行皆載於墓碑故不備書銘曰緬彼江河其出有源族姓將興必開其先畢氏之東時維弱宗有藐諸孤時撫於翁猗嗟女師蚤明詩禮言恤其家言訓其子若古有教瞽宗上庠嗟我師氏橫經北堂維春維夏是誦是弦有子而材居用勿遷地道無成內言不出是以克家其占大吉仲氏高蹈金玉爾音季興賢能中隕鳴琴顯允尚書揚于王庭庇我羣生四國是正天子曰咨女維淑愼豫有股肱實女之訓訓行於子功被於世國資其寶民食其利奕奕靈山有松有柏寢成孔安維神其宅太湖淪瀾大波如舞感彼寒泉興言勞苦嘉薦維時籩豆靜修來食來遊永我春秋君則有恩母則有教施于孫子維以興孝秩秩魚軒有來周道循彼南陔載言任地辨土三篇皆農桑樹藝之事則農家者流也其有抵牾者振亂禁塞大樂三篇以墨子非攻救守及非樂為過而當染篇全取墨子應言篇司馬喜事則深重墨氏之學甚者吳起之去西河長見觀表二篇一事兩見惟有始覽所謂解見某書者于本書能觀其會通爾司馬遷謂不韋使其客人人著所聞以為備天地萬物古今之事然則是書之成不出于一人之手故不名一家之學而為後世修文御覽華林遍略之所託始藝文志列之雜家良有以也然其所采托今見于周漢諸書者十不及三四其餘則本書巳亡而先哲之話言前古之佚事賴此以傳于後世其善者可以勸其不善者可以懲焉亦有閭里小智一意采竒詞奧旨可喜可觀庶幾乎立言不朽者矣其文字異同巳注于篇中茲不復及故序其著書之意以質之諸君子幸正教之江陵萬城堤鐵牛銘并序代乾隆五十三年六月江陵水溢皇帝命大學士誠謀英勇公阿桂湖廣總督畢沅大築萬城堤以為之防且鑄鐵牛九以鎮之既成銘曰巨防槃槃既築既楗有牛馮焉嶷然大件西峽委波雲奔山動帝制五材以神其用相爾欣騢實秉金精奉天明威以肅百靈罔象陽侯盱睢卻顧雷淵九回安流東注夏后道江雲夢既陂鑄鼎知姦百物是宜穆穆我皇明德同美纘禹成功南國之紀亳州渦水堤銘并序代亳州知州今任鳳陽府知府儀徵江恂作乾隆四十三年河決儀封考城由渦以注於淮亳州首受其水田廬城郭蕩焉踰年水宿不去於時儀徵江恂待罪是土乃集其僚佐士庶謀曰州之域西至於鹿邑東至於蒙城渦貫其中若帶然自城以外為保八十有一而在渦南者五十有二是其地於三垂為大且州治在焉渦之北方殫為河恃渦以泄之是不可防也今立堤於渦隂水循堤而東西南之田可得而食水涸而土沃其收自倍水北之人得資以養十萬之衆安坐而仰食將不可繼任之以事無攘奪之憂無離散之苦水不壞城北關之外商旅百貨之所湊河復故道留堤以為郛設險重閉市里不恐是有五利焉則皆曰善二月之吉天地和調日中而永上墳而剛時以興事可以經遠版幹畚築艾獵慮其事大下小上敬仲作其功地阞理孫匠人因其勢遊波寬緩待詔陳其策監于成憲則罔有愆役不踰時是曰如志其廣四丈外閷半之以其閷為之崇東自支家林至季家灣西自草寺至河礓溜隨水委宛長千五百八十丈越月水復大至浸及堤之半邑以安堵南境大穫舉州食之不能盡於是亳人曠然知堤之利也年穀順成衆飽而嬉坊與水庸是祝是饗營室昏正乃圖後功自河礓溜為堤西抵楊家橋接於鹿邑長五千三百九十丈盡亳之竟與渦為緣廣與崇皆視前堤富衛其居貧利其食是故任力而不勞施財而不費後雖有水患亳勿與知焉惟天子惠保庶民恤然若將不及自河始災出入二載所振貸以大萬計封疆之吏奉宣德意無敢不共而恂展布其四體大懼隕越以速官刑當水之始至輒假便宜發粟與帑以急民命大府矜容日有賞譽東堤既成據以入告勤民能事之褒章於王言明年省方南國蒙恩召見曾不浹月連擢右職遂忝方面無望之福愧於非據既將去是州遂為文紀其功日財用遠邇基址以告亳之民與後之守是土者而係之以銘其辭曰河水洋洋溢於南土哀我殫人逃死何所集于中澤離彼曠野閔兹鴻鴈厥匪兕虎爰為大防以固吾圉百堵既興式歌且舞父誡兄勉應我鼛鼓抱若弓輪磬折參伍明神相之於渦之浦是涸是淤長我禾黍官不失職厥為民母歲埤增之柏楊是樹民得其饒以生以聚用刻此詞俾紹厥後釋印黃山民治地獲銅印二外員內方圍某寸徑某寸文曰管軍萬戶府印其背曰中書禮部監造二印同一治平三年月一太平三年月江都汪中釋之曰漢之軍以言乎一營也唐之軍以言乎一道也宋之軍以言乎一州也元明之軍以言乎一人也管軍者元諸路號也萬戶府元官有上萬戶府管軍七千之上達魯花赤一員萬戶一員俱正三品副萬戶一員從三品中萬戶府管軍五千之上達魯花赤一員萬戶一員俱從三品副萬戶一員正四品下萬戶府營軍三千之上達魯花赤一員萬戶一員俱從三品副萬戶一員從四品其官皆世襲有功則升之明之諸衛實仿其法其蒙古諸路及屯田炮手萬戶府名號至多則隸樞密院御史臺領中書禮部者元制也禮部尚書省屬官元世尚書省凡三置三罷而中書省終元世如故故禮部屬于中書也曰治平三年者羅田人徐夀輝據蘄水為都國號天完僭稱皇帝改元治平其三年當至正之十三年歲在丙戌也元諸帝及僭為諸國無以太平紀年者印既同製同文則壽輝固嘗以是改年與壽輝所置官若鄒勝為太師陳友諒為平章事皆沿元制其置萬戶無足異耳壽輝以至正十一年十月僭號十三年十二月為江浙行省平章事伯顔帖木兒等所敗棄蘄水遁走十五年正月其將倪文俊敗寬徹普化軍復據漢川明年正月倪文俊建偽都于漢陽迎夀輝據之其改元必在是時史無文以知之矣壽輝自起兵至死凡十年至正十九年陳友諒以江州為都迎壽輝居之越五月而為友諒所弒若改元于江州不得有三年矣其形製之異蓋亦别于官印與自序昔劉孝標自序平生以為比迹敬通三同四異後世誦其言而悲之嘗綜平原之遺軌喻我生之靡樂異同之故猶可言焉夫亮節慷慨率性而行博極羣書文藻秀出斯惟天至非由人力雖情符曩哲未足多矜余元髮未艾野性難馴麋鹿同遊不嫌擯斥商瞿生子一經可遺凡此四科無勞舉例孝標嬰年失怙藐是流離託足桑門栖尋劉寶余幼罹窮罰多能鄙事賃舂牧豕一飽無時此一同也孝標悍妻在室家道轗軻余受詐興公勃溪纍歲里煩言于乞火家搆釁于蒸梨蹀躞東西終成溝水此二同也孝標自少至長戚戚無歡余久厯艱屯生人道盡春朝秋夕登山臨水極目傷心非悲則恨此三同也孝標夙嬰羸疾慮損天年余藥裹關心負薪永曠鰥魚嗟其不瞑桐枝惟餘半生鬼伯在門四序非我此四同也考標生自將家期功以上參朝列者十有餘人兄典方州餘光在壁余衰宗零替顧景無儔白屋藜羮饋而不祭此一異也孝標倦遊梁楚兩事英王作賦章華之宮置酒睢陽之苑白璧黃金尊為上客雖車耳未生而長裾屢曳余簪筆傭書倡優同畜百里之長再命之士苞苴禮絶問訊不通此二異也孝標高蹈東陽端居遺世鴻冥蟬蛻物外天全余卑棲塵俗降志辱身乞食餓鴟之餘寄命東陵之上生重義輕望實交隕此三異也孝標身淪道顯籍甚當時高齋學士之選安成類苑之編國門可縣都人爭寫余著書五車數窮覆瓿長卿恨不同時子雲見知後世昔聞其語今無其事此四異也孝標履道貞吉不干世議余天讒司命赤口燒城笑齒啼顔盡成罪狀跬步才蹈荆棘巳生此五異也嗟乎敬通窮矣孝標比之則加酷焉余于孝標抑又不逮是知九淵之下尚有天衢秋荼之甘或云如薺我辰安在實命不同勞者自歌非求傾聽目瞑意倦聊復書之哀鹽船文附序哀鹽船文者江都汪中之所作也中早學六義又好深湛之思故指事類情申其雅志采遺製于大招激哀音于變徵可謂驚心動魄一字千金者矣或疑中方學古之道其言必期於有用若此文將何用邪答曰中目擊異災迫于其所不忍而飾之以文藻當人心肅然震動之時為之發其哀矜痛苦而不忘天之降罰且閔死者之無辜而吁嗟噫歆散其冤抑之氣使人無逢其災害是小雅之旨也君子故有取焉若夫汚為故楮識李華之精思傳之都下寫左思之賦本文章遇合之事又末而無足數也仁和杭世駿序乾隆三十五年十二月乙卯儀徴鹽船火壞船百有三十焚及溺死者千有四百是時鹽綱皆直達東自泰州西極于漢陽轉運半天下焉惟儀徵綰其口列檣蔽空束江而立望之隱若城郭一夕併命鬱為枯臘烈烈厄運可不悲邪于時元冥告成萬物休息窮隂涸凝寒威凜栗黑眚拔來陽光西匿羣飽方嬉歌咢宴食死氣交纏視面惟墨夜漏始下驚飇勃發萬竅怒呺地脈蕩決大聲發于空廓而水波山立于斯時也有火作焉摩木自生星星如血炎光一灼百舫盡赤靑煙睒睒熛苦沃雪蒸雲氣以為霞炙隂崖而焦爇始連楫以下碇乃焚如以俱沒跳躑火中明見毛髮痛謈田田狂呼氣竭轉側張皇生塗未絶倏陽焰之騰高鼓腥風而一吷洎埃霧之重開遂聲銷而形滅齊千命于一瞬指人世以長訣發冤氣之焄蒿合遊氛而障日行當午而迷方揚沙礫之嫖疾衣繒敗絮墨查炭屑浮江而下至于海不絶亦有沒者善遊操舟若神死喪之威從井有仁旋入雷淵并為波臣又或擇音無門投身急瀨知蹈水之必濡猶入險而思濟挾驚浪以雷奔勢若隮而終墜逃灼爛之須臾乃同歸乎死地積哀怨于靈臺乘精爽而為厲出寒流以浹辰目睊睊而猶視知天屬之來撫憖流血以盈眥訴強死之悲心口不言而以意若其焚剝支離漫漶莫别圜者如圈破者如玦積埃填竅攦指失節嗟貍首之殘形聚誰何而同穴收然灰之一抔辨焚餘之白骨嗚呼哀哉且夫衆生乘化是云天常妻孥環之絶氣寢牀以死衛上用登明堂離而不懲祀為國殤兹也無名又非其命天乎何辜罹此冤橫遊魂不歸居人心絶麥飯壺漿臨江嗚咽日墮天昏悽悽鬼語守哭迍邅心期冥遇惟血嗣之相依尚騰哀而屬路或舉族之沈波終狐祥而無主悲夫叢冢有坎泰厲有祀強飲強食馮其氣類尚羣遊之樂而無為妖祟人逢其凶也邪夭降其酷也邪夫何為而至于此極哉大淸故國子監生洪君妻蔣氏墓志銘并序乾隆四十二年十月友人洪禮吉喪其母既月將葬以書來請志其墓志曰母蔣氏世為武進人雲南嶍峨縣知縣諱斆淳之女國子監生洪君諱翹之室人也始洪氏以行義毁其家母歸十餘歲而監生卒家益窘母忍死撫其子女恆遇年飢或自屑粳核食之而以食食其子子泣不食則母亦泣母知書明大義教禮吉嚴而有法凡為子作衣必如其大父及父時制度禮吉客外久衣或更其式見之輒怒曰一衣尚隨俗遷轉他事何能自立禮吉所與友必請于母里人某者數過其家母曰是非端士緩急且有變及母卒某竟不赴弔娣婦余早寡母以子迪吉為之後返諸家而與之寢處督禮吉葬其三世七棺初監生與通州盛聰善監生在殯比戶失火聰冒火翼其棺聰沒一子年四十不能娶母斥禮吉裝舉其事聞者義之先是母嘗曰吾三女皆有壻二子婦事我謹我即死願此十人者皆得侍我乃不恨及卒九人者皆在側惟禮吉逐食於處州故其奔喪也有過禮焉悲夫母之卒年六十有三其葬在某山某原銘曰懿維碩人蚤罹百辜往悼我儀居傷藐孤嫠室惸惸百憂孔煎堅冰苦蘖銷我盛年孝子媞媞有婦有孺白日幽泉迫我前路當家之毁在生猶死及子之才宜樂反哀殄我一身延我一宗於家為吉於身為凶日月有時依其同室凡百女師視此貞石瞽瞍説舜之父見於堯典者曰瞽而巳左氏傳孟子吕氏春秋韓非子則皆曰瞽瞍此非其名乃官也春官瞽矇有上瞽中瞽下瞽周頌謂之矇瞍周語曰瞽告有協風至左氏傳師曠曰吾驟歌北風又歌南風鄭語曰虞幕能聽協風以成樂物生者也左氏傳曰自幕至于瞽瞍無違命然則瞽之掌樂固世官而宿其業若虞夏之后夔矣不必其父子祖孫皆有廢疾也吕氏春秋古樂篇曰帝堯立乃命質為樂質乃效山林溪谷之音以歌注質當為夔乃以麋􅛘置缶而鼓之乃拊石擊石以象上帝玉磬之音以致舞百獸瞽瞍乃拌五弦之瑟作為十五弦之瑟命之曰大章以祭上帝舜立仰延乃拌瞽瞍之所為瑟益之八弦以為二十三弦之瑟是其據也唐虞之際官而不名者三四嶽也共工也瞽也司馬子長易其文曰盲者子失之矣嬪于虞解嬪婦也虞國名其君瞽瞍也舜為出子居于媯汭堯以二女女之所謂不告而取也既嫁而就虞以見于舅姑然後婦道成焉故曰嬪詩曰來嫁于周曰嬪于京先言嫁後言嬪義與此同諸侯以國為氏公子體君亦得稱之史伯曰虞幕若晉重魯申矣四嶽曰虞舜若鄭子華吳季札矣然則瞽瞍之君虞明矣王基碑跋尾魏東武景侯王基碑殘文乾隆初紀出于洛陽土中凡十九行前三行行二十二字第九行九格止十二字第十四行十字餘皆二十一字碑字裁刻下方其上方尚未開鑿出土之日朱書粲然郃陽秦習謙所親見而工人止知椎拓無有録其全文者遂致滅沒深可惜也碑所書厯官事迹悉與傳合惟卒年七十二為史所略按基之卒在景元二年上距建安五年康成之卒凡六十二年其時基財十嵗其于鄭君非親炙也後漢書特以基據持鄭義常與王肅抗衡遂列基于門人不若魏志但言入琅琊界遊學為得實碑述王氏出自王子成父錢少詹事以為必有所本按碑云孫湫違難為萊大夫仲孫湫見于閔元年傳是時萊猶未滅無緣以齊臣為之大夫馮商言張湯與留侯同祖漢世敘述世系巳多傅會殆未可信也老子考異史記孔子世家云南宮敬叔與孔子俱適周問禮蓋見老子云老莊申韓列傳云孔子適周將問禮于老子按老子言行今見于曾子問者凡四是孔子之所從學者可信也夫助葬而遇日食然且以見星為嫌止柩以聽變其謹于禮也如是至其書則曰禮者忠信之薄而亂之首也下殤之葬稱引周召史佚其尊信前哲也如是而其書則曰聖人不死大盜不止彼此乖違甚矣故鄭注謂古壽考者之稱黃東發日鈔亦疑之而皆無以輔其説其疑一也本傳云老子楚苦縣厲鄉曲仁里人也又云周守藏室之史也按周室既東辛有入晉左傳昭二十年司馬適秦太史公自序史角在魯吕氏春秋當染篇王官之族或流播于四方列國之産惟晉悼嘗仕于周其他固無聞焉況楚之于周聲教中阻又非魯鄭之比且古之典籍舊聞惟在瞽史其人並世官宿業羈旅無所置其身其疑二也本傳又云老子隱君子也身為王官不可謂隱其疑三也今按列子黃帝説符二篇凡三載列子與關尹子答問之語莊子達生篇與列子黃帝篇文同呂氏春秋審已篇與列子説符篇文同而列子與鄭子陽同時見于本書六國表鄭殺其相駟子陽在韓列侯二年上距孔子之沒凡八十二年關尹子之年世既可考而知則為關尹著書之老子其年世亦從可知矣文子精誠篇引老子曰秦楚燕魏之歌異傳而皆樂按燕終春秋之世不通盟會精誠篇稱燕自文侯之後始與冠帶之國燕世家有兩文公武公子文公索隱引世本作閔公其事迹不見于左氏春秋不得謂始與冠帶之國桓公子亦稱文公司馬遷稱其豫車馬金帛以至趙約六國為從與文子所稱時勢正合文公元年上距孔子之殁凡百二十六年老子以燕與秦楚魏并稱則老子已及見文公之始強矣又魏之建國上距孔子之殁凡七十五年而老子以之與三國齒痤然則是關之置實在獻公之世矣由是言之孔子所問禮者聃也其人為周守藏之史言與行則曾子問所載者是也周太史儋見秦獻公本紀在獻公十一年去魏文侯之殁十三年而老子之子宗為魏將封于段干魏世家安釐王四年魏將段干子請豫秦南陽以和國䇿華軍之戰魏不勝秦明年將使段干崇割地而講六國表秦昭王三十四年白起擊魏華陽軍按是時上距孔子之卒凡二百一十年則為儋之子無疑而言道德之意五千餘言者儋也其入秦見獻公即去周至關之事本傳云或曰儋即老子其言韙矣至孔子稱老萊子今見于太傅禮衛將軍文子篇史記仲尼弟子列傳亦載其説而所云貧而樂者與隱君子之文正合老萊子之為楚人又見漢書藝文志蓋即苦縣厲鄉曲仁里也而老聃之為楚人則又因老萊子而誤故本傳老子語孔子去子之驕色與多欲態心與淫志而莊子外物篇則曰老萊子謂孔子去汝躬矜與汝容知國策載老萊子教孔子語孔叢子抗志篇以為老萊子語子思而説苑敬愼篇則以為常樅教老子吕氏春秋愼大篇表商容之閭高誘注商容殷之賢人老子師也商常容樅音近而誤淮南主術訓表商容之閭注同繆稱訓老子學商容見舌而知守柔矣呂氏春秋離謂篇箕子商容以此窮注商容紂時賢人老子所從學也然則老萊子之稱老子也舊矣實則三人不相蒙也若莊子載老聃之言率原于道德之意而天道篇載孔子西藏書于周室尤誤後人寓言十九固巳自揭之矣宋世系表序沈約宋書表不傳今采宋氏宗室之見紀傳者輯為此篇且序之曰宋武帝受終晉室自永初改元至于升平之末凡五世六十年本支百二十九人其被殺者百二十有一而骨肉自相屠害者八十當齊初紀彭城之族蓋有存者而帝之血屬并長沙臨川二系斬焉夫一興一廢國家代有凡在公族休戚同之是以商孫不億侯服于周漢世王公爭言符命當易姓之際忍耻事讎并為臣僕以全生保姓者有矣未有君臨天下傳序九君一朝革命覆宗絶祀殄無遺育如宋氏之甚者也方其完如景平治如元嘉威如大明國祚未傾羣生咸遂而父子兄弟日翦月屠如恐不及甚至舉宗就戮禍及嬰兒使幼者不得長壯者不得育遂致宗姓寡弱王室陵遲姦雄睥睨其旁拱手以成斷流之禍豈不哀哉或者謂武帝起自布衣經營天下十有餘年竟成王業于時晉室宗親誅鋤略盡而同力舉義之人罕有存者創業垂統取濟一時非有積德纍仁之舊婁敬干寶之陳言稍巳迂闊而遠于事情矣昔漢魏末世雖見逼奪而厯年傳嗣終保元吉下至昌邑海西猶得盡其天年未至公然操刃也自平固解璽人望未絶武帝因之以傾桓氏殷鑒在夏零陵遂以不免自是以降禪代之君異世同轍而君親殺戮之禍相沿而莫之革實自帝始象人以殉猶或無後況乎身為戎首禍流異代而欲子孫令聞長世豈可得哉當帝踐阼之初威德在人中外帖服所長慮卻顧莫克遑息者惟故主耳及其掩被告殂子孫磐石之計雖至今存可也曾不再稔而前事之師繼體之元子先嘗其害豈所謂天道好還為法自敝者乎後嗣之陵夷又其所矣嗚呼無一民尺土之藉戰必勝攻必取總攬英才振厲風俗遺令詔繼嗣之意信乎人傑矣謂禍患之來不可逆知務增修于德而毋或多殺不辜以為之備斯三古哲王所以祈天永命也泰伯廟銘并序吳之有君自泰伯始民之初生負其血氣咸有爭心有聖人作制為君臣長幼之節教之以禮讓然後民志以定羣居而不亂則黃帝堯舜其人也當此之時大江之南五湖之間水草所鍾蛇龍居之聲教所不暨及泰伯舍其冢嗣而自竄於荆蠻實治周禮其民化之戴以為君而吳由是成國於後周公相成王制禮作樂為周道之極盛而句吳之興乃在其三世百年之前山川之氣與王化會而此焉開其先於中國有黃帝堯舜焉於吳有泰伯焉開物成務其功一也洎夫周室既東王者迹熄而季札審樂言遊習禮論交於上國受學於孔氏文武之道具在於兹大哉泰伯讓以造周禮以化吳王業既成民俗遂變迹行論功惟至德不足盡其美法施於民列在祀典漢吳郡太守麋豹實始建祠虞潭以下有舉莫廢自陽人成聚甬東不達王季仲雍迄用不祀而泰伯血食兹土百世不遷禮所謂諸侯祭因國之在其地而無主後者斯其義與歲在強圉道出祠下仰瞻榱桷有懷德音而雅頌不歌其事金石刻畫掌故蔑聞用作是詞以代周樂銘曰惟江外方作裔於揚自伯徂東吳業以光綿綿吳土惟伯之宇簡其卉服資以章甫有筍有蒲有魴有鱮胡耉既康爰實賓俎青質之羽爰教野舞伐管會稽和以土鼓三江環之靈氣所喣萬物嘉生莫克自舉天啓之心譬彼時雨顯允周道海濱是肇二南未興當殷末造文公多藝實章詩樂上溯薑嫄暨於烈考嗟嗟伯氏自他有耀西虞其宅不登淸廟間於弦歌太師靡教惟此吳人永世丕冒為而不有孰得而稱刻此樂石文獻其徵
