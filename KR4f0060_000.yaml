body:
  text: 述學者亾友汪容甫中之所作也余與容甫交垂四十年以古學相厎厲余爲訓詁文字聲音之學而容甫討論經史榷然䟽發挈其綱維余拙於文詞而容甫澹雅之才跨越近代每自媿所學不若容甫之大也宦游京師索居多感婁欲南歸與故人講習志未及遂而容甫以病殁矣常憶容甫才卓識高片言隻字皆當爲世寶之欲求其遺書而未果歲在甲戌其子喜孫應禮部試以其父所譔述學巳刻未刻者凡厶十厶篇索敘於余余曰此我之志也白元明以來說經者多病鑿空而矯其失者又蹈株守之陋爲文者慮襲歐曾王蘇之迹而志乎古者又貌爲奇傀而俞失其眞今讀述學内外篇可謂卓爾不羣矣其有功經義者則有若釋三九婦人無主荅問女子許嫁而壻死從死及守志議居喪釋服解義春秋述義使後之治經者振煩袪惑而得其會通其表章經傳及先儒者則有若周官徵文左氏春秋釋疑荀卿子通論賈誼新書敘使學者篤信古人而息其畔喭之習其它攷證之文皆確有依據可以傳之將來至其爲文則合漢魏晉宋作者而鑄成一家之言淵雅醇茂無意摩放而神與之合蓋宋以後無此作手矣當世所最稱頌者哀鹽船文廣陵對黃鶴樓銘而它篇亦皆稱此蓋其貫穿於經史諸子之書而流衍於豪素揆厥所元抑亦醖釀者厚矣若其爲人孝於親篤於朋友疾惡如風而樂道人善蓋出於天性使然視世之習孰時務而依阿淟涊者何如也直諒多聞古之益友其容甫之謂與余因容甫之子之求而輒述容甫之學與其文之絶世人之天性過人者綴於卷末以俟後之爲儒林傳者有所稽而采焉嘉慶二十年歲在乙亥正月之七日高郵王念孫敘時年七十有二
