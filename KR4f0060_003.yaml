  text: 述學內篇三
  hash: sha256:761bd3aca03e09eaef3cdd6a4e16dcfe3b53d9b7cabda8f4667f564ea89c912c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4f0060_SBCK_003-1a}
body:
  text: 江都汪中撰墨子序墨子七十一篇亡十八篇今見五十三篇明陸穩所敘刻視它本為完其書多誤字文義昧晦不可讀今以意粗為是正闕所不知又采古書之涉於墨子者别為表微一卷而為之敘曰周太史尹佚實為文王所訪晉語克商營洛祝策遷鼎有勞於王室周書克殷解書洛誥成王聽朝與周召太公同為四輔賈誼新書􅍖傅篇數有論諫淮南子主術訓史記世家身沒而言立東遷以後魯季文子春秋傳成四年惠伯文十五年晉荀偃襄十四年叔向周語秦子桑僖十五年后子昭元年及左邱明宣十二年並見引重遺書十二篇劉向校書列諸墨六家之首説苑政理篇亦載其文莊周述墨者之學而原其始曰不侈於後世不靡於萬物不暉於數度以繩墨自矯而僃世之急古之道術有在於是者天下篇可謂知言矣古之史官實秉禮經以成國典其學皆有所受魯惠公請郊廟之禮於天子桓王使史角往惠公止之其後在於魯墨子學焉吕氏春秋當染篇其淵原所漸固可考而知也劉向以為出於清廟之守夫有事於廟者非巫則史史佚史角皆其人也史佚之書至漢具存而夏之禮在周巳不足徵則莊周禽滑釐傅之禹者莊子天下篇列子楊朱篇非也司馬遷云墨翟宋大夫或曰並孔子時或曰在其後今按耕柱魯問二篇墨子於魯陽文子多所陳説楚語惠王以梁與魯陽文子韋昭注文子平王之孫司馬子期之子其言實出世本故貴義篇墨子南遊於楚見獻惠王獻惠王以老辭獻惠王之為惠王猶頃襄王之為襄王由是言之墨子實與楚惠王同時其仕宋當景公昭公之世其年於孔子差後或猶及見孔子矣藝文志以為在孔子後者是也非攻中篇言知伯以好戰亡事在春秋後二十七年又言蔡亡則為楚惠王四十二年墨子並當時及見其事非攻下篇言今天下好戰之國齊晉楚越又言唐叔吕尚邦齊晉今與楚越四分天下節葬下篇言諸矦力征南有楚越之王北有齊晉之君明在句踐稱伯之後魯問篇越王裂故吳地方五百里以封墨子亦一證秦獻公未得志之前全晉之時三家未分齊未為陳氏也檀弓下季康子之母死公輸般請以機封此事不得其年季康子之卒在哀公二十七年楚惠王以哀公七年即位般固逮事惠王公輸篇楚人與越人舟戰於江公輸子自魯南遊楚作鉤強以僃越亦吳亡後楚與越為鄰國事惠王在位五十七年本書既載其以老辭墨子則墨子亦壽考人與親士修身二篇其言淳實與曾子立事相表裏似七十子後學者所述經上至小取六篇當時謂之墨經莊周稱相里勤之弟子五矦之徒南方之墨者苦獲己齒鄧陵子之屬以堅白異同之辨相訾以觭偶不仵之辭相應者也公孫龍為平原君客當趙惠文孝成二王之世惠施相魏當惠襄二王之世二子實始為是學是時墨子之沒久矣其徒誦之並非墨子本書所染篇亦見吕氏春秋其言宋康染於唐鞅田不禮宋康之滅在楚惠王卒後一百五十七年墨子蓋嘗見染絲者而歎之為墨之學者增成其説耳故本篇稱禽子吕氏春秋並稱墨子親士篇錯入道家言二條與歬後不類今出而附之篇末又言吳起之裂起之裂以楚悼王二十一年亦非墨子之所知也今定其書為內外二篇而以其徒之所附著為雜篇倣劉向校晏子春秋例輒於篇末述所以進退之意覽者詳之墨子之學其自言者曰國家昏亂則語之尚賢尚同國家貧則語之節用節葬國家喜音沈湎則語之非樂非命國家淫僻無禮則語之尊天事鬼國家務奪侵陵則語之兼愛非攻此其救世亦多術矣僃城門以下臨敵應變纖悉周密斯其所以為才士與傳曰世之學老子者則絀儒學儒學亦絀老子惟儒墨則亦然儒之絀墨子者孟氏荀氏藝文志董無心一卷非墨子今亡孔叢詰墨偽書不數之荀之禮論樂論為王者治定功成盛德之事而墨之節葬非樂所以救衰世之敝其意相反而相成也若夫兼愛特墨之一端然其所謂兼者欲國家愼其封守而無虐其鄰之人民畜産也雖昔先王制為聘問弔恤之禮以睦諸矦之邦交者豈有異哉彼且以兼愛教天下之為人子者使以孝其親而謂之無父斯巳過矣後之君子日習孟子之説而未覩墨子之本書衆口交攻抑又甚焉世莫不以其誣孔子為墨子罪雖然自儒者言之孔子之尊固生民以來所未有矣自墨者言之則孔子魯之大夫也而墨子宋之大夫也其位相埒其年又相近其操術不同而立言務以求勝此在諸子百家莫不如是是故墨子之誣孔子猶老子之絀儒學也歸於不相為謀而巳矣吾讀其書惟以二年之喪為敗男女之交有悖於道至其述堯舜陳仁義禁攻暴止淫用感王者之不作而哀生人之長勤百世之下如見其心焉詩所謂凡民有喪匍匐救之之仁人也其在九流之中惟儒足與之相抗自餘諸子皆非其比歷觀周漢之書凡百餘條並孔墨儒墨􅍟舉楊朱之書惟貴放逸當時亦莫之宗躋之於墨誠非其倫自墨子沒其學離而為三徒屬充滿天下吕不韋再稱巨子去私篇尚德篇韓非謂之顯學至楚漢之際而微淮南子泛論訓孝武之世猶有傳者見於司馬談所述於後遂無聞焉惜夫以彼勤生薄死而務急國家之事後之從政者固宜假正議以惡之哉乾隆上章困敦塗月選拔貢生江都汪中述墨子後序中既治墨子牽於人事且作且止越六年友人陽湖孫季仇星衍以刊本示余則巡撫畢侍郎盧學士咸有事焉出入羣籍以是正文字博而能精中不勞日力於是書盡通其癥結且舊文孤學得二三好古君子與我同志於是有三喜焉既受而卒業意有未盡乃為後序以復於季仇曰季仇謂墨子之學出於禹其論偉矣非獨禽滑釐有是言也莊周之書則亦道之曰不以自苦為極者非禹之道是皆謂墨之道與禹同耳非謂其出於禹也昔在成周禮器大僃凡古之道術皆設官以掌之官失其業九流以興於是各執其一術以為學諱其所從出而託於上古神聖以為名高不曰神農則曰黃帝墨子質實未嘗援人以自重其則古昔稱先王言堯舜禹湯文武者六言禹湯文武者四言文王者三而未嘗專及禹墨子固非儒而不非周也又不言其學之出於禹也公孟謂君子必古言服然後仁墨子既非之而曰子法周而未法夏則子之古非古也此因其所好而激之且屬之言服甚明而易曉然則謂墨子背周而從夏者非也惟夫墨離為三取舍相反倍譎不同自謂别墨然後託於禹以尊其術而淮南著之書爾雖然謂墨子之學出於禹未害也謂禹制三月之喪則尸子之誤也從而信之非也何以明其然也古者喪期無數黃帝堯舜垂衣裳而天下治則五服精粗之制立矣放勳殂落百姓如喪考妣其可見者也夏后氏三年之喪既殯而致事則夏之為父三年矣禹崩三年之喪畢益避禹之子於箕山之陰則夏之為君三年矣從是觀之它服術可知也士喪禮自小斂奠大斂奠朔月半薦遣奠大遣奠皆用夏祝使夏后氏制喪三月祝豈能習其禮以贊周人三年之喪哉若夫陵死葬陵澤死葬澤此為天下大水不能具禮者言之也荒政殺哀周何嘗不因於夏禮以聚萬民哉行有死人尚或殣之此節葬也斂首足形還葬而無槨此又節葬也豈可執是以言周禮哉若然夏不節喪史佚固節喪與夫下殤墓遠棺斂於宫中召公為言於周公而後行之若是其篤終也先王制禮其敢有不至者哉墨子者蓋學焉而自為其道者也故其節葬曰聖王制為節葬之法又曰墨子制為節葬之法則謂墨子自制者是也故曰墨之治喪以薄為其道孟子滕文公篇曰墨子生不歌死不服桐棺三寸而無槨以為法式莊子天下篇曰墨者之葬也冬日冬服夏日夏服桐棺三寸服喪三月韓非子顯學篇使夏后氏有是制三子者不以之蔽墨子矣賈誼新書序新書五十八篇漢梁太傅洛陽賈誼撰今亡一篇校本傳自凡人之知至胡不引殷周秦事以觀之也四百三十四字書亡其文據以補之問孝禮容語上二篇有録亡書藝文志但云賈誼稱新書者劉向校録所加荀卿子稱荀卿新書見於楊倞之序是其證也過秦三篇本書題下亡論字陳涉項籍傳論引此應邵注云賈誼書之首篇也足明篇之非論吳志闞稜傳始目為論左思昭明太子並沿其文誤也自數寧至輔佐三十三篇皆陳政事按鼂錯傳錯言宜削諸矦事及法令可更定者書凡三十篇則知當日封事事各一篇合為一書固有其體班氏約其文而分載之本傳食貨志爾其指事類情優遊詳鬯或不及本書自春秋至君道皆國中失之事自官人至大政皆通論修政上下皆重言也三古之遺緒託以傳焉容經以下則皆古禮逸篇與其義舊本編録亡次第今略以意屬之定為六卷題下有事勢有連語有雜事與管子書同例今亦仍之别為年表一篇俾覽者詳焉經典序録所次本劉向别録其敘左氏傳云荀卿授陽武張蒼蒼授洛陽賈誼然則生固荀氏再傳弟子也故其學長於禮其所陳立諸矦王制度教太子敬大臣皆先王之成法周公舊典仲尼之志蓋春秋經世之學在焉是故僃物典策國所與立君舉必書以詔後世春秋者秉周禮而謹其變者也吾於荀氏賈氏之言禮也益信劉子駿稱漢朝之儒惟賈生而巳豈虛也哉其書述左氏事止禮容篇叔孫昭子一條先醒篇言宋昭公出亡而復位虢君出走其御進酒食及枕土而死耳痺篇言子胥何籠而自投於江諭誠篇言楚昭王以當房之德復國皆不合左氏審微篇言晉文公請隧叔孫于奚救孫桓子春秋篇言衛懿公喜鶴而亡其國先醒篇言楚莊王與晉人戰於兩棠會諸矦於漢陽申天子之禁皆與左氏異同其時經之授受不箸竹帛解詁屬讀率皆口學其有故書雅記異人之聞則亦依事枚舉取足以明教而巳禮篇君道篇説詩騶虞鴛鴦靈臺皇矣旱麓均非毛義於時三家之學未立故秦時老師大儒猶有存者師友所承不可盡知使得是千百説而通之豈復有末師之陋哉於乎漢世慕尚經術史氏稱其緣飾故公卿或持祿􅍖位被阿諛之譏博士講授之師僅僅方幅自守文吏又一切取勝蓋仲尼既沒六藝之單閼賈生以孝文元年為博士歲中超遷至大中大夫旋出為長沙王傅至是適得三年傳云後歲餘文帝思誼徵之至拜為梁懷王太傅則當為六年事其年王入朝十一年再入朝則賈生自六年以後皆在梁其陳政事及諫王淮南王諸子並當此時哀帝紀令諸矦王朝得從其國二千石傅相中尉皆國二千石懷王朝則賈生當從至京師王薨亡子國除則王國官省可知而賈生方上書請益封梁淮陽則是以故二千石留長安也石鼓文證孫星衍編修以石鼓文為宇文周時物謂周書本紀數書狩于岐陽可據中請證之周書太祖本紀魏大統十一年西狩岐陽十三年太祖奉魏帝西狩于岐陽高祖紀􅍖定元年狩于岐陽天和三年行幸岐陽有此四事今檢後漢書鄧騭傳遭元二之災注元二即元元也古書字當再讀者即于上字之下為小二字言此字當兩度言之今岐州石鼓銘凡重言者皆為二字明驗也詳此注之意緣石鼓是三代之物故取以釋漢事而以古書發其凡若使石鼓製自宇文則是以後證前雖愚者不出於此章懷太子與後周耳目相接張大安諸人均有文學無容不知一證也元和郡縣志引吏部侍郎蘇勗之言曰史籒之迹近在關中岐陽石鼓是也虞褚歐陽共稱其古妙按褚遂良年輩差後今不具論歐陽詢傳云年八十餘卒既不明箸其數且不知卒以何年考古者亦無從措意惟虞世南以貞觀十二年卒年八十一則以陳高祖永定二年生實當周世宗之二年洎陳滅入隨世南年三十一矣是時周之亡才九年上距岐陽之狩遠者四十四年次四十二年次二十八年又次二十一年使石鼓立于後周則是甫經脫手之物以世南之博物精鑒豈得妄以為史籒筆迹而歎其古妙傳曰以今視古古猶今也今之為篆者有王澍給事中中生十歲而給事猶存然中見給事之篆固不以為李陽冰黨懷英也且歐陽及褚何以與之暗合二證也周太祖割據關隴軍國多虞未皇文教其時文士惟有冀俊趙文淵及平江陵始得王褒褒俊之書今不傳於世文淵于碑榜是其所長所書驪山溫泉頌石刻見存其篆額筆法凡劣又不合六書以視石鼓文豈止霄壤使石鼓出自宇文之世究是何人所書豈得寂爾無聞三證也或謂周世蘇綽嘗仿尚書作大誥則石鼓仿小大二雅理固宜然然史稱綽粳秕魏晉憲章虞夏雖屬辭有師古之美矯枉非適時之用故莫能常行焉據武成元年五月戊子詔書巳變其格又世宗幸同州過故宫詩載于本紀猶是當時之體未嘗刻意摹古若以為出自綽手則蘇勗者綽之曾孫豈宜數典忘祖而遠傅之史籒四證也太祖本紀大統十四年奉魏太子巡撫西竟自新平出安定刻石紀事則刻石載于本紀矣若石鼓為當時所刻何以但書狩于岐陽不書刻石五證也編修之言本於馬定國馬定國之説今不得其詳編修既有斯疑同人或多信之謹就其言辨之如此若其文字淳古百世之下猶見倉史制作遺意好學深思之士當自得之今不僃論也廣陵曲江證枚乘七發將以八月之望與諸矦遠方交遊兄弟並往觀濤乎廣陵之曲江廣陵漢縣今為甘泉及天長之南竟江北江也本篇李善注引山謙之南徐州記京江禹貢北江春秋分朔輒有大濤至江乘北激赤岸尤更迅猛南齊書地理志南兗州廣陵郡土甚平曠刺史每以秋月多出海陵觀濤與京口􅍟岸江之壯闊處也二文並明核可據本篇淩赤岸篲扶桑李善因扶桑之文并赤岸疑在遠方然郭璞江賦鼓洪濤於赤岸淪餘波於柴桑正承用七發文則七發扶桑當作柴桑字之誤也今潮猶至湖口之小孤山而回目驗可知江賦注赤岸在廣陵輿縣寰宇記赤岸山在六合東三十里高十二丈周四里土色皆赤因名顧祖禹方輿紀要引南兗州記潮水自海門入衝激六七百里至此其勢始衰郭璞江賦所謂鼓洪濤於赤岸也今按此山府縣志所載土俗所稱均無異議故曲江之為北江非孤證矣往者吾鄉越闓辰六以廣陵濤榜其齋閣秀水朱檢討與書爭之以為七發所云在錢唐其言實謬檢討所據者本篇弭節伍子之山通厲骨母之埸依注以骨母為胥母之訛而不言二地所在又節酈氏水經漸江篇注以為證不知越之北竟至今之石門浙江非吳地故越語句踐之地北至禦兒韋昭注今嘉興語兒鄉也吳語大夫種謀伐吳曰吾用禦兒臨之韋昭注禦兒越北鄙在今嘉興是也爾雅釋地吳越之間有具區其言審矣于時戰地並在今蘇州嘉興二府之竟故春秋定公十四年於越敗吳于檇李杜預注吳郡嘉興縣南醉李城傳吳伐越越子句踐禦之陳于檇李又闔廬還卒于陘去檇李七里哀公元年傳吳王夫差敗越于夫椒注吳郡吳縣西南太湖中椒山越語句踐即位三年興師伐吳戰於五湖不勝是也吳越交兵凡三十二年內外傳所謂江並吳江也故春秋哀公十七年傳越子伐吳吳子禦之笠澤夾水而陳吳語越王句踐乃率中軍泝江以襲吳入其郛韋昭注江吳江也又吳王起師于江北越王軍于江南韋昭注江松江去吳五十里是也吳殺子胥投其尸於江亦吳江也七發注引史記吳王殺子胥投之于江吳人立祠於江上因名胥母山史記伍子胥列傳吳王取子胥尸盛以鴟夷革浮之江中吳人憐之為立祠于江上張晏曰胥山在太湖邊去江不遠百里故云江上正義引吳地記曰越軍于蘇州東南三十里又向下三里臨江北岸立壇殺白馬祭子胥杯動酒乾盡後立廟于此江上吳太伯世家正義引吳俗傳子胥後越從松江北開渠至橫山東北築城伐吳子胥乃與越軍夢令從東南入破吳越王即移向三江口岸立壇殺白馬祭子胥杯動酒乾盡越乃開渠子胥作濤蕩羅城東開入滅吳至今號曰示浦門曰鯆䱐是也吳投子胥之尸豈有舍其本國南竟五十里之吳江乃入鄰國三百餘里投之浙江哉然則伍子之山胥母之場固與浙江無涉不得引以為證吳越春秋句踐殺大夫種葬于國之西山一年伍子胥從海上穿山脅而持種去與之俱浮於海故前潮水揚波者子胥後重水者大夫種也其言固誕然但言海潮而不言浙江也論衡書虛篇吳王殺子胥投之江子胥恚恨驅水為濤以溺殺人今時會稽丹徒大江錢唐浙江皆立子胥之廟蓋欲尉其恨心止其怒濤也二江並祭子胥乃在東漢之世水經淮水篇注引應劭風俗記江都縣有江水祠俗謂之伍相廟也子胥但配食爾歲三祭與五嶽同子胥之配食大江是惟命祀漸江篇注據吳越春秋以七發所云專屬之浙江則誤矣檢討又云曾鞏序鑑湖圖有所謂廣陵斗門者在今山隂縣西六十里去浙江不遠今以其地準之實在浙江之東自吳至浙不經其地且係堰閘小名何取於是而以之冠曲江之上哉是時吳王濞都廣陵北江在國門之外故強太子往觀之若踰越江湖千二百里以至浙江則病未能也檢討又云江都之更名廣陵在元狩三年時乘巳卒不應先見之於文則尤謬史記五宗世家江都王建自殺國除地入於漢為廣陵郡據漢書諸矦王表地理志並在元狩二年其時所更名者廣陵郡也而廣陵郡自有廣陵縣為郡治為吳江都廣陵三國都其名則在楚在秦在荆在吳在江都皆有之故史記六國表楚懷王十年城廣陵項羽本紀廣陵人召平于是為陳王徇廣陵樊酈滕灌列傳灌嬰度淮盡降其城邑至廣陵吳王濞列傳孝景前三年正月甲子初起兵于廣陵不得謂元狩三年之前無廣陵之名也漢所置郡國若宏農陳留平原千乘丹陽桂陽零陵武都安定朔方皆取縣名名郡廣平真定信都廣陽高密皆取縣名名國此例甚多故江都之為國廣陵之為郡為國皆以縣也檢討不根持論雖越俗好鬼錢唐廣陵矦之淫祀舉子所業元人錢惟善之試卷皆僃舉之而于經史正文反屛而不觀及一引漢書而其謬若是亦後學之大戒巳至廣陵城本在蜀岡上𨝍溝環其東南江即在其外故水經淮水篇注云昔吳將伐齊自廣陵城東南築𨝍城城下掘深溝謂之韓江亦曰𨝍溟溝今自廣陵驛而北為舊城之市河北至堡城折而東至黃金壩會于運河是其故趾自此入淮一名中瀆水故云中瀆水首受江於廣陵郡之江都縣縣城臨江是也晉以後江益徙而南故沔水篇注云毗陵縣丹徒北二百步有故城舊去江三里岸稍毀遂至城下城北有揚州刺史劉繇墓淪於江是也今揚州城外運河唐王播所開事見播傳其時江猶至於揚子橋而東關以外在漢則江滸也然則城東小水之稱廣陵濤固非無據也凡檢討所云惟水經注承酈氏之設其餘無一是者恐後人習謬而不知故為正之
